突吉羅於舍衛城制之因六群比丘六群比丘纏頭而行坐於俗家間二五不恭敬以膝行往俗家間之突吉羅二六不恭敬以散亂姿態而坐於俗家間之突吉羅二七不恭敬不注意而受施食過多之突吉羅二八不恭敬左右顧視而受施食之突吉羅二九不恭敬受多量汁之突吉羅三不恭敬受溢鉢施食之突吉羅第四施食品三一三三不恭敬不注意左右顧視處處揉捏而食施食之突吉羅三四不恭敬食過量汁之突吉羅三五不恭敬從中央揉捏而食施食之突吉羅三六不恭敬以飯覆湯汁或加味物之突吉羅三七不恭敬無病而為己乞汁飯而食之突吉羅於舍衛城制之因六群比丘六群比丘為己乞汁飯而食有一制一隨制依兩種等起而生起由身語意生起三八不恭敬心存不滿而眺視他人之鉢之突吉羅有一制依一種等起而生起由身與意生起而不由語三九不恭敬作大飯球之突吉羅四不恭敬作長形飯球之突吉羅第五飯球品四一不恭敬飯球未送近口邊即張口之突吉羅四二不恭敬食時將手全部塞入口中之突吉羅四三不恭敬口含飯球而言談之突吉羅於舍衛城制之因六群比丘六群比丘口含飯球而言談有一制依一種等起而生起由身語意生起四四五不恭敬以食物投入口中囓飯球而食脹滿口而食搖手撒落飯粒吐舌喳喳作聲而食之突吉羅有一制依一種等起而生起由身與意生起而不由語第六吸食品五一不恭敬簌簌作聲而食之突吉羅於憍賞彌制之因衆多比丘衆多比丘等簌簌作聲而飲牛乳有一制依一種等起而生起五二五四不恭敬舐手舐鉢舐唇而食之突吉羅有一制依一種等起而生起五五不恭敬以被食物所污之手持水瓶之突吉羅於婆祇國制之因衆多比丘衆多比丘以被食物所污之手持水瓶有一制依一種等起而生起五六不恭敬將混有飯粒之洗鉢水捨棄於俗家間之突吉羅於婆祇國制之因衆多比丘衆多比丘將混有飯粒之洗鉢水捨棄於俗家間有一制依一種等起而生起五七不恭敬對無病而手持日傘者説法之突吉羅於舍衛城制之因六群比丘六群比丘對手持日傘者説法有一制一隨制依一種等起而生起由語與意生起而不由身五八六不恭敬對手持杖者手持刀者手持武器者説法之突吉羅有一制一隨制依一種等起而生起由語與意生起而不由身第七草履品六一六七不恭敬對無病而穿草履者穿鞋者坐於乘坐物者臥牀者散亂姿態而坐者纏頭者覆面者説法之突吉羅有一制一隨制如前六八七二不恭敬坐於地上為無病而坐於座牀者坐於低座為無病而坐於高座者立而為無病而坐者行於後為無病而行於前者行於道外為無病而行於道中者説法之突吉羅有一制一隨制依六種犯罪等起之一種等起而生起七三不恭敬無病而站立大小便之突吉羅有一制一隨制依六種犯罪等起之一種等起而生起由身與意生起而不由語七四不恭敬無病時於青草上大小便及唾痰之突吉羅七五不恭敬無病於水上大小便及唾痰之突吉羅於何處制立耶於舍衛城制之也因何人耶因六群比丘也為何事耶六群比丘於水上大小便及唾痰之事也有一制一隨制依六種犯罪等起之一種等起而生起由身與意生起而不由語七十五學法終大分別中制處章終攝頌全圓與覆身威儀視下方衣拉上哄笑大聲搖為三叉腰並纏頭膝行與亂姿留意顧視鉢適量汁滿鉢留意顧視鉢順次汁適量積上而覆蓋乞故示不滿不作大圓形口手不言談投囓脹振搖及飯粒撒落吐舌出口而喳喳與簌簌手鉢唇食物以及混飯粒對於持傘者世尊不説法持杖及持刀持武器亦然草履以及鞋乘物臥牀者亂姿及纏頭以及覆面者地上與低座立後及惡道立者不與為青草及水上諸品總攝頌全圓與哄笑叉腰及施食飯球並吸食第七草履品二四波羅夷一行不淨法者犯幾種罪耶行不淨法者犯三種罪於鳥獸未食之身行不淨法者波羅夷於已食多分之身行不淨法者偷蘭遮不觸肉而以生支入於口中者突吉羅行不淨法者犯此三種罪二不與取者犯幾種罪耶不與取者犯三種罪值五摩沙迦或五摩沙迦以上不與物而以盜心取者波羅夷值一摩沙迦以上或五摩沙迦以下不與物而以盜心取者偷蘭遮值一摩沙迦或一摩沙迦以下不與物而以盜心取者突吉羅不與物取者犯此三種罪三故意奪人生命犯三種罪故為某人掘穽言彼陷而死者突吉羅陷而生苦受者偷蘭遮死者波羅夷故意犯此三種罪四主張空無之上人法犯三種罪持不善欲望貪欲之性而主張空無之上人法者波羅夷言住汝精舍之比丘是阿羅漢對方知解者偷蘭遮不知解者突吉羅空無犯此三種罪四波羅夷終十三僧殘一行泄不淨者犯三種罪思泄而行泄者僧殘思而行未泄者偷蘭遮先行突吉羅二與女人身相觸者犯三種罪身與身相觸者僧殘身與身所著之物相觸者偷蘭遮身所著之物觸身所著之物者突吉羅三對女人語粗惡語者犯三種語大便道及小便道之好惡者僧殘除大便道及小便道外語膝蓋以上頸以下之好惡者偷蘭遮語身所著之物突吉羅四為己讚歎淫欲供養者犯三種於女人之前為己讚歎淫欲供養者僧殘於黃門之前偷蘭遮於畜生之前突吉羅五為人作媒者犯三種受語而轉告他還報者僧殘受語而轉告他不還報者偷蘭遮受語而不轉告他不還報者突吉羅六自乞造房舍者犯三種令作之前行者突吉羅最後之泥團未塗者偷蘭遮其泥團已塗者僧殘七令造大精舍者參照六八以無根波羅夷法誹謗他比丘者犯三種不被容許而以擯斥意言之者一僧殘一突吉羅被容許而以叱責意言之者非難語波逸提罪九唯取異事中之某種類似點以波羅夷法誹謗他比丘者犯三種參照八一對破僧比丘諫告至三次而不捨者犯三種依白而突吉羅依二羯磨語而偷蘭遮羯磨語竟而僧殘一一對助破僧比丘諫告至三次而不捨者有三種罪依白而一二對惡口比丘諫告至三次而不捨者三種一三對污俗家比丘諫告至三次而不捨者三種十三僧殘終三十捨墮第一迦絺那衣品一長衣蓄過十日者犯一種罪捨墮二一夜離三衣者一種三納受非時衣蓄過一月者一種四令非親里比丘尼浣故衣者犯兩種罪令浣之前行者突吉羅浣已者捨墮五由非親里比丘尼之手受衣者犯兩種罪受之前行者突吉羅已受者捨墮六向非親里之居士或居士婦乞衣者兩種乞之前行者突吉羅已乞得者捨墮七向非親里之居士或居士婦乞過量衣者參照六八未受請而先至非親里居士處就衣而指示者有兩種罪指示之前行者突吉羅已指示者捨墮九未受請而先至非親里居士處就衣而指示者參照六一催促三次以上站立六次以上而得衣者兩種得之前行者突吉羅已得者捨墮第二蠶綿品一一令作雜絹絲之臥具者兩種令作之前行者突吉羅已作者捨墮一二令作純黑色羊毛之臥具者參照一一一三不用一多羅量之白色羊毛一多羅量之褐色羊毛而令作新臥具者一四年年令作臥具者一五不從舊臥具邊緣取一佛搩手而令作新臥具者一六持羊毛而行過三由旬者犯兩種罪第一腳超過三由旬者突吉羅第二腳超過者捨墮一七令非親里比丘尼浣羊毛者參照四一八受持金錢者犯兩種罪受持之前行者突吉羅已受持者捨墮一九買賣種種金銀者犯兩種罪買賣前行者突吉羅已作買賣者捨墮二行種種交易參照一九第三鉢品二一長鉢蓄過十日者犯一種罪捨墮二二鉢不至五綴而求其他新鉢者犯兩種罪求之前行者突吉羅求而得時捨墮二三得藥而蓄過七日者一種二四於熱季之最後一月以前求雨季衣者犯兩種罪求之前行者突吉羅求而得時捨墮二五比丘自以衣施與後忿怒不喜奪回者犯兩種罪奪之前行者突吉羅已奪者捨墮二六自乞絲令織師織衣者犯兩種罪乞之前行者突吉羅乞而得者捨墮二七未受請而先至非親里居士織師處就衣作指示者犯兩種罪指示之前行者突吉羅已指示者捨墮二八領受特施衣而蓄過衣時者一種二九三衣中之一衣寄置於民家離其衣過六夜者一種三明知為供養僧之物而回入為己有者兩種回入之前行者突吉羅已回入者捨墮三十捨墮終九十二波逸提第一妄語品一故意妄語者墮幾種罪耶故意妄語者墮五種罪持不善望主張貪欲之性而為空無之上人法者波羅夷以無根波羅夷法誹謗他比丘者僧殘言住汝精舍之比丘是阿羅漢而對方知解者偷蘭遮不知解者突吉羅故意妄語者波逸提故意妄語者乃墮此五種罪二罵詈語者墮兩種罪罵詈受具戒者波逸提罵詈未受具戒者突吉羅三提供離間語者墮兩種罪以離間語提供受具戒者波逸提以離間語提供未受具戒者突吉羅四令未受具戒者逐句同誦法者墮兩種罪令誦之前行者突吉羅逐句誦之者句句波逸提五與未受具戒者同宿過二夜三夜者墮兩種罪臥之前行者突吉羅已臥者波逸提六與女人同宿參照五七對女人説法過五六語者墮兩種罪説法之前行者突吉羅依句説者句句波逸提八對未受具戒者説實有上人法者墮兩種罪説之前行者突吉羅已説者波逸提九將比丘之粗罪語未受具戒者有兩種罪語參照八一掘地者有兩種罪掘之前行者突吉羅屢屢掘者波逸提第二草木品一一伐草木者有兩種罪伐之前行者突吉羅每伐者波逸提一二作異語遁辭者有兩種罪未與異語罪時而遁辭者突吉羅與異語罪猶作異語遁辭者波逸提一三譏嫌他比丘者有兩種罪譏嫌之前行者突吉羅譏嫌已者波逸提一四僧伽之臥牀椅子臥褥或坐褥敷於露地而不收又不託人而離去者有兩種罪第一腳過擲石所及處者突吉羅第二腳過者波逸提一五於僧伽精舍中敷臥具而不收又不託人而離去者有兩種罪第一腳過籬者突吉羅第二腳過籬者波逸提一六於僧伽精舍中知而於先來比丘之牀間展設牀座者有兩種罪臥之前行者突吉羅已臥者波逸提一七瞋怒不喜由僧伽精舍將比丘拖出者有兩種罪拖出之前行者突吉羅已拖出者波逸提一八在僧伽精舍中於樓上之脫腳牀或脫腳椅坐者有兩種罪坐之前行者突吉羅坐已者波逸提一九指示覆二三重過此指示者兩種罪指示之前行者突吉羅已指示者波逸提二知而將有蟲水澆於草或木者兩種罪澆之前行者突吉羅已澆者波逸提第三教誡品二一未被選任而教誡比丘尼者兩種罪教誡之前行者突吉羅教誡時波逸提二二至日沒時仍教誡比丘尼者參照二一二三至比丘尼住處而教誡比丘尼者二四言諸比丘為利養而教誡比丘尼者兩種言之前行者突吉羅言時波逸提二五以衣與非親里比丘尼者兩種與之前行者突吉羅與時波逸提二六為非親里比丘尼縫衣者兩種縫之前行者突吉羅縫時針針波逸提二七豫約比丘尼同道而行者兩種往之前行突吉羅行時波逸提二八豫約比丘尼同乘一船者兩種乘之前行者突吉羅已乘時波逸提二九知而令比丘尼周旋取食者兩種言我食而取者突吉羅每咽食者波逸提三獨與比丘尼於祕密處共坐者兩種坐之前行者突吉羅已坐時波逸提第四食品三一過其食用施食處之食者兩種言我食參照二九三二別衆食者兩種言我食三三數數食者兩種言我食三四取滿二三鉢以上之餅者兩種取之前行者突吉羅已取者波逸提三五足食已復取非殘食之嚼食或噉食者兩種言我食參照二九三六將非殘食之嚼食或噉食與已足食之比丘而任取者兩種依其語言我食而取者突吉羅已食時波逸提三七於非時食嚼食或噉食者兩種言我食參照二九三八食蓄藏之嚼食或噉食者兩種言我食三九為己乞美味之食而食者兩種言我食四不與之食物持來口邊者兩種言我食第五裸行品四一於裸行外道或遍行外道男遍行外道女親手與嚼食或噉食者兩種與之前行者突吉羅已與時波逸提四二語他比丘曰來友入村或鎮乞食而帶出將施食與彼或不與而令離去者兩種令離去之前行者突吉羅令離去時波逸提四三進入食事中之俗家強坐者兩種坐之前行者突吉羅已坐者波逸提四四與女人共坐於祕密屏處者兩種坐參照四三四五獨與一女人祕密共坐者兩種坐四六受請食有其他比丘時不告彼而於食前或食後訪他家者兩種罪第一腳過門者突吉羅第二腳過門者波逸提四七乞藥過此者兩種乞之前行者突吉羅得乞者波逸提四八為觀出征軍而往者兩種往者突吉羅立其處而觀者波逸提四九宿於軍中過三夜者兩種宿之前行者突吉羅宿時波逸提五往觀模擬戰者兩種往者突吉羅立其處而觀者波逸提第六飲酒品五一飲酒者兩種言我飲者突吉羅每咽飲波逸提五二以指胳肢比丘令笑者兩種令笑之前行者突吉羅令笑時波逸提五三於水中嬉戲者兩種戲於踝以下之水中者突吉羅戲於踝以上之水中者波逸提五四輕侮者兩種輕侮之前行者突吉羅輕侮者波逸提五五令他比丘恐怖者兩種令恐怖之前行者突吉羅令恐怖時波逸提五六燃火暖身者兩種燃之前行者突吉羅燃時波逸提五七半月以內沐浴者兩種沐浴之前行者突吉羅沐浴已波逸提五八不取三種壞色中之一壞色而著用新衣者兩種著用之前行者突吉羅著用時波逸提五九於比丘比丘尼式叉摩那沙彌或沙彌尼親自以衣淨施不還與彼而著用者兩種著用之前行者突吉羅著用時波逸提六隱藏比丘之鉢衣坐具針筒或腰帶者兩種隱藏之前行者突吉羅隱藏時波逸提第七有蟲水品六一故意奪生物之命者有幾種罪耶故意奪者有四種罪不指定人言何人陷而當死而掘穽者突吉羅人陷於其中而死者波羅夷夜叉鬼或畜生之形者陷於其中而死者偷蘭遮畜生陷於其中而死者波逸提故意奪生物之命有此四種罪六二知水中有蟲而飲用者兩種飲用之前行者突吉羅飲用時波逸提六三知諍事已如法裁決欲令再羯磨而騷亂者兩種騷亂之前行者突吉羅起騷亂時波逸提六四知他比丘之粗罪而覆藏者有一種罪波逸提六五知未滿二十歲而授具足戒者兩種授具之前行者突吉羅已授具時波逸提六六知為賊隊而豫約同道而行者兩種同行之前行者突吉羅行時波逸提六七與女人豫約參照六六六八對惡見諫告至三次而不捨者兩種依白而突吉羅羯磨竟時波逸提六九知為如是説惡見不受法之處分不捨成見之比丘共事者兩種共事之前行者突吉羅已共事時波逸提七知如是被擯滅之沙彌而與撫慰者兩種撫慰之前行者突吉羅撫慰已者波逸提第八如法品七一雖由諸比丘如法言言友我未詢問其他堪能持律之比丘時當不學持此學處者兩種言之前行者突吉羅已言者波逸提七二誹謗律者兩種誹謗之前行者突吉羅誹謗時波逸提七三無知者兩種未被舉無知之罪而為不知者突吉羅已被舉無知之罪猶言不知者波逸提七四瞋怒不喜而毆打比丘者兩種毆打之前行者突吉羅毆打時波逸提七五對比丘瞋怒不喜而舉手作劍勢者兩種舉手之前行者突吉羅舉手時波逸提七六以無根僧殘罪誹謗比丘者兩種誹謗之前行者突吉羅誹謗時波逸提七七故意與比丘疑惱者兩種與之前行者突吉羅已與者波逸提七八立於發生諍論爭鬥而不和之諸比丘附近屏處而聽者兩種往屏處聽者突吉羅立於其處而聽者波逸提七九同意如法羯磨事後言不平者兩種言不平之前行者突吉羅已言者波逸提八於僧伽提議決斷時不同意起座而離去者兩種由衆中離去在伸手以內之距離者突吉羅離去伸手以外者波逸提八一由和合僧施與衣後而言不平者兩種言不平參照七九八二知已決定供養僧伽之所得物而轉施與個人者兩種轉施與之前行者突吉羅已轉施與者波逸提第九寶品八三不豫告而入王之後宮者兩種第一腳過門者突吉羅第二腳過門者波逸提八四捉寶物者兩種捉之前行者突吉羅已捉者波逸提八五不告同住之比丘而非時入村落者兩種第一腳過籬者突吉羅第二腳過籬者波逸提八六令作骨製牙製角製之針筒者兩種令作之前行者突吉羅已令作者波逸提八七令作過量之臥牀或椅子者兩種令作之前行者突吉羅已作者波逸提八八令作入綿之臥牀或椅子者兩種令作參照八七八九令作過量之坐具者兩種令作九令作過量之覆瘡衣者兩種令作九一令作過量之雨浴衣者兩種令作九二令作佛衣量之衣者有幾種罪耶令作佛衣量之衣者兩種令作之前行者突吉羅已作時波逸提令作佛衣量之衣者有此兩種罪小事終四提舍尼一入於市井親手由非親里比丘尼之手中受硬食或軟食而食者有幾種罪耶於市井食者有兩種罪言食之而捉者突吉羅每咽食波逸提於市井食者有此兩種罪二不拒比丘尼之指示而食者兩種言食之參照一三於學地認定之諸家親手受硬食或軟食而食者兩種參照一四於阿蘭若住處若於僧伽中親手受未豫告之硬食或軟食而食者有幾種罪耶於阿蘭若食者有兩種罪言食之阿蘭若食者有此兩種罪四提舍尼終衆學法第一全圓品一不恭敬故令前後垂下而著內衣者有幾種罪耶不恭敬著有一種罪突吉羅不恭敬著有一種罪二不恭敬故令前後垂下而著上衣有一種罪突吉羅三四不恭敬故將身體露現而行坐於俗家間者一種五六不恭敬故搖擺手足而行坐於俗家間者一種七八不恭敬左右顧視而行坐於俗家間者一種九一不恭敬將衣拉上而行坐於俗家間者一種第二哄笑品一一一二不恭敬哄笑而行至俗家間者一種一三一四不恭敬高大聲而行坐於俗家間者一種一五一六不恭敬搖身吊身而行坐於俗家間者一種一七一八不恭敬搖臂掉臂而行坐於俗家間者一種一九二不恭敬搖頭而行坐於俗家間者一種第三叉腰品二一二二不恭敬手叉腰張肘而行坐於俗家間者一種二三二四不恭敬纏頭而行坐於俗家間者一種二五不恭敬用膝行往俗家間者一種二六不恭敬以散亂姿態而坐於俗家間者一種二七不恭敬不注意而受施食者一種二八不恭敬左右顧視而受施食者一種二九不恭敬受多量汁者一種三不恭敬受溢鉢之施食者一種第四施食品三一三三不恭敬不注意左右顧視處處揉捏而食施食者一種三四不恭敬食過量汁者一種三五不恭敬從中央揉捏而食施食者一種三六不恭敬以飯覆湯汁或加味物者一種三七不恭敬無病而為己乞汁或飯而食用者一種三八不恭敬心存不滿而眺視他人之鉢者一種三九不恭敬作大飯球者一種四不恭敬作長形飯球者一種第五飯球品四一不恭敬飯球未送近口邊即開口者一種四二不恭敬食時將手全部塞入口中者一種四三不恭敬口含飯球而言談者一種四四不恭敬將食物投入口中而食者一種四五五不恭敬囓飯球脹滿口搖手撒落飯粒吐舌喳喳作聲而食者一種第六吸食品五一五四不恭敬簌簌作聲舐手舐鉢舐唇而食者一種五五不恭敬以被食物所污之手持水瓶者一種五六不恭敬將混有飯粒之洗鉢水捨棄於俗家間者一種五七六不恭敬對手持日傘者手持杖者手持刀者手持武器者説法一種第七草履品六一七二不恭敬對無病而穿草履者穿鞋者坐於乘坐物者臥牀者散亂姿態而坐者纏頭者覆面者我坐地上而對坐於座牀者我坐低座而對坐於高座者我立而對坐者我行於後而對行於前者我行於道旁而對行於道中者説法者一種七三不恭敬站立大小便者一種七四不恭敬於青草上大小便或唾痰者一種七五不恭敬於水上大小便或唾痰者有幾種罪耶不恭敬於水上者有一種罪突吉羅不恭敬故於水上者有此一種罪學法終二罪數章終三行不淨法之罪於四種失壞中隨伴幾種失壞耶行不淨之罪於四種失壞中隨伴兩種失壞有戒壞有行壞乃至不恭敬故於水上大小便或唾痰之罪於四種失壞中隨伴幾種失壞耶不恭敬故之罪於四種失壞中隨伴一種失壞行壞三失壞章終四行不淨法之罪於七種罪聚中攝幾種罪聚耶不淨法罪聚中攝三種罪聚有波羅夷罪聚偷蘭遮罪聚突吉羅罪聚乃至不恭敬故於水上之罪於七種罪聚中攝一種罪聚突吉羅罪聚四攝在章終五行不淨法之罪於六種犯罪等起中依幾種等起而生起耶不淨法依一種等起而生起由身與意生起而不由語乃至不恭敬故於水上之罪於六種犯罪等起中幾種依一種等起而生起由身與意生起而不由語五等起章終六行不淨法之罪於四種諍事中為何種諍事耶不淨法諍事中犯罪諍事也乃至不恭敬故於水上之罪於四種諍事中為何種諍事耶不恭敬諍事中犯罪諍事也六諍事章終七行不淨法之罪於七種滅諍法中依幾種滅法而滅之耶不淨依三種滅法而滅之有依現前毗尼與自言治現前毗尼與如草覆地乃至不恭敬故於水上之罪於七種滅法中幾種依三種滅法而滅之有依現前毗尼與自言治現前毗尼與如草覆地七滅諍章終八行不淨法者有幾種罪耶行不淨法者有三種罪於未被食之身行不淨法者波羅夷於已被食多分之身行不淨法者偷蘭遮不觸而以生支入於口中者突吉羅行不淨法者有此三種罪其罪於四種失壞中隨伴幾種失壞耶於七種罪聚中攝幾種罪聚耶於六種犯罪等起中依幾種等起而生起耶於四種諍事中為何種諍事耶於七種滅諍法中依幾種滅法而滅之耶其罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝三種罪聚有波羅夷罪聚偷蘭遮罪聚突吉羅罪聚於六種犯罪等起中依一種等起而生起由身與意生起而不由語於四種諍事中為犯罪諍事於七種滅法中依三種滅法而滅之有依現前毗尼與自言治依現前毗尼與如草覆地乃至不恭敬故於水上者有幾種罪耶不恭敬者有一種罪突吉羅不恭敬者有一種罪其罪於四種失壞中隨伴幾種失壞耶同前依幾種滅法而滅之耶其罪於四種失壞中隨伴一種失壞行壞於七種罪聚中攝一種罪聚突吉羅罪聚於六種同前依與如草覆地八集合章終此八種章乃依讀誦道而書之也攝頌制處及幾種失壞與攝在等起並諍事滅法及集合九一依彼智者見者應供者等正覺之世尊緣行不淨法之波羅夷於何處因何人為何事而制立耶乃至由何人傳承之耶依彼智者緣行之波羅夷於何處制立耶於毗舍離制之參照一波羅夷一由身與意生起而不由語乃至由何人傳承之耶次第傳承即優波離提沙迦蘇那迦悉伽婆第五是目犍連子帝須此等於閻浮提稱為吉祥之人乃至此等龍象有大智慧解律通道於銅鍱洲宣説律藏二依彼等正覺者之世尊緣不與取之波羅夷於何處制立耶於王舍城制之參照一由與意生起三緣故意奪人命之波羅夷於何處制立耶於毗舍離制之由與意生起四緣説空無上人法之波羅夷於何處制立耶於毗舍離制之由與意生起一依彼等正覺者之世尊緣泄不淨之僧殘於何處制立耶因何人何因緣耶乃至由何人傳持耶依彼世尊緣泄不淨之僧殘於何處制立耶於舍衛城制之不由語乃至由何人傳持耶次第傳承即優波離提沙迦宣説二緣與女人身相觸之僧殘於何處制立耶於舍衛城制之生起而不由語三緣對女人言粗惡語之僧殘於何處制立耶於舍衛城制之由與意生起四緣於女人之前為己讚歎淫欲供養之僧殘於何處制立耶於舍衛城制之五緣為媒介之僧殘於何處制立耶於舍衛城制之由與意生起六緣自乞而令造房舍之僧殘於何處制立耶於阿羅毗制之依六種等起而生起七緣令造大精舍之僧殘於何處制立耶於憍賞彌制之依六種等起而生起八緣以無根波羅夷法誹謗比丘之僧殘於何處制立耶於王舍城制之依三種等起而生起九緣唯取異事中之某種類似點以波羅夷法誹謗比丘之僧殘於何處制立耶於王舍城制之依三種等起而生起一緣對破僧比丘諫告至三次而不捨之僧殘於何處制立耶於王舍城制之由與意生起一一緣對助破僧比丘諫告至三次而不捨之僧殘於何處制立耶於王舍城制之由與意生起一二緣對惡口比丘諫告至三次而不捨之僧殘於何處制立耶於憍賞彌制之由與意生起一三緣對污俗家比丘諫告至三次而不捨之僧殘於何處制立耶於舍衛城制之由與意生起乃至緣不恭敬故於水上大小便及唾痰之突吉羅於何處制立耶於舍衛城制之因誰耶因六群比丘為何事耶六群比丘於水上大小便及唾痰為彼事也有一制一隨制六種犯罪等起中依一種等起而生起由身與意生起而不由語一制處章終一一緣行不淨法墮幾種罪耶緣行不淨法墮四種罪未被食之參照二波羅夷一突吉羅於樹膠生支波逸提緣行不淨法墮此四種罪二緣不與取墮三種罪參照二波羅夷二突吉羅緣不與取墮此三種罪三緣故意奪人生命墮三種罪波羅夷故意奪人之墮此三種罪四緣主張空無上人法墮三種罪突吉羅緣主張空無墮此三種罪一緣行泄不淨墮三種罪二緣身相觸墮五種罪比丘尼以染心捉摸有染心男子之頸骨以下膝以上部位而受樂者波羅夷比丘以身觸女人之身僧殘以身觸著於身之物者偷蘭遮以著於身之物觸著於身之物者突吉羅以指胳肢波逸提緣身相觸墮此五種罪三緣以粗惡語而言女人墮三種罪參照二四一二緣為己讚歎淫欲供養墮三種罪緣行媒介墮三種罪以下參照二令造誹謗不捨改為緣令造緣誹謗緣不捨墮三種罪一三緣污俗家比丘被諫告至三次而不捨墮三種罪依白突吉羅依二羯磨語偷蘭遮羯磨語竟僧殘乃至緣不恭敬故於水上大小便或唾痰者墮幾種罪耶緣不恭敬者墮一種罪突吉羅緣不恭敬者墮此一種罪二罪數章終一一緣行不淨法之罪於四種失壞中隨伴幾種失壞耶不淨法失壞中隨伴兩種失壞有戒壞行壞乃至緣不恭敬故於水上之罪隨伴幾種失壞耶不恭敬失壞中隨伴一種失壞行壞三失壞章終一二緣行不淨法之罪於七種罪聚中攝幾種罪聚耶不淨法罪聚中攝四種罪聚有波羅夷罪聚偷蘭遮罪聚波逸提罪聚突吉羅罪聚乃至緣不恭敬故於之罪參照四突吉羅罪聚四攝在章終一三緣行不淨法之罪六種犯罪等起中參照五五等起章終一四緣行不淨法之罪於四種諍事中參照六六諍事章終一五緣行不淨法之罪於七種滅法中參照七七滅諍章終一六緣行不淨法墮幾種罪耶緣行不淨法墮四種罪未食參照一波逸提緣行不淨法墮此四種罪其罪於四種參照八依幾種滅法而滅之耶其罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝四種罪聚有波羅夷罪聚偷蘭遮罪聚波逸提罪聚突吉羅罪聚於六種犯罪等起中八至其章末行改為緣行有依與如草覆地八集合章終八緣章終大分別之大分解中十六大章終
