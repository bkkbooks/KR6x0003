body:
  text: 律藏附隨歸命彼世尊應供等正覺第一大分別一四波羅夷依彼智者見者應供者等正覺者之世尊於何處制立第一波羅夷耶因何人耶為何事耶其處有制隨制不隨犯制耶於一切處遍通制耶一處限定制耶比丘比丘尼共通制耶不共通制耶比丘比丘尼中一部衆制耶兩部衆制耶於五種波羅提木叉讀誦法中入於何處攝入於何處耶依何讀誦法而誦出耶四種失壞中為何種失壞耶七種罪聚中為何種罪聚耶六種犯罪等起中依幾種等起而生起耶四種諍事中為何種諍事耶七種滅法中依幾種滅法而滅之耶其中何者為毗尼而何者為阿毗毗尼何者為波羅提木叉而何者為增上波羅提木叉何者為失壞而何者為成就何者為道世尊依幾種義利而制立第一波羅夷何人學習何人學習已戒住何處何人護持為何人之語而由何人傳承之一依彼智者見者應供者等正覺者之世尊於何處制立第一波羅夷耶言於毗舍離制之也因何人耶言因須提那迦蘭陀子也為何事耶言須提那迦蘭陀子與故妻共行不淨法之事也其處有制隨制不隨犯制耶言有一制二隨制其處無不隨犯制為遍通制限定制耶言遍通制也為共通制不共通制耶言共通制也一部衆制兩部衆制耶言兩部衆制也五種波羅提木叉讀誦法中入於何處攝入於何處耶言沒入於因緣攝入於因緣依何種讀誦法而誦出耶言依第二讀誦法而誦出於四種失壞中為何種失壞耶言壞戒也於七種罪聚中為何種罪聚耶言波羅夷罪聚也於六種犯罪等起中依幾種等起而生起耶言依一種等起而生起即由身與意生起而不由語於四種諍事中為何種諍事耶言犯罪諍事也於七種滅諍法中依幾種滅諍法而滅之耶言依兩種滅諍法而滅之依現前毗尼及自言治也其中何者為毗尼而何者為阿毗毗尼耶制為毗尼而細説為阿毗毗尼也何者為波羅提木叉何者為增上波羅提木叉耶言制為波羅提木叉而細説為增上波羅提木叉也何者為失壞耶言不律儀失壞也何者為成就耶言律儀成就也何者為道行耶言言我應不如是作終生至死護持於學處學行也依幾種義利故世尊制立第一波羅夷耶言依十利故世尊制立第一波羅夷為攝僧為僧安樂為調伏惡人為善比丘安樂住為斷現世漏為滅後世漏為令未信者生信為令已信者增長為正法久住為敬重律何人學習耶有學及善凡夫也何人已學戒耶言阿羅漢已學戒也住立於何處耶言住立於好學之處何人護持耶言彼具律藏及釋疏知解者護持也何人之語耶言世尊應供等正覺者之語也由何人傳承之耶言次第傳承也即優波離提沙迦以及蘇那迦悉伽婆第五目犍連子帝須此等於閻浮提印度本土稱為吉祥人其後摩哂陀伊提耶鬱帝迦參婆樓及博學之拔陀此等龍象有大智慧由閻浮提前來此地錫蘭彼等於銅鍱洲錫蘭誦出律藏教授五部尼柯耶及七論其後賢明之大阿栗吒及博學之帝沙達多有信念之伽羅須末那長老名帝加及博學之地伽須末那又有伽羅須末那及龍象之佛護賢明長老帝須及博學長老提婆又有賢明通達律藏之須摩那多聞而難屈伏如象王之專那伽于樓醯那善被尊崇之曇無波離其弟子名差摩有大智慧通達三藏於島中如諸星之王月以智慧而輝耀博學之塢波底沙及大説法者觸天更有賢明之須摩那多聞之佛波那摩通達三藏大説法者摩訶修奧更有通達律而賢明之優波離大智慧者為大龍而通曉傳統之正法更有賢明者阿波耶遍通三藏賢明之長老帝沙通達律彼弟子有大智慧多聞之佛波彼護持聖教樹立於閻浮提又賢明通達律之周羅婆耶賢明而通曉傳統正法之帝沙長老賢明而通達律藏之周羅帝瓦賢明遍通律之私波長老此等龍象有大智慧解律通道於銅鍱洲宣説律藏二依彼世尊於何處制立第二波羅夷耶言於王舍城制之也因何人耶言因檀尼迦陶師子也為何事耶言為檀尼迦陶師子取不與王木材之事也有一制一隨制六種犯罪等起中依幾種等起而生起耶言依三種等起而生起即有由身與意生起而不由語有由語與意生起而不由身有由身語意生起三乃至於何處制立第三波羅夷耶言於毗舍離制之也因何人耶言因衆多比丘也為何事耶言為衆多比丘互斷其命之事也有一制一隨制六種犯罪等起中參照二有由身語意生起四乃至於何處制立第四波羅夷耶言於毗舍離制之也因何人耶言因婆裘河畔之諸比丘也為何事耶言因婆裘河畔之諸比丘向諸居士互相讚歎上人法之事也有一制一隨制六種犯罪等起中參照二有由身語意生起四波羅夷終攝頌不淨不與取人體上人法為四波羅夷斷頭事無疑十三僧殘一依彼智者見者應供等正覺者之世尊於何處制立行泄不淨之僧殘法耶因何人耶為何事耶參照一波羅夷世尊依幾種義利而制立行泄不淨之僧殘何人學習何人學戒已住立於何處何人護持為何人之語由何人傳承之依彼智者見者應供者等正覺者之世尊於何處制立行泄不淨之僧殘耶言於舍衛城制之也因何人耶因具壽施越也為何事耶具壽施越以手行泄不淨之事也其處有制隨制不隨犯制耶有一制一隨制無不隨犯制遍通制耶限制定耶遍通制也共通制耶不共通制耶不共通制也一部衆之制耶兩部衆制耶一部衆之制也五種沒入於因緣攝入於因緣依第三讀誦法而誦出戒壞僧殘罪聚依一種等起而生起由身意生起而不由語罪諍事依兩種滅諍法而滅之依現前毗尼與自言治也參照波羅夷一依幾種義利故世尊制立故出精之僧殘耶依十利故世尊制立故出精之僧殘為攝僧為敬重律何人學習耶有學及於銅鍱洲宣説律藏二依彼智者見者應供者等正覺者之世尊於何處制立與女人身相觸之僧殘耶於舍衛城制之也因何人耶因具壽優陀夷也為何事耶因具壽優陀夷與女人身相觸之事也一制也六種犯罪等起中依一種等起而生起由身與意生起而不由語三乃至於何處制立對女人言粗惡語之僧殘耶於舍衛城制之也因何人耶因具壽優陀夷為何事耶具壽優陀夷對女人言粗惡語之事也一制也六種犯罪等起中依三種等起而生起有由身與意生起而不由語有由語與意生起而不由身有由身語意生起四乃至於何處制立於女人前為己讚歎淫欲供養之僧殘耶於舍衛城制之也因具壽優陀夷具壽優陀夷於女人前為己讚歎淫欲供養參照三五乃至於何處制立為媒者之僧殘耶於舍衛城制之也因具壽優陀夷具壽優陀夷為媒者有一制一隨制依六種等起而生起有由身生起而不由語亦不由意有由語生起而不由身亦不由意有由身與語生起而不由意有由身與意生起而不由語有由語與意生起而不由身有由身語意生起六乃至於何處制立自乞造房舍之僧殘耶於阿羅毗制之也因阿羅毗之諸比丘阿羅毗之諸比丘自乞而令造房舍有一制依六種等起而生起七乃至於何處制立造大精舍之僧殘耶於憍賞彌制之也因具壽闡陀具壽闡陀求精舍之地而伐一神廟樹有一制依六種等起而生起八乃至於何處制立以無根波羅夷法誹謗比丘之僧殘耶於王舍城制之也因慈比丘地比丘慈比丘地比丘以無根波羅夷法誹謗具壽沓婆摩羅子有一制依三種等起而生起九乃至於何處制立唯取異事中之某種類似點以波羅夷法誹謗比丘之僧殘耶於王舍城制之也因慈比丘地比丘慈比丘地比丘以異事中誹謗具壽沓婆摩羅子有一制依三種等起而生起一乃至於何處制立破僧比丘被諫告至二次不捨之僧殘耶於王舍城制之也因提婆達多提婆達多企圖破和合僧有一制依一種等起而生起由身語意生起一一乃至於何處制立隨破僧者之諸比丘被諫告至三次而不捨之僧殘耶於王舍城制之也因衆多比丘衆多比丘為提婆達多企圖破僧之徒黨有一制依一種等起一二乃至於何處制立惡口比丘被諫告至三次而不捨之僧殘耶於憍賞彌制之也因具壽闡陀由諸比丘如法語具壽闡陀而具壽闡陀以自身為不可共語有一制依一種等起一三乃至於何處制立比丘穢污俗家被諫告至三次而不捨之僧殘耶於舍衛城制之也因阿濕婆富那婆娑比丘僧衆與阿濕婆富那婆娑比丘驅出羯磨而誹謗諸比丘是隨愛隨瞋隨癡隨怖者有一制依一種等起十三僧殘終攝頌不淨身觸粗語為己讚淫欲法媒介造房精舍無根似是破僧助破惡口污俗此為十三僧殘二不定一依彼智者見者應供者等正覺者之世尊於何處制立第一不定耶因何人耶為何事耶依幾種義利故世尊制立第一不定由何人傳承之依彼世尊於何處制立第一不定耶於舍衛城制之也因何人耶因具壽優陀夷也為何事耶具壽優陀夷與女人相對共坐於祕密可淫屏處之事也其處有制參照僧殘一依第四讀誦法而誦出四種失壞中為何種失壞耶有戒失壞行失壞七種罪聚中為何種罪聚耶有波羅夷罪聚僧殘罪聚波逸提罪聚六種犯罪等起中依幾種等起而生起耶依一種等起而生起由身與意生起而不由語罪諍事也依三種滅諍法而滅之有依現前毗尼與自言治有依現前毗尼與如草覆地依幾種義利故世尊制立第一不定耶依十種義利故世尊制立第一不定為攝僧為敬重律何人學習耶有學及於銅鍱洲宣説律藏二依彼世尊於何處制立第二不定耶於舍衛城制之也因具壽優陀夷具壽優陀夷與一女人相對共坐於祕密處之事也其處有制參照不定一為何種罪聚耶有僧殘罪聚波逸提罪聚六種犯罪等起中依幾種等起而生起耶依三種等起而生起有由身與意生起而不由語有由語與意生起而不由身有由身語意生起有依如草覆地二不定終攝頌可淫處不然不定乃世尊最勝尊善制三十捨墮第一迦絺那衣品一依彼世尊於何處制立長衣蓄過十日之捨墮耶於毗舍離制之也因何人耶因六群比丘也為何事耶六群比丘蓄長衣之事也有一制一隨制六種犯罪等起中依兩種等起而生起有由身與語生起而不由意有由身語意生起二乃至於何處制立一夜離三衣之捨墮耶於舍衛城制之也因衆多比丘衆多比丘託衣於諸比丘處唯著安陀會及鬱多羅僧出遊諸國有一制一隨制六種參照捨墮一三乃至於何處制立納受非時衣蓄過一月之捨墮耶於舍衛城制之也因衆多比丘衆多比丘納受非時衣而蓄過一月有一制一隨制六種四乃至令非親里比丘尼洗故衣之捨墮於舍衛城制之也因具壽優陀夷具壽優陀夷令非親里比丘尼洗故衣有一制六種犯罪等起中依六種等起而生起五乃至由非親里比丘尼手受衣之捨墮於王舍城制之也因具壽優陀夷具壽優陀夷由非親里比丘尼手受衣有一制一隨制依六種等起而生起六乃至向非親里之居士或居士婦乞衣之捨墮於舍衛城制之也因具壽優波難陀釋子具壽優波難陀釋子向非親里之長者子乞衣有一制一隨制依六種等起而生起七乃至向非親里之居士或居士婦乞過量衣之捨墮於王舍城制之因六群比丘六群比丘不知量而多乞求衣有一制依六種等起而生起八乃至未受請而先至非親里居士處就衣作指示之捨墮於舍衛城制之因具壽優波難陀釋子具壽優波難陀釋子未受請而先至非親里居士處就衣作指示一制依六種等起而生起九乃至未受請而先至非親里居士等處就衣作指示之捨墮於舍衛城制之因具壽優波難陀釋子具壽優波難陀釋子未受請而先至非親里諸居士處就衣作指有一制依六種等起而生起一乃至催促三次以上默立六次以上而得衣之捨墮於王舍城制之因具壽優波難陀釋子優婆塞言具壽優波難陀釋子大德請待今日一日而不待有一制依六種等起而生起第二蠶綿品一一乃至以雜絹絲作臥具之捨墮於阿羅毗制之也因六群比丘六群比丘至養蠶家如是言賢者多煮蠶繭與我等我等欲作雜絹絲之臥具有一制依六種等起而生起一二乃至令作純黑色羊毛臥具之捨墮於毗舍離制之因六群比丘六群比丘令作純黑色羊毛臥具有一制依六種等起而生起一三乃至不取用一多羅量之白色羊毛一多羅量之褐色羊毛而作新臥具之捨墮於舍衛城制之因六群比丘六群比丘唯取用白色羊毛為邊緣而令作純黑色羊毛之臥具有一制依六種等起而生起一四乃至年年作臥具之捨墮於舍衛城制之因衆多比丘衆多比丘年年令作臥具有一制一隨制依六種等起而生起一五乃至不從舊臥具邊緣取用一佛搩手而作新臥具之捨墮於舍衛城制之因衆多比丘衆多比丘捨臥具取阿蘭若者分乞食者分糞掃衣者分有一制依六種等起而生起一六乃至持羊毛行過三由旬之捨墮於舍衛城制之因一比丘一比丘持羊毛行過三由旬有一制依兩種等起而生起有由身生起而不由語亦不由意有由身與意生起而不由語一七乃至令非親里比丘尼洗羊毛之捨墮於釋迦國制之因六群比丘六群比丘令非親里比丘尼洗羊毛有一制依六種等起而生起一八乃至受持金錢之捨墮於王舍城制之因具壽優波難陀釋子具壽優波難陀釋子受持金錢有一制依六種等起而生起一九乃至買賣種種金銀之捨墮於舍衛城制之因六群比丘六群比丘買賣種種金銀有一制依六種等起而生起二乃至行種種交易之捨墮於舍衛城制之具壽優波難陀釋子與遊行者行交易有一制依六種等起而生起第三鉢品二一乃至長鉢蓄過十日之捨墮於舍衛城制之因六群比丘六群比丘蓄長鉢有一制一隨制依兩種等起而生起有由身與語生起而不由意有由身語意生起二二乃至鉢不至五綴而求其他新鉢之捨墮於釋迦國制之因六群比丘六群比丘依微損微破微壞而多乞鉢有一制依六種等起而生起二三乃至得藥而蓄過七日之捨墮於舍衛城制之因衆多比丘衆多比丘得藥蓄過七日有一制於迦絺那衣戒依兩種等起而生起二四乃至熱季之最後一月以前求雨季衣之捨墮於舍衛城制之因六群比丘六群比丘於熱季最後一月以前求雨季衣有一制依六種等起而生起二五乃至比丘自以衣施與後忿怒不喜奪回之捨墮於舍衛城制之因具壽優波難陀釋子具壽優波難陀釋子自以衣施與他比丘後忿怒不喜而奪回有一制依三種等起而生起二六乃至自乞絲令織師織衣之捨墮於王舍城制之因六群比丘六群比丘自乞絲令織師織衣有一制依六種等起而生起二七乃至未受請而先至非親里居士之織師處就衣作指示之捨墮於舍衛城制之因具壽優波難陀釋子具壽優波難陀釋子未受請先至非親里居士之織師處就衣作指示有一制依六種等起而生起二八乃至領受特施衣而蓄過衣時之捨墮於舍衛城制之因衆多比丘衆多比丘領受特施衣而蓄過衣時有一制於迦絺那衣戒依兩種等起而生起二九乃至三衣中之一衣寄置於民家離其衣過六夜之捨墮於舍衛城制之因衆多比丘衆多比丘三衣中之一衣寄置於民家離其衣過六夜有一制於迦絺那衣戒依兩種等起而生起三乃至明知為供養僧之物而回入為己有之捨墮於舍衛城制之因六群比丘六群比丘知是供養僧之物而回入為己有有一制依三種等起而生起三十捨墮終攝頌十日與一夜一月及浣取非親里指示兩人及使送蠶綿純二分六年臥坐具羊毛之捉取二種種交易二鉢藥雨衣第五之布施自織特施衣有難僧伽物九十二波逸提第一妄語品一依彼智者見者應供者等正覺者之世尊於何處制立故意妄語之波逸提耶於舍衛城制之也因何人耶因喝陀伽釋子也為何事耶喝陀伽釋子與外道論議以非為是以是為非之事也有一制依六種犯罪等起中三種等起而生起有由身與意生起而不由語有由語與意生起而不由身有由身語意生起二於罵詈語之波逸提於舍衛城制之因六群比丘六群比丘與比丘諍論罵善比丘有一制依三種等起而生起三以語離間比丘之波逸提於舍衛城制之因六群比丘六群比丘起鬥諍諍論與諸比丘離間語有一制依三種等起而生起四令未受具戒者一同逐句誦法之波逸提於舍衛城制之因六群比丘六群比丘令優婆塞逐句一同誦法有一制依兩種等起而生起有由語生起而不由身亦不由意有由語意生起而不由身五與未受具戒者同宿過二夜三夜之波逸提於阿羅毗制之因衆多比丘衆多比丘與未受具戒者同宿有一制一隨制依兩種等起而生起有由身生起而不由語亦不由意有由身與意生起而不由語六與女人同宿之波逸提於舍衛城制之因具壽阿那律具壽阿那律與女人同宿有一制於羊毛戒依兩種等起而生起七對女人説法過五六語之波逸提於舍衛城制之因具壽優陀夷具壽優陀夷對女人説法有一制二隨制於隨句法戒依兩種等起而生起八對未受具戒者説實有上人法之波逸提於毗舍離制之因婆裘河邊之諸比丘婆裘河邊之諸比丘向諸居士相互讚歎上人法有一制依三種等起而生起有由身生起而不由語亦不由意有由語生起而不由身亦不由意有由身與語生起而不由意九對未受具戒人語比丘粗罪之波逸提於舍衛城制之因六群比丘六群比丘將他比丘之粗罪語未受具戒人有一制依三種等起而生起乃至一掘地之波逸提於阿羅毗制之因阿羅