承諾而解有三種罪由白參照二五比丘尼持染心從有染心男子之手以己手受硬食或軟食而食者有三種罪噉食而捉偷蘭遮每咽食僧殘捉水楊枝突吉羅六以言勸曰尊姊汝無染心故彼男子染心之有無對汝能如何然尊姊彼男子與汝之硬食或軟食可以己之手受食有三種罪依彼尼之語噉食而捉者突吉羅每咽食偷蘭遮食事竟僧殘七瞋怒不喜之比丘尼被諫告至三次而不捨者有三種罪由白突吉羅參照二八於何等之諍事被斥責之比丘尼被諫告至三次而不捨者有三種罪由白九相親近之比丘尼被諫告至三次而不捨者有三種罪由白一以言勸曰大姊等汝等應相親近而住汝等勿各別住被諫告至三次而不捨者有三種罪由白僧殘終一蓄鉢有一種罪捨墮二以非時衣為時衣而執持分配有兩種罪令分配之前行者突吉羅分配時捨墮三與比丘尼交換衣而後奪取有兩種罪奪取之前行者突吉羅奪時捨墮四乞此後又乞彼有兩種罪乞之前行者突吉羅乞時捨墮五購此後換購彼參照四六已為僧伽指定此某物而施與之資財而購彼者有兩種罪購之前行者突吉羅購已捨墮七一已為僧伽指定此某物而施與之資財又自乞於衆人自乞於衆人自乞個人而購他物參照六一一求重衣過最高四康沙有兩種罪求之前行者突吉羅求時捨墮一二求輕衣過最高二康沙半捨墮終第一蒜品一食蒜者有兩種罪欲食而捉者突吉羅每咽食波逸提二剃除密處毛有兩種罪剃除之前行者突吉羅剃除已波逸提三以掌相拍有兩種罪相拍之前行者突吉羅拍已波逸提四受用樹膠生支有兩種罪受用之前行者突吉羅受用已波逸提五以水洗淨密處過最長二指節有兩種參照四六以飲物或扇伺候食事中比丘有兩種罪立於伸手內者波逸提立於離伸手內者突吉羅七乞生穀而食有兩種罪欲食而捉者突吉羅每咽食波逸提八小便或大便或埃屑或剩飯棄於牆外有兩種罪棄之前行者突吉羅棄時波逸提九小便或剩飯棄於青草上一往觀聽舞踊歌謠音樂有兩種罪前往者突吉羅立彼處觀聽者波逸提第二暗夜品一一於暗夜中無燈火處與男子單獨並立有兩種罪立於伸手內者波逸提立於離伸手內者突吉羅一二於屏覆處與男子單獨並立一三於露處與男子單獨並立一四於車道或於小路或於街衢與男子單獨並立一五於食前至俗家坐於座牀不告主人而離去有兩種罪第一腳過軒者突吉羅第二腳過者波逸提一六於食後至俗家不告主人而坐或臥座牀有兩種罪坐之前行者突吉羅坐已波逸提一七於非時至俗家不告主人而敷或令敷臥牀而坐有兩種罪坐之前行突吉羅坐已波逸提一八因不善領受語誤解而嫌恨他人有兩種罪嫌恨之前行者突吉羅嫌恨時波逸提一九對自己或他人以生地獄或去梵行而咒詛有兩種罪咒詛之前行者突吉羅咒詛已波逸提二自打而哭泣有兩種罪打而哭泣波逸提打而不泣突吉羅第三沐浴品二一裸體沐浴有兩種罪沐浴之前行者突吉羅沐浴已波逸提二二作過量之沐浴衣有兩種罪作之前行者突吉羅作時波逸提二三解或令解比丘尼之衣不為縫製或不為縫製而努力有一種罪波逸提二四不著僧伽梨超過五日有一種二五著他人所有之衣有兩種著之前行者突吉羅著時波逸提二六妨礙衆僧得衣有兩種罪妨礙之前行者突吉羅已妨礙波逸提二七遮止如法分配衣有兩種罪遮止之前行者突吉羅遮止時波逸提二八以沙門之衣與在家者或遍行外道男遍行外道女有兩種罪與之前行者突吉羅與時波逸提二九寄望於未確定之衣而過衣時有兩種罪過之前行者突吉羅過已波逸提三遮止如法捨迦絺那衣有兩種罪參照二七第四共臥品三一二比丘尼共臥一牀有兩種罪臥之前行者突吉羅已臥波逸提三二二比丘尼共一被褥三三故意令比丘尼惱亂有兩種惱亂之前行者突吉羅惱亂已波逸提三四不看護患病之同住比丘尼又不為看病而奔走有一種罪波逸提三五以住房與比丘尼事後瞋怒不喜即驅出有兩種罪驅出之前行者突吉羅驅出已波逸提三六諫告親近比丘尼至三次而不捨有兩種罪由白突吉羅羯磨語竟波逸提三七於國內見有危險具恐怖不與商隊結伴而遊行有兩種罪行之前行者突吉羅行時波逸提三八於國外見有危險參照三七三九於雨期中遊行有兩種罪行之四安居竟比丘尼不出遊行有一種罪波逸提第五畫堂品四一為往觀王宮或繪畫堂或公園或園林或蓮池有兩種罪往之突吉羅立彼處觀者波逸提四二用高牀或尾毛牀有兩種罪用之前行者突吉羅用時波逸提四三紡絲有兩種罪紡之前行者突吉羅撚捲時波逸提四四為在家者作事有兩種罪作之前行者突吉羅作時波逸提四五依比丘尼言尊姊來滅此諍事答曰可應諾而不滅又不為滅而努力有一種罪波逸提四六親手以硬食或軟食與在家者遍行外道男遍行外道女有兩種罪與之前行者突吉羅與時波逸提四七不捨月華衣而繼續使用者有兩種罪使用之前行者突吉羅使用時波逸提四八不捨住處而出遊行有兩種罪第一腳過籬者突吉羅第二腳過籬者波逸提四九學畜生咒有兩種罪學之前行者突吉羅學之句句波逸提五教畜生咒有兩種罪教之前行第六僧園品五一知有比丘之僧園不問而入有兩種罪第一腳過籬參照四八五二以惡口辱罵比丘有兩種罪辱罵之前行者突吉羅辱罵時波逸提五三瞋而罵衆有兩種罵之前行者突吉羅罵時波逸提五四先受請且足食已而又食嚼食或噉食有兩種罪噉食而捉者突吉羅每咽食波逸提五五慳嫉俗家有兩種慳嫉之前行者突吉羅慳嫉時波逸提五六於無比丘之住處入安居有兩種罪入安居而備坐臥處飲水用水清掃房舍突吉羅至日出波逸提五七安居竟比丘尼於二部僧中不依三事而行自恣有一種罪波逸提五八不為教誡或共住事而往有一種五九不問布薩又不乞求教誡有一種六下部生癰或瘡未得僧伽或衆之允可單獨一人共男子一人破之有兩種罪令破之前行者突吉羅破時波逸提第七妊婦品六一令妊婦受具戒有兩種令受具戒之前行者突吉羅受具戒已波逸提六二六七令有幼兒之婦女令於二年未學六法戒之式叉摩那令於二年學六法戒之式叉摩那未得僧伽之許可令未滿十二歲之曾嫁女令滿十二歲之曾嫁女於二年未學六法戒令滿十二歲之曾嫁女已於二年學六法戒未得僧伽之許可而受具戒者有兩種罪令受具之前行者突吉羅令受具戒已波逸提六八令弟子受具戒後二年不教護又不令教護有一種罪波逸提六九受具戒後二年不隨師學有一種七令弟子受具戒後不遠離或不令遠離有一種第八童女品七一令未滿二十歲童女受具戒參照六一七二令滿二十歲童女於二年未學六法戒而受具戒七三令滿二十歲童女於二年學六法戒未得僧伽之許可而受具戒七四受具戒後未滿十二夏而令人受具足戒七五滿十二夏未得僧伽之許可而令人受具足戒七六言友實依師授具戒而已充足矣時是應諾而後瞋嫌有兩種罪瞋嫌之前行突吉羅瞋嫌時波逸提七七言式叉摩那友汝若與我衣我令汝受具戒而不令受具戒又不為令受具戒而努力有一種罪波逸提七八言式叉摩那友汝若於二年隨我學我令汝受具戒有一種七九因與男子交往童子交往而起瞋恚陷於憂愁之式叉摩那令受具戒參照七一八令父母及夫主未聽許之式叉摩那受具戒八一欲由別住者給豫承諾而令式叉摩那受具戒八二年年令人受具戒八三一年令二人受具戒第九蓋品八四持蓋著履有兩種罪持著之前行者突吉羅持著時波逸提八五乘於乘坐物而往有兩種罪往之前行者突吉羅行已波逸提八六著腰布參照八四八七著婦女裝飾物八八塗香與脂粉有兩種罪塗之前行者突吉羅塗時波逸提八九以香料胡麻滓塗於身九九三令比丘尼式叉摩那沙彌尼白衣女揉身又按摩有兩種罪揉身按摩之前行者突吉羅令按摩時波逸提九四於比丘前不問而坐於座牀有兩種罪坐之前行者突吉羅坐時波逸提九五未得許可而質問比丘有兩種罪問之前行者突吉羅問時波逸提九六不著僧祇支衣而入村有兩種罪第一腳過籬者突吉羅第二腳過籬者波逸提小事戒終一八乞酥油蜜砂糖魚肉乳酪而食有兩種罪噉食而捉者突吉羅每咽食提舍尼八提舍尼終二罪數章終三持染心之比丘尼觸有染心男子之身而受樂之罪於四種失壞中隨伴幾種失壞耶持染心失壞中隨伴兩種失壞有戒壞行壞乃至乞酪而食之罪於四種失壞中幾種隨伴一種失壞行壞三失壞章終四持染心罪於七種罪聚中攝幾種罪聚耶持染心罪聚中攝三種罪聚有波羅夷罪聚偷蘭遮罪聚突吉羅罪聚乃至乞酪而食之罪攝兩種罪聚有提舍尼罪聚突吉羅罪聚四攝在章終五持染心罪於六種犯罪等起中依幾種等起而生起耶持染心犯罪等起中依一種等起而生起由身意生起而不由語乃至乞酪而食之罪依四種等起而生起有由身生起而不由語有由身語生起而不由意有由身意生起而不由語有由身語意生起五等起章終六持染心罪於四種諍事中為何諍事耶持染心諍事中為犯罪諍事乃至乞酪而食之罪為犯罪諍事六諍事章終七持染心罪於七種滅諍法中依幾種滅法而滅之耶持染心滅法中依三種滅法而滅之有現前毗尼與自言治現前毗尼與如草覆地乃至乞酪而食之罪依三種滅法而滅有如草覆地七滅諍章終八持染心之比丘尼觸有染心男子之身而受樂有幾種罪耶持染心有三種罪由頸骨以下參照二有此三種罪其罪於四種失壞中隨伴幾種失壞耶於七種罪聚中攝幾種罪聚耶於六種犯罪等起中依幾種等起而生起耶於四種諍事中為何種之諍事耶於七種滅法中依幾種滅法而滅之耶彼罪於四種失壞中參照大分別八如草覆地乃至乞酪而食有幾種罪耶乞酪而食有兩種罪欲食而捉者突吉羅每咽食提舍尼酪有此兩種罪彼罪於四種失壞中隨伴幾種失壞耶而滅耶彼罪於四種失壞中隨伴一種失壞行壞於七種罪聚中攝兩種罪聚有提舍尼罪聚突吉羅罪聚於六種犯罪等起中由四種等起而生起有由身生起而不由語意有由身語生起而不由意有由身意生起而不由語有由身語意生起於四種諍事中為犯罪諍事於七種滅法中有依三種如草覆地八集合章終九一依彼智者見者應供者等正覺者之世尊緣身觸受樂之波羅夷於何處制立耶因何人耶為何事耶乃至由何人傳承耶依彼世尊緣受樂之波羅夷於何處制立耶於舍衛城制之參照一由身意生起而不由語由何人傳承耶為次第傳承即優波離提沙迦宣說律藏二緣覆藏罪之波羅夷於何處制立耶參照一於怠務戒依一種等起而生起三諫告至三次而不捨之波羅夷於何處制立耶於怠務戒四緣成第八事之波羅夷於怠務戒波羅夷終一依彼世尊比丘尼行訴訟之僧殘於何處制立耶因何人耶參照一有由意生起乃至由何人傳承耶為次第傳承即優波離提沙迦宣說律藏二令賊女受具戒之僧殘有由意生起三獨行於村中之僧殘於第一波羅夷四依和合僧如法如律如師教而被擯之比丘尼未得羯磨僧伽之容許不認僧衆之承諾而解罪之僧殘於怠務戒五比丘尼持染心從有染心男子之手以己手受硬食或軟食而食之僧殘於第一波羅夷六以言勸曰尊姊汝無染心故彼男子染心之有無對汝能如何然尊姊彼男子與汝之硬食或軟食可以己之手受食之僧殘生起七瞋怒不喜之比丘尼被諫告至三次而不捨之僧殘於怠務戒八於何等之諍事被斥責之比丘尼被諫告至三次而不捨之僧殘於怠務戒九相親近比丘尼被諫告至三次而不捨之僧殘於怠務戒一以言勸曰大姊等汝等應相親近而住汝等勿各別住被諫告至三次而不捨之僧殘於怠務戒乃至緣乞酪而食之提舍尼由四種等起而生起一制處章終一一緣身觸而受樂有幾種罪耶緣身觸而受樂有五種罪持染心之比丘尼捉有染心男子之頸骨以下膝以上而受樂者波羅夷比丘以身觸女人之身僧殘以身觸身之所著物偷蘭遮以身所著物觸身之所著物突吉羅以指胳肢波逸提緣身觸之受樂有此五種罪二緣覆藏罪有幾種墮四種罪比丘尼知犯波羅夷法而覆藏者波羅夷有疑念而覆藏者偷蘭遮覆藏比丘僧殘者波逸提覆藏行儀之失壞者突吉羅緣覆藏罪墮此四種罪三被諫告至三次而不捨有幾種罪耶墮五種罪隨被擯比丘尼被諫告至三次而不捨者依白突吉羅依二羯磨語偷蘭遮羯磨語竟波羅夷助破僧比丘尼至三次而不捨者僧殘惡見被諫告至三次而不捨者波逸提緣諫告至三次而不捨者墮此五種罪四緣成第八事有幾種墮三種罪參照二墮此三種罪波羅夷終一緣比丘尼行訴訟有三種參照二僧殘二緣令賊女受具戒有三種三緣獨行於村中有三種四緣和合僧如法如律如師教而被舉罪之比丘尼未得羯磨僧伽之容許不認僧衆之承諾而解有三種五緣比丘尼持染心從有染心男子之手以己之手接受硬食或軟食而食墮三種罪噉食而捉者偷蘭遮每咽食僧殘捉水楊枝者突吉羅六緣以言勸曰尊姊汝無染心故噉食墮三種七緣瞋怒不喜之比丘尼被諫告至三次而不捨墮三種八緣於何等諍事而被斥責之比丘尼被諫告至三次而不捨墮三種九緣相親近之比丘尼被諫告至三次而不捨墮三種一勸以言曰大姊等汝等應相親近而住汝等勿各別住被諫告至三次而不捨墮三種十僧殘終乃至八緣乞酪而食有幾種墮兩種罪噉食而捉者突吉羅每咽食提舍尼緣乞酪而食墮此兩種罪二罪數章終一一緣以身觸受樂之罪於四種失壞中何參照三隨伴兩種失壞有戒壞行壞乃至緣乞酪而食之罪行壞三失壞章終一二緣以身觸受樂之罪於七種罪聚中攝幾種攝五種罪聚有波羅夷罪聚僧殘罪聚偷蘭遮罪聚波逸提罪聚突吉羅罪聚乃至緣乞酪而食之罪攝兩種罪聚有提舍尼罪聚突吉羅罪聚四攝在章終一三緣以身觸受樂之罪於六種犯罪等起中由幾種參照五緣乞酪而食之罪於六種犯罪等起中由意生起五等起章終一四緣以身觸受樂之罪於四種諍事中參照六六諍事章終一五緣以身觸受樂之罪於七種滅法中參照七七滅諍章終一六緣以身觸受樂墮幾種罪耶以身觸受樂墮五種罪有染心參照一以指胳肢波逸提以身觸受樂墮此五種罪彼罪於四種失壞中為何種參照大分別八依幾種滅法而滅之耶彼罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝五種罪聚有波羅夷罪聚僧殘罪聚偷蘭遮罪聚波逸提罪聚突吉羅罪聚於六種犯罪等起中依一種參照大分別八如草覆地緣乞酪而食墮幾種墮兩種罪如草覆地八集合章終比丘尼分別之十六大分解終
