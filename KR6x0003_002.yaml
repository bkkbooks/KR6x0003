body:
  text: 第二比丘尼分別一一依彼智者見者應供者等正覺之世尊於何處為比丘尼制立第五波羅夷耶參照大分別波羅夷一一五種波羅提木叉讀誦法中改為四種波羅提木叉讀誦法中依幾種義利而世尊為比丘尼制立第五波羅夷耶何人學習何人已學戒住立於何處何人護持何人之語由何人傳承之耶依彼世尊於何處為比丘尼制立第五波羅夷耶於舍衛城制之因何人耶因孫多利難陀比丘尼也為何事耶孫多利難陀比丘尼以染心觸有染心男子之身而受樂為彼事也其處有制隨制不隨犯制耶有一制其處無隨制不隨犯制遍通制限定制耶遍通制也共通制不共通制耶不共通制也為一部衆制耶為兩部衆制耶為一部衆制也四種波羅提木叉讀誦法中參照大分別一依幾種義利而世尊為比丘尼制立第五波羅夷耶依十利故世尊為比丘尼制立第五波羅夷為攝僧參照大分別一惡人及比丘改為比丘尼為敬重律何人學習耶有學及善凡夫女也何人已學戒耶阿羅漢尼已學習戒也住立於何處耶住立於好學戒處何人護持耶對彼戒轉起之人護持也何人之語耶世尊應供等正覺者之語也由何人傳承之耶次第傳承也即優波離提沙迦於銅鍱洲宣說律藏二依彼世尊於何處為比丘尼制立第六波羅夷耶於舍衛城制之因何人耶因偷蘭難陀比丘尼也為何事耶偷蘭難陀比丘尼知其他比丘尼犯波羅夷法而不自舉罪不告衆為彼事也有一制六種犯罪等起中依一種等起而生起由身語意生起三於何處為比丘尼制立第七波羅夷耶於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼隨順被和合僧所擯之原馴鷹師阿利吒比丘有一制於怠務戒依一種等起而生起四為比丘尼第八波羅夷於舍衛城制之因六群比丘尼六群比丘尼成第八事有一制於怠務戒依一種等起而生起八波羅夷終攝頌不淨不與取人體上人法身觸及覆罪被擯具八事請大雄制立斷頭事無疑一依彼世尊於何處制立行訴訟比丘尼之僧殘耶因何人為何事耶乃至由何人傳承之耶依彼世尊於何處制立行訴訟比丘尼之僧殘耶於舍衛城制之因何人耶因偷蘭難陀比丘尼也為何事耶偷蘭難陀比丘尼行訴訟為彼事也其處制參照第二一波羅夷一依第二讀誦法波羅夷罪聚改為依第三讀誦法僧殘罪聚生起耶依兩種等起而生起有由身與語生起而不由意有由身語意生起乃至由何人傳承之耶次第傳承即優波離提沙迦於銅鍱洲宣說律藏二令賊女受具足戒之僧殘於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼令賊女受具足有一制依兩種等起而生起有由語與意生起而不由身有由身語意生起三獨行於村中之僧殘於舍衛城制之因一比丘尼一比丘尼獨行於村中有一制三隨制於第一波羅夷依一種等起而生起四依和合僧如法如律如師教而被舉罪之比丘尼未得羯磨僧伽之容許不認僧衆之承諾而解罪之僧殘於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼為依和合僧如法如律如師教而舉罪之比丘尼未得羯磨僧伽之容許不認僧衆之承諾而解罪有一制於怠務戒依一種等起而生起五比丘尼持染心從有染心男子之手以己之手接受硬食或軟食而食之僧殘於舍衛城制之因孫多利難陀比丘尼持染心從有染心男子之手取食有一制於第一波羅夷依一種等起而生起六以言勸曰尊姊汝無染心故彼男子染心之有無對汝能如何然尊姊彼男子與汝之硬食或軟食可以己之手受食之僧殘於舍衛城制之因一比丘尼勸一比丘尼尊姊汝食有一制依三種等起而生起七瞋怒不喜之比丘尼被諫告至三次而不捨之僧殘於舍衛城制之因旃達加利比丘尼旃達加利比丘尼瞋怒不喜作如是言我捨佛我捨法我捨僧我捨戒有一制於怠務戒依一種等起而生起八於何等諍事而被斥責之比丘尼被諫告至三次而不捨之僧殘於舍衛城制之因旃達加利比丘尼旃達加利比丘尼因某諍事而被斥責瞋怒不喜作如是言諸比丘尼是隨欲隨瞋隨癡隨怖有一制於怠務戒依一種等起而生起九相親近之比丘尼被諫告至三次而不捨之僧殘於舍衛城制之因衆多比丘尼衆多比丘尼相親近而住有一制於怠務戒依一種等起而生起一以言勸曰大姊等汝等應相親近而住汝等勿各別住被諫告至三次而不捨之僧殘於舍衛城制之因偷蘭難陀比丘尼勸偷蘭難陀比丘尼言諸尊姊汝等應相親近有一制於怠務戒依一種等起而生起十僧殘終攝頌訴訟與賊女村中及被舉噉食汝何瞋因某等諍事親近依其他此等共十事一依彼世尊蓄鉢之捨墮於舍衛城制之因六群比丘尼六群比丘尼蓄鉢有一制於迦絺那衣戒依兩種等起而生起二以非時衣為時衣而執持分配之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼以非時衣為時衣而受持分配有一制依三種等起而生起三與比丘尼交換衣後而奪之之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼與其他比丘尼交換衣後而奪之有一制依三種等起而生起四乞此後又乞彼之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼乞此而後乞彼有一制依六種等起而生起五購此而後換購彼參照四將乞改為購六已為僧伽指定此某物而施與之資財而購他物之捨墮於舍衛城制之因衆多比丘尼衆多比丘尼指定此購他物有一制依六種等起而生起七已為僧伽指定此某物而施與之資財又自乞而購他物八為大衆指定此某物而施與之資財而購他物九已為大衆指定此某物而施與之資財又自乞而購他物一使用指定此某物而施與個人之資財又自乞而購他物之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼自乞購他物有一制依六種等起而生起一一求重衣過最高四康沙之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼乞王之毛衣有一制依六種等起而生起一二求輕衣過最高二康沙半之捨墮於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼乞王之麻衣有一制依六種等起而生起十二捨墮終攝頌鉢非時時衣交換及乞求購施與僧伽衆人與自乞個人四康沙及二康沙半第一蒜品一依彼世尊食蒜之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼不知量多取蒜有一制於羊毛戒依兩種等起而生起二剃除密處毛之波逸提於舍衛城制之因六群比丘尼六群比丘尼剃密處毛有一制依四種等起而生起三以掌相拍之波逸提於舍衛城制之因二比丘尼二比丘尼以掌相拍有一制於第一波羅夷依一種等起而生起四受用樹膠生支之波逸提於舍衛城制之因一比丘尼一比丘尼受用樹膠生支有一制於第一波羅夷依一種等起而生起五以水洗淨密處超過最長二指節之波逸提於釋迦國制之因一比丘尼一比丘尼行過深洗有一制於第一波羅夷依一種等起而生起六以飲物或扇伺候食事中比丘之波逸提於舍衛城制之因一比丘尼一比丘尼以飲物及扇伺候食事中比丘有一制於羊毛戒依兩種等起而生起七乞生穀而食之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼乞生穀而食有一制依四種等起而生起八小便或大便或埃屑或剩飯棄於牆外之波逸提於舍衛城制之因一比丘尼一比丘尼將小便大便埃屑剩飯棄於牆外有一制依六種等起而生起九小便或大便或埃屑或剩飯棄於青草上之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼將小便剩飯棄於青草上有一制依六種等起而生起一往觀聽舞踊歌謠音樂之波逸提於舍衛城制之因六群比丘尼六群比丘尼往觀聽舞踊歌謠音樂有一制於羊毛戒依兩種等起而生起第二暗夜品一一於暗夜中無燈火處與男子單獨並立而語之波逸提於舍衛城制之因一比丘尼一比丘尼於暗夜中無燈火處與男子單獨並立有一制於賊隊戒依兩種等起而生起一二於屏覆處與男子單獨並參照一一暗夜中無燈火處改為屏覆處一三於露處與男子單獨並一四於車道或於小路或於街衢與男子單獨並立之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼於車道於小路於街衢與男子單獨並立有一制於賊隊戒依兩種等起而生起一五於食前至俗家坐於座牀不告主人而離去之波逸提於舍衛城制之因一比丘尼一比丘尼於食前不告主人而離去有一制於迦絺那衣戒依兩種等起而生起一六於食後至俗家不告主人而坐或臥座牀之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼於食後而坐有一制於迦絺那衣戒依兩種等起而生起一七於非時至俗家不告主人而敷或令敷臥牀而坐之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼於非時至俗家不告主人而敷臥牀而坐有一制於迦絺那衣戒依兩種等起而生起一八因不善領受語誤解而嫌恨他人之波逸提於舍衛城制之因一比丘尼一比丘尼不善領受語誤解而嫌恨他人有一制依三種等起而生起一九對自己或他人以生地獄去梵行而咒詛之波逸提於舍衛城制之因旃達加利比丘尼旃達加利比丘尼對自己及他人以生地獄及去梵行而咒詛之有一制依三種等起而生起二自打而哭泣之波逸提於舍衛城制之因旃達加利比丘尼旃達加利比丘尼自打而哭泣有一制於怠務戒依一種等起而生起第三沐浴品二一裸體沐浴之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼裸體沐浴有一制於羊毛戒依兩種等起而生起二二作過量沐浴衣之波逸提於舍衛城制之因六群比丘尼六群比丘尼作過量沐浴衣有一制依六種等起而生起二三解或令解比丘尼之衣不為縫製或不為縫製而努力之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼解比丘尼不縫亦不為縫製而努力有一制於怠務戒依一種等起而生起二四不著僧伽梨超過五日之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼將衣託於諸比丘尼之手僅著內外衣而出遊諸國有一制於迦絺那衣戒依兩種等起而生起二五著他人所有之衣之波逸提於舍衛城制之因一比丘尼一比丘尼不問而著他比丘尼之衣有一制於迦絺那衣戒依兩種等起而生起二六妨礙衆僧得衣之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼妨礙衆僧得衣有一制依三種等起而生起二七遮止如法分配衣之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼遮止如法分配衣有一制依三種等起而生起二八以沙門之衣與在家者或遍行外道男遍行外道女之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼以沙門之衣與在家者有一制依六種等起而生起二九寄望於未確定之衣而過衣時之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼寄望於未確定之衣而過衣時有一制依三種等起而生起三遮止如法捨迦絺那衣之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼遮止如法捨迦絺那衣有一制依三種等起而生起第四共臥品三一二比丘尼共臥一牀之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼二人共臥一牀有一制於羊毛戒依兩種等起而生起三二二比丘尼共一被褥之波逸提於舍衛城制之因衆多比丘尼衆多比丘尼二人共一被褥有一制於羊毛戒依兩種等起而生起三三故意令比丘尼惱亂之波逸提於舍衛城制之因偷蘭難陀比丘尼偷蘭難陀比丘尼故意令他比丘尼惱亂有一制依三種等起而