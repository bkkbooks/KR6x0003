body:
  text: 第三等起攝頌諸行無常苦無我有為也亦決定涅槃施設無我佛月未現佛日未來時尚且不知具分彼無常等有為法之名目行種種困苦圓滿波羅蜜大雄者眼者含梵天界顯現於此世界彼諸佛拔苦與樂宣説正法一切衆生之慈愍者一切有情之最尊者獅子之鴦耆羅娑釋迦牟尼宣説三藏有經論及大功德之律律若存正法亦應同運轉兩部毗崩伽犍度及彼戒本依有系德之附隨結之如華鬘也彼附隨説三種學處之等起法決定不與他混合與他混合等起及制戒之因緣於上經中所示故好法之善比丘應學附隨於兩部毗崩伽制戒於布薩誦出如法説等起法應聽我説第一波羅夷和第二其以下依媒介諫告及長衣羊毛逐句法實有豫約賊隊説法賊女不聽之十三此依智者而思惟之十三等起法也於兩部分別一一等起在此所示相同不淨波羅夷一出精僧殘一身觸同二不定之第一不定一先著波羅夷一六斡旋同二九祕密與比丘尼共同三食事中同四三祕密之二同四四四五指同五二水中戲同五三打同七四舉手同七五五十三之學法頸骨下尼波羅夷一村中尼僧殘二染心同五拍尼波逸提三樹膠同四洗淨同五安居竟同四教誡同五八隨學和尚同六九此七十六學處身意之行也皆如第一波羅夷為一種等起第一波羅夷等起終不與波羅夷二人體同三上人同四粗語僧殘三為自己之淫欲同四無根同八異事中同九不定之第二不定二奪衣捨墮二五回入同三妄語波逸提一罵同二離間同三粗罪同九掘地同一草木同一一異語同一二譏嫌同一三牽出同一七故意同二利養同二四足食同三六來同四二輕侮同五四恐怖同五五隱匿同六殺命同六一故意蟲水同六二羯磨同六三未滿同六五共住同六九被擯同七如法同七一疑惑同七二無知同七三無根同七六疑惱同七七如法同七九與衣同八一回施個人同八二於汝能如何尼僧殘六非時尼捨墮二奪取同三誤受尼波逸一八地獄咒同一九衆僧同二六分配同二七寄望同二九功德衣同三惱惑同三三住房同三五罵同五二瞋同五三慳嫉同五五妊婦同六一幼兒婦同六二二年同六三學法僧不許同六四曾嫁女之三同六五六七童女之三同七一七三未滿十二夏同七四不乞僧同七五充分同七六憂愁同七九欲承諾同八一年年同八二二人同八三此七十學處為三種等起如第二波羅夷即一由身意而不由語二由語意而非身作三由三門生起第二波羅夷等起終媒嫁僧殘五房舍同六精舍同七洗濯捨墮四取衣同五乞衣同六過量同七豫備同八兩居士同九使同一絹同一一純黑同一二二分同一三六年同一四坐具同一五懈怠同一七金銀同一八二之種種同一九二減五綴同二二雨季衣同二四糸同二六指圖同二七戶波逸一九與同二五縫衣同二六餅同三四資具同四七火同五六寶同八四針同八六臥牀同八七綿同八八尼師壇同八九覆瘡同九雨衣同九一佛衣同九二乞尼捨墮四購此同五二之僧伽財同六七別衆之二同八九個人同一重衣同一一輕衣同一二二之剩飯尼波逸提八九沐浴衣同二二沙門衣同二八此五十法凡依六種等起而生起一由身而不由語意二由語而不由身意三由身語而不由意四由身意而不由語五由語意而不由身六由三門生起此等如媒嫁戒為六種等起法媒嫁等起終破僧僧殘一隨順同一一惡口同一二污同一三粗罪波逸提六四惡見同六八不同意同八哄笑之二衆學一一一二聲之二同一三一四含飯語同四三座牀同六八低座同六九立同七後同七一惡道同七二覆罪尼波羅夷二隨順同三捉同四解罪尼僧殘四捨同七何等同八親近之二同九一打尼波逸提二縫同二三病患同三四相親近同三六不滅同四五僧園同五一自恣同五七半月同五九弟子之二同六八及七衣同七七隨學同七八此三十七法皆由身語意生起皆如諫告戒為一種等起諫告等起終捨迦絺那衣之三捨墮一三第一鉢藥同二一及二三特施同二八有難同二九退出之二波逸提一四一五住處同二三數數同三三不殘食同三八請待同四六淨施同五九王之同八三非時同八五指圖提舍尼二阿蘭若同四訴訟尼僧殘一蓄積尼捨墮一食前尼波逸提一五食後同一六非時同一七五日同二四他衣同二五住處之二同四七四八下部同六座同九四此二十九法乃一由身語生起而不由意二又由三門生起皆等於迦絺那衣戒為兩種等起法迦絺那衣等起終羊毛捨墮一六二臥宿波逸提五六脫腳牀同一八施食同三一別衆同三二非時食同三七貯藏同三八楊枝同四裸體者同四一出征軍同四八軍陳同四九模擬戰同五酒同五一沐浴同五七壞色同五八二之提舍尼提舍尼一及三蒜尼波逸提一供給同六舞踊同一沐浴同二一敷物同三一臥同三二國內同三七國外同三八雨期中同三九畫堂同四一高牀同四二紡絲同四三作事同四四自手同四六無比丘住處同五六蓋同八四車同八五腰布同八六飾身具同八七香同八八香油同八九比丘尼同九式叉摩那同九一沙彌尼同九二白衣女同九三不著僧祇支衣同九四此四十四罪一由身而不由語意二由身意而不由語皆同羊毛戒為兩種等起法羊毛等起終句波逸提四除外同七不選任同二一日沒同二二畜生咒之二尼波逸提四九五不得許可而問同九五此七學處一由語生起而不由身意二由語意生起而不由身生起皆如句法戒為兩種等起法句法等起終道波逸提二七船同二八美味同三九與女人同六七剃尼波逸提二穀同七請同五四八提舍尼此十五學處一由身生起而不由語意二由身語生起而不由意生起三由身意生起而不由語生起四由身語意生起此等等於道戒依佛智所制之四種等起也道戒等起終賊隊波逸提六六屏聽同七八乞羹衆學三七夜尼波提一一屏同一二露同一三第七小路同一四此等一由身意生起而不由語生起二由三門生起此等同日種佛説之賊隊等起兩種等起法也賊隊等起終世尊對持蓋者衆學法五七持杖者如是同五八持刀者同五九持武器者同六皆不説正法草履同六一革履同六二車乘同六三臥牀同六四亂姿同六五裹頭同六六及覆面同六七十一法無缺此等一由語意生起而不由身生起如於説法戒皆為一種等起説法等起終實有波逸提八一由身生起而不由語意二由語生起而不由身三由身語生起而不由意生起説實有上人法實依三處而生起實説等起終賊女尼僧殘二一由語意生起而不由身二由三門生起此處賊女戒依法王所説自爾之兩種等起法也度賊女等起終不聽尼波逸提八一由語生起而不由身意二由身語生起而不由意生起三由語意生起而不由身四由三門生起此自爾之四種等起法也不聽等起終實善説十三等起之要略此無癡之因依處導法律藏之隨順也智者憶持此而於等起法無惑等起主頭要略終
