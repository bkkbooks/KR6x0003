body:
  text: 第五問犍度章一我問受具犍度具因緣具解釋其尊高之句有幾種罪耶我答説受具具因緣具解釋尊高之句中有兩種罪二我問布薩因緣有三種罪三我問雨安居因緣有一種罪四自恣有三種罪五與皮革結合有三種罪六藥有三種罪七迦絺那衣無任何罪八與衣給合有三種罪九瞻波有一種罪一憍賞彌有一種罪一一羯磨犍度有一種罪一二別住有一種罪一三集有一種罪一四滅諍有兩種罪一五小事有三種罪一六坐臥處有三種罪一七破僧有兩種罪一八儀法有一種罪一九遮説戒有一種罪二比丘尼犍度有兩種罪二一五百集法無任何罪二二七百集法無任何罪攝頌受具及布薩雨安居自恣皮革迦絺那藥衣並瞻波憍賞彌犍度羯磨別住集滅小事坐具破僧並行儀遮止比丘尼五百及七百
