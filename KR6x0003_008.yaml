body:
  text: 第八伽陀集一以衣覆於一肩而合掌如願求汝優波離為何來此兩種律制於布薩誦出有多少學處彼於多少城市制之耶汝之質問是賢善汝如理遍問我佛盡善巧實為汝說示兩種律制於布薩讀誦有三百五十彼等制立於七城市制立於何處之七城市耶今我此解說注意令入此言路於我等有利益於毘舍離王舍城舍衛城阿羅毘憍賞彌釋迦國及婆祇國制之於毘舍離制立多少於王舍城作多少於舍衛城有多少於阿羅毘為多少於憍賞彌制立多少於釋迦國說多少於婆祇國制立多少請問此為我說示十制立於毘舍離二十一制立於王舍城二百九十四皆作於舍衛城六制立於阿羅毘八制立於憍賞彌八制立於釋迦國三制立於婆祇國制立於毘舍離汝應如實聞不淨法人體上人長衣黑羊毛實有數數食楊枝裸形於比丘尼戒之責罵此等之十項於毘舍離制之制立於王舍城汝應如實聞不與取及二誹謗於王舍城二種破僧安陀會金銀線譏嫌斡旋食別眾食非時食往詣沐浴未滿二十與衣後不平此等制立於王舍城山上行同與欲之二十一制立於舍衛城汝應如實聞波羅夷有四僧殘有十六不定有二捨墮有三十四小戒計說百五十六十非難法七十二學法二百九十四皆制立於舍衛城制立於阿羅毘汝應如實聞房絹絲共宿掘地至樹神澆有蟲水此六制立於阿羅毘制立於憍賞彌汝應如實聞大精舍惡口異語窗酒輕侮如法第八為乳飲物制立於釋迦國汝應如實聞羊毛鉢五綴教誡比丘尼住處藥請針筒阿蘭若者此等之六於迦毘羅衛城於比丘尼戒於水洗淨於說教誡制立於婆祇國汝應如實聞燃火溫身於食物混飯粒之三四波羅夷七僧殘八捨墮三十二小戒二非難法三學法之五十六於六城依日種佛陀而制凡二百九十六於舍衛城依有光輝之瞿曇而作二問我等之尊師為我等說示彼一一說無誤我問他願說此重與輕有殘無殘粗與非粗至三次罪共通不共通失壞依此而滅之滅法答復此一切我等聽聞師語有三十一重罪此中八為無殘罪重罪即粗罪粗罪即戒壞波羅夷與僧殘稱為戒壞偷蘭遮波逸提提舍尼惡作為戲樂惡口之惡說此罪為行壞抱顛倒之見以非正法為尊誹謗正覺者無智而覆愚癡此罪為見壞活命之因依活命故持惡求性貪欲而主張空無之上人法活命之因依活命故行媒介活命之因依活命故說住汝精舍彼比丘是阿羅漢活命之因依活命故比丘為自己乞求美味之食而食活命之因依活命故比丘尼為自己乞求美味之食而食活命之因依活命故無病而為自己乞求羹與飯而食此罪為命壞有十一至三次為罪彼等汝應正聞有隨擯八至三次為罪阿利吒戒旃達加利戒此等至三次為罪有幾何應切斷之罪耶有幾何應破之罪耶有幾何應拔除之罪耶有幾何非他理由之波逸提有幾何比丘許可耶有幾何如法行耶有幾何決定最高之戒耶有幾何知而依日種佛陀而制耶有六種應切斷之戒有一種應破之戒有一種應拔除之戒有四種非他波逸提有四種比丘許可有七種如法行有十四種決定最高之戒有十六種知而依日種佛陀而制二百二十比丘之學處於布薩讀誦三百四比丘尼之學處於布薩讀誦比丘四十六與比丘尼不共通比丘尼百三十與比丘不共通百七十六兩者不共通百七十四為兩者共通之學二百二十比丘之學處於說戒誦出於斯汝應正聞波羅夷有四僧殘有十三不定有二捨墮有三十小戒有九十二四提舍尼七十五學法比丘之學處有二百二十於說戒誦出三百四比丘尼之學處於說戒誦出此汝應如實聞波羅夷有八僧殘有十七捨墮有三十小戒有百六十六八提舍尼七十五學法比丘尼之學處有此三百四於說戒誦出比丘四十六戒與比丘尼不共通此汝應如實聞六僧殘與二不定為八捨墮十二依此等為二十二十二小戒四提舍尼比丘戒中此四十六與比丘尼不共通比丘尼戒之百三十與比丘不共通此汝應如實聞波羅夷之四從僧殘出十戒捨墮之十二九十六小戒八提舍尼比丘尼戒中此百三十與比丘不共通百七十六兩者不共通此汝應如實聞波羅夷有四僧殘有十六不定有二捨墮二十四舉百十八之小戒十二提舍尼此百七十六兩者不共通百七十四為兩者之共學此汝應如實聞波羅夷有四僧殘有七捨墮有十八小戒七十學法七十五此百七十四為兩者之共學八波羅夷難近如陀羅樹犯此彼人如枯葉如破大石如切斷陀羅樹之頭彼等不成長二十三僧殘二不定四十二捨墮百八十八波逸提十二提舍尼七十五學法依三種滅法而滅罪現前自言與如草覆地二種說戒二種自恣四種羯磨依勝者而說示比丘有五種讀誦比丘尼有四種其他無有有七種罪聚四種諍事依七種滅法而滅之口論諍事乃依其中二種非難諍事依四種罪過諍事依三種事諍事依一種而滅之所謂波羅夷被他所勝汝應如實聞依正法而令消失見失墜落放棄者也於彼不共住故如是言所謂僧殘汝應如實聞僧伽與別住行本日治與摩那埵解罪故如是言所謂不定汝應如實聞不定而不決定為不確定之言不決定三者波羅夷僧殘波逸提中任何之一處故言不定所謂偷蘭遮汝應如實聞自受悔於一根罪重罪依彼不滅故如是言所謂捨墮汝應如實聞於僧中於別眾中或對一人依一人捨而自白懺悔故如是言所謂波逸提墮汝應如實聞令善法墮沒傷聖道為心愚惡處故如是言所謂提舍尼悔過汝應如實聞比丘由非親里比丘尼困難而得之食自取而食者應受非難故如是言受招待食之比丘其處之比丘尼依愛而指圖不拒彼而食應受非難故如是言至貧窮之信士家無病於其處而食應受非難故如是言住於具危險恐怖之阿蘭若者不豫告而於其處食應受非難故如是言比丘尼於非親里之其他愛好者自乞酥油蜜砂糖魚肉牛乳酪者比丘尼於善逝之教應墮非難之罪所謂惡作汝應如實聞過失失敗惡行即惡作人若於陰或於陽而為惡者為惡作故如是言所謂惡說汝應如實聞惡說惡語等言智者呵責彼故如是言所謂學汝應如實聞此最初之行又為初之禁制律儀順於直道而行修有學之學法者無有如是學故如是言強雨降於有覆者不降於露者是故覆者露如此強雨不降森林獸之趣虛無羽翼之趣滅是法之趣涅槃阿羅漢之趣也伽陀集終攝頌於七城制之四種之失壞比丘比丘尼共通不共通此乃為慈悲教法伽陀集
