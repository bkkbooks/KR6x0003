body:
  text: 第九諍事分解一一有四種諍事諍論諍事教誡諍事犯罪諍事事諍事此四種諍事也此四種諍事有幾種發起耶此四種諍事有十種發起諍論諍事有二種發起教誡諍事有四種發起犯罪諍事有三種發起事諍事有一種發起彼四種諍事有此十種發起諍論諍事發起時發起幾種滅諍耶教誡諍事犯罪諍事事諍事發起時發起幾種滅諍耶諍論諍事發起時發起現前多人語二種滅諍拒否呵罵教誡諍事四種犯罪諍事三種事諍事發起時發起一種滅諍二有幾種諍事依幾種行相而發起耶具幾種支分發起人諍事耶發起幾種人諍事而犯罪耶有十二種發起依十種行相而發起具四分而發起人諍事發起四種之人諍事而犯罪三何為十二種發起羯磨不成羯磨不善應更作羯磨判定不成判定不善應再判定裁決不成裁決不善應再裁決滅諍不成滅諍不善應再滅諍此為十二種之發起何為依十種行相而發起耶於彼處發起生諍事於彼發起生諍事停止於道中發起諍事於道中發起諍事停止至彼處發起諍事至彼處發起之諍事停止發起憶念毗尼發起不癡毗尼發起覓罪相發起如草覆地依此十種行相而發起何為具四分發起人諍事行愛不應行而發起諍事瞋不應行癡不應行行怖不應行而發起諍事具此四分發起人諍事何為發起四種人諍事為犯罪若其日受具人翌日發起發起者波逸提客比丘行羯磨人與欲而發起發起者波逸提此四種人諍事發起時為犯罪四諍論諍事以何為因緣以何為起因為何種類以何為生出以何為集起以何為等起耶教誡諍事犯罪諍事事諍事以何為因緣以何為等起耶諍論諍事以諍論為因緣以諍論為起因以諍論為等起教誡諍事以教誡為因緣犯罪諍事以犯罪為因緣事諍事以行事為因緣以行事為等起五諍論諍事以何為因緣以何為等起耶教誡諍事犯罪諍事事諍事以何為等起耶諍論諍事以因為因緣教誡諍事犯罪諍事事諍事以因為因緣以因為等起六諍論諍事以何為因緣以何為等起耶教誡諍事犯罪諍事事諍事以何為因緣以何為等起耶諍論諍事以緣為因緣教誡諍事犯罪諍事事諍事以緣為因緣以緣為等起七四種諍事有幾種根有幾種等起耶四種諍事有三十三種根三十三種等起何為四種諍事之三十三根諍論諍事有十二根教誡諍事有十四根犯罪諍事有六根事諍事有一根即僧伽四種諍事有此三十三種根何為四種諍事之三十三種等起諍論諍事有十八破僧事之等起教誡諍事有四種失壞之等起犯罪諍事有七罪聚之等起事諍事有四種羯磨之等起四種諍事有此三十三種等起八諍論諍事是罪過非罪過耶諍論諍事乃非罪過然而以諍論諍事為緣而犯罪過耶然以諍論諍事為緣而犯罪過也以諍論諍事為緣犯幾種罪過耶以諍論諍事為緣犯二種罪過謂罵受具者波逸提罵未受具者突吉羅以諍論諍事為緣犯此二種罪過彼罪過於四種失壞中隨伴幾種失壞耶於四種諍事中為何種諍事耶於七種罪聚中攝幾種罪聚耶於六種犯罪等起中依幾種等起而生起耶依幾種諍事於何處依幾種滅法而滅耶其罪過於四種失壞中隨伴一種失壞行壞於四種諍事中為犯罪諍事於七種罪聚中攝於二種罪聚有依波逸提罪聚有依突吉羅罪聚於六種犯罪等起中依三種等起而生起一種諍事依行事諍事於三種處僧衆中別衆中於別人之前依三種滅法而滅謂有依現前毗尼與自言治有依現前毗尼與如草覆地九教誡諍事是罪過非罪過耶參照八以教誡諍事為緣犯三種罪過以無根波羅夷法誹謗比丘者僧殘罪以無根僧殘誹謗者波逸提以無根行壞而誹謗者突吉羅以教誡諍事為緣犯此三種罪過彼罪聚於四種失壞中依幾種幾種滅法而滅耶彼罪過於四種失壞中隨伴二種失壞有戒壞有行壞於四種諍事中為犯罪諍事於七種罪聚中依三種罪聚而攝有僧殘罪聚有波逸提罪聚有突吉羅罪聚於六種犯罪等起中依三種等起而生起彼罪重者是一種諍事即依事諍事一種處即於僧衆中依二種滅法而滅即依現前毗尼與自言治彼罪輕者是一種諍事即依事諍事三種處即於僧衆中八有依如草覆地一犯罪諍事是罪過非罪過耶犯罪諍事是罪過也然而以犯罪諍事為緣而犯四種罪過謂比丘尼知而覆藏波羅夷法者為波羅夷罪持疑念而覆藏者偷蘭遮罪覆藏比丘僧殘罪者波逸提罪覆藏行壞者突吉羅以犯罪諍事為緣而犯此四種罪過彼罪過於四種失壞中依幾種滅法而滅耶彼罪過於四種九依四種罪聚而攝有波羅夷罪聚有偷蘭遮罪聚有波逸提罪聚有突吉羅罪聚於六種犯罪等起中依一種等起而生起謂依身語意而生起彼罪之無殘者依任何諍事於任何處依任何滅法亦不能滅彼罪過之輕者有一種九有依如草覆地一一事諍事是罪過非罪過耶八以事諍事為緣而犯五種罪過隨順被舉比丘尼諫告至三次而不捨者依白突吉羅依二羯磨語偷蘭遮羯磨語終波羅夷罪助破僧者諫告至三次而不捨者僧殘罪對惡見諫告至三次而不捨者波逸提以事諍事為緣犯此五種罪過彼罪過於四種失壞中幾種依幾種滅法而滅耶彼罪過於四種九依五種罪聚而攝有波羅夷罪聚有僧殘罪聚有偷蘭遮罪聚有波逸提罪聚有突吉羅罪聚於六種犯罪等起中依一種等起而生起謂依身語意而生起彼罪之無殘者一彼罪之重者一種諍事即依事諍事一種處即於僧衆中依二種滅法而滅即依現前毗尼與自言治彼罪之輕者一種九有依如草覆地一二口論諍事有教誡諍事犯罪諍事事諍事耶諍論諍事是教誡諍事犯罪諍事而無事諍事以諍論諍事為緣而有教誡諍事有犯罪諍事有事諍事此事如何此處有比丘為事諍事如是以口論諍事為緣有教誡諍事有犯罪諍事有事諍事教誡諍事是犯罪諍事事諍事口論諍事耶教誡諍事犯罪諍事此事如何於此有比丘以比丘為事諍事如是以教誡諍事為緣而有犯罪諍事事諍事口論諍事犯罪諍事是事諍事口論諍事教誡諍事耶犯罪諍事事諍事此事如何以五種之罪聚為事諍事如是以犯罪諍事為緣而有事諍事口論諍事教誡諍事事諍事是口論諍事教誡諍事犯罪諍事耶事諍事口論諍事此事如何僧伽之所作為事諍事如是以事諍事為緣有口論諍事教誡諍事犯罪諍事一三有憶念毗尼之處有現前毗尼有現前毗尼之處有憶念毗尼有不癡毗尼之處有現前毗尼有現前毗尼之處有不癡毗尼有自言治之處有多人語之處有覓罪相之處有如草覆地之處有現前毗尼有現前毗尼之處有如草覆地一四依現前毗尼與憶念毗尼而滅諍事時有憶念毗尼之處有現前毗尼有現前毗尼之處有憶念毗尼其處無不癡毗尼無自言治無多人語無覓罪相無如草覆地依現前毗尼與不癡毗尼而諍事依現前毗尼與如草覆地而滅諍事時有如草覆地之處有現前毗尼有現前毗尼之處有如草覆地其處無憶念毗尼無覓罪相一五言現前毗尼或言憶念毗尼時此等法為親近者耶抑為不親近者耶此等法之差異得區別而示耶言現前毗尼或言不癡毗尼時言現前毗尼或言如草覆地時此等法為親近者耶得耶言現前毗尼或言憶念毗尼時此等法為親近者而非不親近者此等法之差異是不可能分離而示言現前毗尼或言不癡毗尼時言現前毗尼或言如草覆地時此等法親近者而非分離者此等法之差異不可能分離而示一六現前毗尼以何為因緣以何為起因以何為種以何為出生以何為集起以何為等起耶憶念毗尼如草覆地以何為因緣以何為起因以何為種以何為出生以何為集起以何為等起耶現前毗尼以因緣為因緣以因緣為起因以因緣為種以因緣為出生以因緣為集起以因緣為等起憶念毗尼如草覆地以因緣為因緣以因緣為起因以因緣為等起一七現前毗尼以何為因緣以何為等起耶憶念毗尼如草覆地以何為因緣以何為等起耶現前毗尼以因為因緣如草覆地以因為因緣以因為等起一八現前毗尼以何為因緣以何為等起耶憶念毗尼如草覆地以何為因緣以何為等起耶現前毗尼以緣為因緣如草覆地以緣為因緣以緣為等起一九七滅諍法有幾種根有幾種等起七滅諍法有二十六根有三十六等起何為七滅諍法之二十六根現前毗尼有四根僧現前法現前律現前人現前憶念毗尼有四根不癡毗尼有四根自言治有二根自白人與受自白人多覓毗尼有四根覓罪相有四根如草覆地有四根僧現前人現前七滅諍法有此二十六根何為七滅諍法之三十六等起憶念毗尼之羯磨有執行遂行著手進行承認容許不癡毗尼之羯磨自言治之羯磨多覓之羯磨覓罪相之羯磨如草覆地之羯磨有執行遂行容許七滅諍法有此三十六種等起法二言現前毗尼或言憶念毗尼時此等法為別義別語或同義而唯有語別異言現前毗尼或言不癡毗尼時言現前毗尼或言自言治時言現前毗尼或言如草覆地時此等法有別異言現前毗尼或言憶念毗尼時此等法有別義而又有別語言現前毗尼或言不癡毗尼時言現前毗尼或言如草覆地時此等法有別義而又有別語二一有口論而為口論諍事口論而非口論諍事諍事而非口論諍事而又為口論口論而為小品四一四一二一五事諍事為諍事而又為行事諍事分解終攝頌諍事及發起方便以及人因緣因緣根以及等起法罪過有其處親近與因緣因緣根等起語口論諍事此諍事分解
