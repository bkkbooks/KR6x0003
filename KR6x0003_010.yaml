body:
  text: 第十別伽陀集呵責法為何憶念法為何衆僧法為何心念法為何呵責法為憶念罪憶念法為折伏衆僧法為獲得決斷心念法為各人之決斷汝若為檢問者草率勿言怒而勿言怒而勿行於經於律於隨法於所制於隨順法草率無利益之諍論語勿言依善巧有覺者而作檢問儀法善說學處隨順用意無破來世趣欲利他者應時而檢問有利被呵者及呵責者勿取草率之語呵責者言有罪被呵者言無罪應捨兩說用依有恥者自白語而處分自白行於有恥者無恥者不然無恥者多語故應依其行自白而處分無恥者不生自白為如何人耶我如是問如何之人稱為無恥人耶故意犯罪而隱罪行不應行如是之人稱無恥人實我亦知如是之人稱為無恥人我更問汝如何之人稱為有恥人不故意犯罪不隱罪不行不應行如是之人稱為有恥人實我亦知如是之人稱為有恥人更問汝如何之人稱為非法呵責者以非時而呵責以不實以粗暴以無利益有瞋心而呵責無慈心如是者稱為非法呵責者實我亦知如是之人稱為非法呵責者更問汝如何稱為如法呵責者以時而呵責以實以柔軟以有利益有慈心而呵責無瞋心如是者稱為如法呵責者實我亦知如是之人稱為如法呵責者更問汝如何之人稱為無知呵責者不知前所言之事後所言之事於前事後事無知不知適用之語法於適用語法無知如是稱為無知呵責者實我亦知如是之人稱為無知呵責者更問汝如何之人稱為有知呵責者知前事後事於事前事後有知知適用之語法於適用語法有知如是之人稱為有知呵責者實我亦知如是之人稱為有知呵責者更問汝何故稱為呵責耶依戒壞而呵責同依行見命壞而呵責呵責乃依此而言也別伽陀集終
