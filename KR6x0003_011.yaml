body:
  text: 第十一呵責品一檢問者應問呵責者友汝呵責此比丘依何而呵責彼耶依戒壞而呵責耶依行壞而呵責耶依見壞而呵責耶若彼言我依戒壞而呵責或依行壞而呵責或依見壞而呵責者應對彼如是言具壽汝知戒壞否大品四一六一一一五禁止此比丘自恣改為呵責此比丘我禁彼禁或禁自恣改為我呵責彼呵責由外道之弟子聞而疑耶二見與見一致見與見合致若然因見而不清淨之疑不來彼人依清淨之自白應與彼共為布薩聞與聞一致聞與聞合致因聞而應為覺與覺一致覺與覺合致因覺而應為三何為呵責之初何為中何為後求聽羯磨為呵責之初羯磨之執行為中滅諍為後呵責有幾種根有幾種事有幾種地有幾種行相耶呵責有二根有三事有五地依二種行相而呵責何為呵責之二根有根或無根呵責有此二根何為呵責之三事由見由聞由疑呵責有此三種事何為呵責之五地我以時而言不以非時以實有而言不以非實以柔軟而言不以粗暴以有利而言不以無利以慈心而言不以瞋心呵責有此五種地依何等之二種行相而呵責耶以身而呵責或以語而呵責依此二種之行相而呵責四呵責者應如何行被呵責者僧衆檢問者應如何行呵責者應如何行耶呵責者應立於五法而呵責他以時而言不以非時以慈心而言不以瞋心呵責者應如是行被呵責者應如何行耶被呵責者應立於二法而行真實與不瞋也被呵責者應如是行僧衆應如何行僧衆應知有欲無欲僧衆應如是行檢問者應如何行檢問者依法依律依師教如滅彼諍事應如是滅諍事檢問者應如是行五布薩為何自恣為何別住為何本日治為何摩那埵為何出罪為何布薩是為和合自恣是為清淨別住是為摩那埵本日治是為懲誡摩那埵是為出罪出罪是為清淨由貪瞋怖癡而非難長老者是無智而傷害並破壞身等之五根愚癡而且不恭敬學者身壞而至地獄不依利養又不依人此等俱捨而應如法行有忿有怨又粗暴而惡口者對無罪者告發有罪如是呵責者是燒亡自己行耳語求惡失無視決斷而交往說邪道罪對無罪者告發有罪如是呵責者是燒亡自己以非時而呵責以非實以粗暴以不利有瞋心而呵責無慈心對無罪者是燒亡自己不知法非法對法非法無智對無罪者是燒亡自己不知律非律對律非律無智對無罪者是燒亡自己所言非所言常法非常法所制非所制不知有罪無罪對有罪無罪無智輕罪重罪有殘罪無殘罪粗罪非粗罪前說後說不知適用之語法對適用之語法無智對無罪者告發有罪如是呵責者是燒亡自己呵責品終攝頌呵責與檢問初根與布薩於呵責品趣令確立教說
