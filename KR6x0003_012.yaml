body:
  text: 第十二小諍一習鬥諍之裁斷至比丘僧伽時謙讓而應以如拭塵埃之心至僧中應善辨座席而著不擠進長老比丘之間不推開年少比丘之座應著於適當之座不言前後相違之語不應言無益徒勞之語應自說法或應問其他或不得輕視聖者之默靜於僧衆所許可檢問者之人欲檢問時不可問和尚不可問阿闍梨不可問和尚弟子不可問阿闍梨門弟不可問同行和尚者不可問同行阿闍梨者不可問種不可問名不可問姓不可問汝是長部誦者中部誦者等阿含不可問家之階級不可問生地此為何故耶於此彼有愛憎故也有愛或憎之時行貪不應行又行瞋不應行行癡不應行又行怖不應行僧衆所許可檢問者之人欲檢問者應以僧為重而行不應以人為重應以正法為重而行不應重利養應從義利而行不應依衆之淨善處應以時檢問不應以非時應以實檢問不應以非實應以柔軟檢問不應以粗暴應以利益檢問不應以無利益應以慈心檢問不應以瞋心不應為耳語者不應求惡失不應以手覆眼不應舉眉不應舉頭不應振手不應示手印於座席著坐應善心得唯視目前一尋應答決斷之事當著己之座不可從座而立不可勿視決斷而交不可主張罪不可說曖昧之言不可急忙不可粗暴應不瞋應以軟語而有慈心應有友情同情應為同情之行不綺語以制限語依親切心無不善語應自行檢點得否決斷滅諍應檢令彼有恥者得解耶應檢呵責者應檢被呵責者應檢非法呵責者應檢非法被呵責者如法呵責者應檢如法被呵責者不可省略呵責者被呵責者所言不說非所言所說之句文善之他者反問應以自白而處分之不應微笑不應抱怖畏不應制以粗暴質直溫和而應滅除不淨不應行貪不應行不應行瞋不應行不應行癡不應行不應行怖不應行於法與人應公平檢問者如是而檢問之時取大師與智者而隨教者對同梵行者乃愛敬尊重二檢問者之說經為結合罪與無罪喻是為示義之比說義是為了解反問是為遮止求聽羯磨是為呵責呵責是為罪非罪之憶念憶念是為共語共語是為勿從此住處而去之障礙障礙是為決斷決斷是為判別惡非惡判別是為知處非處犯不犯輕重犯之行處非處之行是為調伏惡人守護善比丘僧伽是為領承依僧伽所聽許之人是不僞立而立律是為律儀律儀是為無悔恨無悔恨是為愈悅愈悅是為喜喜是為輕安輕安是為樂樂是為等持等持是為如實知見如實知見是為厭離厭離是為離欲離欲是為解脫解脫是為解脫知見解脫知見是為無取著般涅槃為此有律之論為此有律之考量為此有近習為此有傾聽即此無執取心解脫三依善巧有智者所行檢問之儀法用善說學處之隨順意而不破來世之趣於事失壞罪過因緣行相無智而不正知前事後事成不成於羯磨諍事滅諍亦無智染污愚癡依怖疑而行不善辨所制於處置無智得黨友而無慚為黑業無恭敬如是比丘實謂不可敬仰者於事失壞罪過因緣行相有智正知前事後事成不成於羯磨諍事滅諍亦有智而無染無污無癡不依怖與疑而行善辨所制於處置有智得黨友而有慚為白業有恭敬如是比丘實謂可敬仰者小諍終攝頌卑賤心問重僧伽非個人經為結合也律為調伏也於小諍攝頌於此成一誦
