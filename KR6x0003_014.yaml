body:
  text: 第十四迦絺那衣分解一何人不成受持迦絺那衣何人成受持迦絺那衣耶如何不成受持迦絺那衣如何成受持迦絺那衣耶何人不成受持迦絺那衣耶二種人不成受持迦絺那衣不行作迦絺那衣之儀式者從界外歸來於行迦絺那衣式不隨喜者此二種人不成受持迦絺那衣如何不成受持迦絺那衣耶依二十四事而不成受持迦絺那衣唯作輾治則不成受持迦絺那衣大品七一五若如是則不成迦絺那衣受持相業者於此布受持迦絺那衣行邪命卜相也豫言者依此豫言而得迦絺那衣布對人之生處作豫言也暫時者言不取施與延期者有二種延期作衣之延期與積置之延期捨墮者作衣之時為夜明依此二十四事不成受持迦絺那衣如何成受持迦絺那衣耶謂依十七事而成受迦絺那衣以新衣者成受迦絺那衣大品七一六如是者成受持迦絺那衣依此十七事而成受迦絺那衣二一受迦絺那衣共有幾種法生起耶受迦絺那衣十五種法共之生起謂捨八事二種執持五種功德也受迦絺那衣共此十五種法之生起二何等法依前方便之無間緣為緣依近接緣為緣依依止緣為緣依近依緣為緣依前生起緣為緣依後生起緣為緣依俱生起緣為緣耶何等法依前行之無間緣為緣耶乃至何等法依授與之何等法依決意之何等法依受持之何等法依捨事與執持之何等法依事之無間緣為緣依俱生起緣為緣耶三前行是依前方便之無間緣為緣依近接緣為緣依依止緣為緣依近依緣為緣也前方便是依前行之前生起緣為緣前行是依前方便之後生起為緣十五種法是依俱生起為緣四授與是依前行之無間緣為緣依近接緣為緣依依止緣為緣依近依緣為緣也前行是依授與之前生起緣為緣授與是依前行之後生起緣為緣十五種法是依俱生起緣為緣五決意是依授與之無間緣為緣依近接緣依依止緣依近依緣為緣授與是依決意之前生起緣為緣決意是依授與之後生起緣為緣十五種法是依俱生起緣為緣六受持是依決意之無間緣為緣依近接緣依止緣近依緣為緣決意是依受持之前生起緣為緣受持是依決意之後生起緣為緣十五種法是依俱生起緣為緣七捨事與執持是依受持之無間緣近接緣依止緣近依緣為緣受持是依捨事與執持之前生起緣為緣捨事與執持是依十五種法之前生起緣為緣十五種法是依俱生起緣為緣八望與非望是依事之無間緣為緣近接緣依止緣近依緣為緣事是依望與非望之前生起緣為緣望與非望是依事之後生起緣為緣十五種法是依俱生起緣為緣三一前行是以何為因緣以何為起因以何為種以何為出生以何為集起以何為等起耶授與是以何為因緣以何為等起耶決意受持捨事與執持望與非望以何為因緣以何為等起耶前行以前方便為因緣以前方便為起因以前方便為等起授與以前行為因緣決意以授與為因緣受持以決意為因緣捨事與執持以受持為因緣望與非望以事為因緣以事為等起二前方便以何為因緣以何為起因以何為等起耶前行乃至授與決意受持捨事與執持事望與非望以何為因緣以何為等起耶前方便以因為因緣以因為起因望與非望以因為因緣以因為等起三前方便以何為因緣望與非望以何為因緣以何為等起耶前方便以緣為因緣以緣為起因望與非望以緣為因緣以緣為等起四前行依幾種法而攝耶前行依七種法而攝謂依浣洗計量裁斷安緣刺縫染色作淨也前行依此七種法而攝授與依幾種法而攝耶授與依三種法而攝謂依僧伽梨衣鬱多羅僧衣安陀衣也決意依幾種依三法而攝謂依僧伽梨衣鬱多羅僧衣安陀衣也受持依幾種依一法而攝謂依發語五迦絺那衣有幾種根幾種事幾種地耶迦絺那衣有一種根僧伽也有三種事僧伽梨衣鬱多羅僧衣安陀衣也有六種地麻布綿布絹布毛布粗麻布大麻布也六何為迦絺那衣之初中後耶前行為迦絺那衣之初作衣為中受持為後七具幾分之人是不得受持迦絺那衣耶具幾分之人得受持迦絺那衣耶具八分之人不得受持迦絺那衣具八分之人得受持迦絺那衣何為具八分之人不得受迦絺那衣謂以不知前行授與決意受持捨事執持捨不知功德具此八分之人不得受持迦絺那衣何為具八分之人得受持迦絺那衣謂知前行知功德具此八分之人得受持迦絺那衣八幾種人不成就受持迦絺那衣耶幾種人成就受持迦絺那衣耶三種人不成就三種人成就何為三種人不成就於界外者隨喜還歸界內隨喜而不言出雖言亦不令他知此三種人不成就迦絺那衣何為三種成就於界內隨喜隨喜而言出言出而令他知此三種人成就受持迦絺那衣九有幾種不成就受持迦絺那衣耶有幾種成就受持迦絺那衣耶有三種不成就受持迦絺那衣有三種成就何為三種不成就受持迦絺那衣事不法衣不淨時不法作法不法也此三種不成就何為三種成就為事如法時如法作法如法也此三種為成就受持迦絺那衣也四應知迦絺那衣應知受持迦絺那衣應知受持迦絺那衣之月應知不成受持迦絺那衣應知成就受持迦絺那衣應知相業應知豫言應知暫時物應知延期應知捨墮應知迦絺那衣者是其等法之集合結合名命名授名詞文呼稱此即應知迦絺那衣也應知受持迦絺那衣之月者是應知雨期最後一月也應知不成就受持迦絺那衣者是依二十四種行相應知不成受持迦絺那衣應知成就受持迦絺那衣者依十七種行相應知成就迦絺那衣應知相業者卜相而受持此布為迦絺那衣豫言者是於此豫言豫言得迦絺那衣布也應知暫時物者應知不取施與也應知延期者應知二種延期作衣之延期與積置之延期也應知捨墮者作衣時明相出也應知作迦絺那衣者若僧伽得迦絺那衣物時僧伽應如何行耶作衣者應如何行耶隨喜者應如何行耶僧伽依白二羯磨而與比丘作迦絺那衣作其迦絺那衣之比丘於即日浣洗舒張計量裁斷縫刺染色作淨而可作迦絺那衣若欲依僧伽梨衣而作迦絺那衣者應授與舊僧伽梨衣應決意新僧伽梨衣且應發言我依此僧伽梨而作迦絺那衣若欲依鬱多羅僧衣而作迦絺那衣者應授與舊鬱多羅僧衣應決意新鬱多羅僧衣應發言依此鬱多羅僧衣而作迦絺那衣若欲依安陀衣而作迦絺那衣者應授與舊安陀衣應決意新安陀衣應發言依此安陀衣而作迦絺那衣作其迦絺那衣之比丘至僧伽偏袒右肩合掌而應如是言諸大德為僧伽作迦絺那衣如法作迦絺那衣也應令隨喜彼隨喜比丘應偏袒右肩合掌而應如是言友為僧伽作迦絺那衣如法作迦絺那衣我等隨喜彼作迦絺那衣之比丘至衆多之比丘處偏袒右肩合掌應如是言諸大德應令隨喜彼隨喜比丘我等隨喜彼作彼迦絺那衣之比丘應至一比丘處偏袒右肩合掌而應如是言友為僧伽作迦絺那衣如法作迦絺那衣也應令隨喜彼隨喜比丘應偏袒右肩合掌而應如是言友為僧伽作迦絺那衣如法作迦絺那衣我隨喜五僧伽作迦絺那衣別衆作迦絺那衣一人作迦絺那衣僧伽不作迦絺那衣別衆不作迦絺那衣一人作迦絺那衣若僧伽不作迦絺那衣別衆不作而一人作迦絺那衣者迦絺那衣為僧伽不成受為別衆不成受為一人而成受迦絺那衣僧伽誦波羅提木叉別衆誦波羅提木叉一人誦波羅提木叉僧伽不誦波羅提木叉別衆不誦一人誦若僧伽不誦波羅提木叉別衆不誦而一人誦者為僧伽而不成誦波羅提木叉為別衆不成誦為一人而成誦波羅提木叉依僧伽之和合一致依別衆之和合一致而為一人之誦為僧伽成誦波羅提木叉為別衆成誦為一人成誦波羅提木叉如是僧伽不作迦絺那衣別衆不作而一人作依僧伽隨喜依別衆隨喜而一人作者為僧伽成受迦絺那衣為別衆成受迦絺那衣為一人成受迦絺那衣六去時捨迦絺那衣依日種佛所説以此我問汝何之執持於初斷耶去時捨迦絺那衣依日種所説以此我答汝衣之執持初斷出於界外即共彼住處執持斷也衣成時捨迦絺那衣依日種説以此我問汝答住處執持初斷於衣成為衣執持斷發心作時捨迦絺那衣問答二種執持俱時斷失衣時捨迦絺那衣問答住處執持初斷於失衣為衣執持斷聞僧伽已捨時捨迦絺那衣問答衣執持初斷聞共於彼住處執持斷斷望之時捨迦絺那衣問答住處執持初斷於望衣斷時為衣執持斷出界內時捨迦絺那衣問答衣執持初斷行彼界外時為住處執持斷與僧伽共捨時捨迦絺那衣問答二種執持俱時斷七一捨多少迦絺那衣依託於僧伽捨多少迦絺那衣依託於一人耶捨多少迦絺那衣不衣託僧伽捨多少迦絺那衣不依託一人耶捨一迦絺那衣依託於僧伽中間之捨也捨四迦絺那衣依託一人為去成發心與出界捨四迦絺那衣不依託僧伽不依託一人為失聞斷望與共捨二捨多少迦絺那衣是於界內而捨捨多少迦絺那衣是於界外而捨耶捨多少迦絺那衣是有於界內而捨或於界外而捨耶捨二種迦絺那衣於界內而捨與中間之捨與共捨也捨三種迦絺那衣於界外而捨為去聞與出界捨四種迦絺那衣有於界內捨有於界外捨成發心失與望斷也三捨多少迦絺那衣共生共滅捨多少迦絺那衣是共生別別而滅耶捨二種迦絺那衣是共生共滅與中間之捨為共捨也捨餘迦絺那衣是生於別別而滅也迦絺那衣分解終攝頌何人何十五法與因緣因緣攝根及初此為八種人三破三成不應知受持誦執持及依託界內及生滅附隨終
