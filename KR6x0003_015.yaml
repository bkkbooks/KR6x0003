body:
  text: 第十五優波離問五法一一爾時佛世尊在舍衛城祇樹給孤獨園時具壽優波離詣世尊之住處詣已禮拜世尊而坐於一面一面坐已具壽優波離如是白世尊尊師具幾何支分之比丘終生無依止而不可住耶優波離具五分之比丘終生無依止而不可住何等為五謂不知布薩不知布薩羯磨不知波羅提木叉不知波羅提木叉之誦出五夏未滿優波離具此五分之比丘終生無依止而不可住優波離具五分之比丘終生依止而可住何等為五謂知布薩知布薩羯磨五夏或五夏以上優波離此二優波離復具五分之比丘終生無依止而不可住何等為五謂不知自恣不知自恣羯磨波羅提木叉波羅提木叉羯磨五夏未滿此優波離具五分之比丘終生無依止而可住何等為五知自恣此三優波離復無依止而不可住何等為五謂不知有罪與無罪不知輕罪與重罪不知有殘罪與無殘罪不知粗罪與非粗罪五夏未滿此優波離具五分無依止而可住何等為五謂知有罪與無罪優波離具此五分之比丘終生無依止而可住四世尊具幾何支分之比丘不可令他受具不可與他依止不可蓄沙彌耶優波離具五分之比丘不可令他受具不可與他依止不可蓄沙彌何等為五謂弟子或門弟之病不能看護又不能令看病生憂愁要除又不能令除疑悔生起要依法滅除而又不能滅除不能教導阿毘達磨不能教導阿毘毘奈耶優波離具此五分之比丘不可令他受具不可與他依止不可蓄沙彌優波離具五分之比丘可令他受具與他依止可蓄沙彌何等為五謂弟子又能教導阿毘毘奈耶五優波離復具五分之比丘不可令他受具不可與他依止不可蓄沙彌何等為五謂弟子又門弟於增上行儀之學不能令學不能教導初梵行之學不能教導增上戒不能教導增上心不能教導增上慧優波離具五分之比丘可令他受具可與他依止可蓄沙彌何等為五謂弟子又得教導增上慧優波離具此五分之比丘得令他受具得與他依止得蓄沙彌六世尊具幾何支分之比丘可行羯磨耶優波離對具五分之比丘可行羯磨何等為五謂無恥愚癡不清淨有惡見污壞活命優波離對具此五分比丘應行羯磨七優波離復對具五分之比丘應行羯磨何等為五謂於增上戒失壞戒於增上行失壞行於增上見污壞見有惡見污壞活命此八優波離復具身戲樂具語戲樂具身語戲樂有惡見污壞活命此九優波離復具身不正行具語不正行具身語不正行有惡見污壞活命此一優波離復具身違害具語違害具身語違害有惡見污壞活命此一一優波離復具身邪命具語邪命具身語邪命有惡見污壞活命此一二優波離復犯罪而羯磨令受具與依止蓄沙彌受選定為教誡比丘尼者選定而教誡比丘尼此一三優波離復為罪依僧伽而受羯磨犯其罪犯同類之他罪犯較其更惡罪罵羯磨罵行羯磨人此一四優波離復誹謗佛誹謗法誹謗僧有惡見污壞活命優波對具此五分之比丘應行羯磨一依止品攝頌布薩與自恣犯罪及病者增上之行儀無恥增上戒戲樂不正行違害及邪害為彼罪佛將此第一品聚二一三尊師對具幾何支分之比丘不得解羯磨耶優波離對具五分之比丘不得解羯磨何等為五謂犯罪而被羯磨參照一一二一四應行改為不得解污壞活命優波離對具此五分之比丘不得解羯磨四優波離復對具五分之比丘不得解羯磨何等為五謂無恥愚癡不清淨於諸行事而行粗暴於學不滿修者優波離對具此五分之比丘不得解羯磨五尊師習鬥諍裁斷之比丘至僧伽時於內應持幾何之法而至僧伽優波離習鬥諍裁斷之比丘至僧伽時於內應持五法而至僧伽何等為五優波離習鬥諍裁斷之比丘至僧伽時應謙讓如拂拭塵埃之心而至僧中於著座席應善心得不得擠進長老比丘之間或推擠年少比丘之座而應著於適當之座不言前後相違之語不言徒勞無益之語應自說法或應問他不得輕視聖者之默靜優波離若僧伽和合而當行布薩等之羯磨時對一比丘亦不得忍許亦須提示異見而達和合一致何以故為令我與僧伽無別異也優波離習鬥諍裁斷之比丘至僧伽時於內應持此五法而至僧中六尊師具幾何支分之比丘乃於僧伽行決斷時為眾人所不悅者眾人所不愛者又眾人所不樂者耶優波離具五分者為眾人所不樂者也何等為五依煩惱惡心而說者依他而說者語之使用不善依法依律應罪而不呵責之人依法依律應罪而非作法人優波離具此五分乃為眾人所不樂者優波離具足五分之比丘於僧伽行決斷時為眾人所喜悅者眾人所愛者眾人所樂者何等為五不依煩惱而說者不依他而說者善使用語言依法律應罪而呵責人依法律應罪而為作法人優波離此七優波離復具五分之比丘於僧伽行決斷時乃為眾人所不悅者稱揚人者貶斥人之人執非法拒法多語雜穢語優波離此優波離具五分之比丘於僧伽行決斷時乃為眾人所悅者非稱揚者非貶斥者執法拒非法不多語雜穢語優波離此八優波離復具五分之比丘於僧伽行決斷時乃為眾人所不悅者依強力而行不令許諾而行依法律應罪而不呵責依法律應罪而不處分依己見而不宣說優波離此優波離具五分之比丘於僧伽行決斷時為眾人所悅者不強力而行令許諾而行依法律應罪而呵責依法依律應罪而處分依見而宣說優波離此為眾人所樂者九尊師通達律有幾何之功德耶優波離通達律有此五種功德何等為五善守善護自身之戒蘊為惡行性者之守護處於僧伽中無畏而行決斷於敵應法而善折伏入住妙法優波離此為通達律之五種功德二不解羯磨品攝頌犯對於彼者不稱讚無恥諍惡稱揚者強力與通達一雙制三一尊師具幾何支分之比丘不可於僧中行罪之決斷耶優波離具五分之比丘不可於僧中行決斷何等為五不知罪不知罪之等起不知罪之前行不知罪之鎮靜不善正罪之決斷優波離具此五分之比丘不可於僧中行決斷優波離具五分之比丘可於僧中行決斷何等為五知罪善正罪之決斷優波離具此五分之比丘可於僧中行決斷二復不可於僧中行決斷何等為五不知諍事不知諍事之等起不知諍事之前行不知諍事之滅不善正諍事決斷優波離五分可於僧中行決斷何等為五知諍事善正諍事決斷三復不可行決斷何等為五依強力而行不令許諾而行依法律應罪而不呵責依法律應罪而不作羯磨依見而不宣說此優波離五分可於僧中行決斷何等為五不依強力而行令許諾而行依見而宣說此四復不可行決斷何等為五不知犯不犯不知輕犯重犯不知有殘犯無殘犯不知粗犯非粗犯不知有懺悔犯無懺悔犯此優波離五分可於僧中行決斷何等為五知犯不犯此五復不可行決斷何等為五不知羯磨不知羯磨之因不知羯磨之事不知羯磨之行法不知羯磨之終息此優波離五分可於僧中行決斷何等為五知羯磨此六復不可行決斷何等為五不知事不知因緣不知所制不知句之誦出法不知適用之語法此優波離五分可於僧中行決斷何等為五知事此七復不可行決斷何等為五行愛不應行行瞋不應行行癡不應行行怖不應行無恥者此優波離五分可於僧中行決斷何等為五不行愛不應行有恥者此八復不可行決斷何等為五行愛不應行行瞋不應行行癡不應行行怖不應行於律不善巧此優波離五分可於僧中行決斷何等為五不行愛不應行於律善巧此九復不可行決斷何等為五不知白不知白之因不知白之唱說不知白之滅法不知白之鎮滅此優波離五分可於僧中行決斷何等為五知白此一復不可行決斷何等為五不知經不知隨經不知律不知隨律不善辨處非處此優波離五分可於僧中行決斷何等為五知經善辨處非處此一一復不可行決斷何等為五不知法不知隨法不知律不知隨律不善辨前事後事此優波離五分可於僧中行決斷何等為五知法善辨前事後事優波離具此五分之比丘可於僧中行決斷三決斷品攝頌犯諍事強力以知犯罪事羯磨事無恥不善辨白之不知經及法第三品聚也四一尊師有幾何對羯磨非法異見之提示耶優波離此等為五種非法異見之提示也何等為五對於不犯有犯而提示異見對非教誡犯提示異見對被發露之犯提示異見依四五人而提示異見以意圖而提示異見優波離此乃五種非法異見之提示優波離此等乃五種如法異見之提示何等為五對犯提示異見對教誡犯對未發露之犯對依四五人而不提示異見依意圖此二優波離復有五種非法異見之提示何等為五於異住者前提示異見於異界住者前於不清淨者前依四五人依意圖而此優波離此等乃五種如法異見之提示何等為五於共住者前提示異見於同界住者前於清淨者前依四五人而不提示異見依意圖而不行優波離此乃五種如法異見之提示也三尊師有幾何非法之取受耶優波離此等乃五種非法之取受也何等為五依身而與依身而不受依身而與依身著物而不受依身上所帶之物而與不依身而受依身上所帶之物而與不依身上所帶之物而受依放捨而與不依身或不依身上所帶之物而受優波離此為五種非法取受優波離此等乃五種如法取受何等為五依身而與以身而受依放捨而與以身或以身上所帶之物而受優波離此為五種如法取受四尊師有幾何殘食不成就之法耶優波離此等乃五種殘食不成就之法也何等為五行不淨食以手受食非手上食非伸手內者未言此食皆不須優波離此為五種殘食不成之法優波離此等乃五種殘食成就之法也淨食以手受食以手上食伸手內者已言此食皆不須優波離此乃五種殘食成就之法五尊師依幾何行相而知足食耶優波離依五種行相而知足食何等為五知食事知食物立於伸手內持食來奉侍知充足之謝絕優波離依此五種行相而知足食矣六尊師有幾何非法自言治耶優波離有此等五種非法自言治何等為五比丘犯波羅夷罪以波羅夷而受詰難自言犯僧殘罪僧伽以僧殘處分彼此非法自言治也比丘犯波羅夷罪而以波羅夷受詰難時自言犯波逸提悔過惡作僧伽以惡作處分彼此非法自言治也比丘犯僧殘波逸提悔過惡作以惡作受詰難時自言犯波羅夷僧伽以波羅夷處分彼此非法自言治也比丘犯惡作以惡作受詰難時自言犯僧殘波逸提悔過僧伽以悔過處分彼此非法自言治也優波離此為五種非法自言治優波離此等為五種如法自言治何等為五比丘犯波羅夷以波羅夷受詰難時自言犯波羅夷僧伽以波羅夷處分彼此如法自言治也比丘犯僧殘波逸提悔過惡作以惡作受詰難時自言犯惡作僧伽以惡作處分彼此如法自言治也優波離此為五種如法自言治七尊師具幾何支分之比丘令行聽許羯磨時行聽許不可耶優波離具五分之比丘令行聽許羯磨時不可行聽許何等為五無恥愚癡不清淨依教法存擯斥之意無由罪而出之意此優波離五分可何等為五有恥賢能清淨存出之意無擯斥優波離具此五分之比丘令行聽許羯磨時可行聽許也八尊師具幾何支分之比丘不可與共談律耶優波離具五分不可與談律何等為五不知事不知因緣不知所制不知句之誦出法不知適用之語法此優波離具五分可與談律何等為五知事優波離具此五分之比丘可與共談律九尊師有幾何之質問耶優波離此等乃五種質問何等為五因愚鈍而質問有惡欲因貪求之性而質問因輕侮而質問欲智而質問若依我之質問彼正確解答者可若依我之質問不正確解說者我欲彼正解說而質問優波離此五種質問也一尊師有幾何之異答耶優波離此等乃五種異答何等為五因愚鈍而異答有惡欲因貪求之性而異答因癡狂喪心而因增上慢而答真實之異事優波離此乃五種異答也一一尊師有幾何之清淨耶優波離此等乃五種清淨何等為五誦序已餘應唱常所聽聞此第一清淨參照第六五廣說為第五優波離此五種清淨也一二尊師有幾何之噉食耶優波離此等乃五種噉食何等為五飯乾飯魚肉也優波離此五種噉食也四異見提示品攝頌異見提示復取受與不成殘食法足食自言聽許談問之及異答清淨與噉食五一尊師呵責比丘欲呵責他人者於內觀察幾何之法而後可呵責他耶優波離呵責比丘欲呵責他人者於內觀察五法而後可呵責他何等為五優波離呵責比丘欲呵責他人者應如是觀察我身行清淨耶同小品九五一優波離呵責比丘欲呵責他人者於內觀察此五法而後可呵責他二尊師呵責比丘欲呵責他人者於內修幾何之法而後可呵責他耶優波離呵責比丘欲呵責他人者於內修五法而後可呵責他何等為五我以時而說同小品九五二優波離呵責比丘欲呵責者於內修此五法而後可呵責他三尊師呵責比丘欲呵責他人者於內作意幾何之法而後可呵責他耶優波離呵責比丘欲呵責他者於內作意五法而後可呵責他何等為五有慈悲尋求利益有哀愍超罪尊重律優波離呵責比丘欲呵責他人者於內作意此五法而後可呵責他四尊師具幾何支分之比丘令行聽許羯磨時不可行聽許耶優波離五分不可行聽許何等為五身業不清淨語業不清淨活命不清淨愚癡不聰明被檢問時不能專心優波離此五分不可行聽許羯磨優波離五分可行聽許羯磨何等為五身業清淨語業清淨活命清淨有智聰明被檢問時能專心優波離此五分可行聽許羯磨五尊師欲自取事之比丘具足幾何支分者可自取事耶優波離欲自取事之比丘具足五分者可自取事何等為五優波離欲自取事之比丘應如是觀察小品九四優波離如是具足五分自取事者而後不生追悔六尊師具足幾何支分之比丘依生諍事之諸比丘而為大利益者耶優波離五分為大利益者也何等為五持戒者而依波羅提木叉之律儀攝身而住具足正行於微少之罪過亦見怖畏受學處而修學多聞而憶持所聞積集所聞諸法之初善中善後善具義具文宣說純一圓滿清淨之梵行如是多聞而憶持讀誦諸法於意思惟於見善通達廣解兩部波羅提木叉明解本文而善分別善說示善決斷於律確立不動於自他兩派能令和解令講和令和睦令觀令靜優波離此五分為大利益者也七優波離復五分為大利益者何等為五身業清淨語業清淨活命清淨有智聰明被檢問時能專心也此八優波離復五分為大利益者何等為五知事知因緣知所制知句之誦出法知適用之語法此為大利益者九一尊師具幾何支分之比丘不得檢問耶優波離具五分之比丘不得檢問也何等為五不知經不知隨經不知律不知隨律不善辨處非處此參照三一一一可於僧中決斷不可於僧中決斷改為得檢問不得檢問善辨前事後事優波離具此五分之比丘可檢問也一一優波離復具五分之比丘不得檢問何等為五不知事不知因緣不知所制不知句之誦出法不知適用之語法此優波離具五分之比丘可檢問何等為五知事此一二復不可檢問何等為五不知罪不知罪之等起不知罪之前行不知罪之止息不善辨罪之決斷此優波離具五分之比丘可檢問何等為五知罪善辨罪之決斷此一三復不可檢問何等為五不知諍事不知諍事之等起不知諍事之前行不知諍事之止息不善辨諍事之決斷此優波離具五分之比丘可檢問何等為五知諍事善辨諍事之決斷此可檢問五自取品攝頌清淨與依時慈悲與聽許自取與諍事復事及經法事罪依諍事六一尊師有幾種林住者耶優波離此等五種林住者也何等為五有愚故癡故為林住者有惡求貪欲之性故為林住者有癡狂故喪心故諸佛諸佛弟子所讚歎唯依少欲唯依知足唯依損減唯依遠離唯依求德而為林住者優波離此等為五種林住者也二一三尊師有幾種常乞食行者耶乃至有幾種糞掃衣者耶樹下住者耶塚間住者耶露地住者耶三衣者耶次第乞食者耶常坐不臥者耶隨得座者耶一座食者耶時後不食者耶一鉢食者耶優波離有五種一鉢食者何等為五愚鈍故有依求德而為一鉢食者優波離此為五種一鉢食者也六頭陀支品攝頌林住者乞食糞掃與樹下第五之塚間露地及三衣次第與常坐隨座一坐食時後一鉢食七一尊師有幾種妄語耶優波離此等五種妄語也何等為五有為妄語波羅夷有為妄語僧殘有為妄語偷蘭遮有為妄語波逸提有為妄語惡作優波離此為五種妄語二尊師具幾種支分之比丘於僧中遮止布薩或自恣時僧伽制抑之止比丘勿鬥諍勿紛亂勿喧噪而行布薩或自恣耶優波離具五分應作何等為五分無恥愚癡不清淨存擯斥之意無出罪之意優波離具此五分應作三優波離復具五分應作何等為五身業不清淨語業不清淨活命不清淨愚癡不聰明鬥諍紛亂優波離具此五分應作四尊師具幾種支分之比丘不得與檢問耶優波離五分不得與何等為五不知犯不犯不知輕犯重犯有殘犯無殘犯不知粗犯非粗犯不知有懺悔犯無懺悔犯優波離此不得與優波離具足五分之比丘可與檢問何等為五知犯不犯優波離此可與五尊師比丘依幾種行相而犯罪耶優波離依五種行相而比丘犯罪何等為五無慚故無知故惡行性故於不清淨作清淨想故於清淨作不清淨想故優波離此犯罪六優波離復依五相而犯罪何等為五依不見持律者依不聞由他淨不依睡眠違想不淨為淨放心優波離此犯七尊師有幾種魔怨耶優波離此等五種魔怨也何等為五殺生不與取行邪淫妄語飲酒優波離此五種魔怨也八尊師有幾種離耶優波離此等五種離也何等為五離殺生離不與取離邪淫離妄語離飲酒優波離此為五種離九尊師有幾種喪失耶優波離此等為五種喪失何等為五親戚喪失財喪失病喪失戒喪失見喪失優波離此為五種喪失一尊師有幾種成就耶優波離此等五種成就也何等為五親戚成就財成就健康成就戒成就見成就優波離此為五種成就也七妄語品攝頌妄語抑復檢問犯罪復魔怨離喪失以及成就此第七品聚也八一尊師對具幾種支分之比丘比丘尼僧伽可行羯磨耶優波離五分比丘尼僧伽行羯磨彼比丘不得受比丘尼眾之禮何等為五露身而示諸比丘尼示腿示生支示兩肩與在家者以粗語而交談優波離此彼比丘不得受比丘尼眾之禮者二優波離復五分彼比丘不得受比丘尼眾之禮者何等為五企望諸比丘尼無所得企望諸比丘尼不利企望諸比丘尼無住處罵詈讒謗諸比丘尼離間比丘與比丘尼此三優波離復五分彼比丘不得受比丘尼眾之禮者何等為五企望諸比丘尼無所得企望諸比丘尼不利企望諸比丘尼無住處罵詈讒謗諸比丘尼令比丘與比丘尼交往此彼比丘不得受比丘尼眾之禮者四尊師對具幾種支分之比丘尼可行羯磨耶優波離對具五分之比丘尼可行羯磨何等為五露身而示比丘示腿示生支示兩肩與在家者交談粗語此五優波離復對具五分之比丘尼可行羯磨何等為五企望比丘無利得企望比丘不利企望比丘無住處罵詈讒謗比丘離間比丘尼與比丘優波離對具此五分之比丘尼可行羯磨六優波離復對具五分之比丘尼可行羯磨何等為五企望比丘無所得不利無住處罵詈讒謗比丘令比丘尼與比丘交往優波離對具此五分之比丘尼可行羯磨七尊師具幾種支分之比丘對比丘尼等不得遮受教誡耶優波離五分不得遮何等為五無恥愚癡不清淨有擯斥之意無出罪之意此八優波離復五分不得遮何等為五身業不清淨語業不清淨活命不清淨愚癡不聰明被檢問時不得專心此九優波離復五分不得遮何等為五具足身非行具足語非行具足身語非行為比丘尼之罵詈讒謗者與比丘尼親近以不隨順交往而住者此一優波離復五分不得遮何等為五無恥愚癡不清淨起鬥諍起紛爭者於學不圓滿者此不得遮一一尊師具幾種支分之比丘不得教誡比丘尼耶優波離五分不得何等為五具身非行具語非行具身語非行為比丘尼之罵詈讒謗者與比丘尼親近以不隨順交往而住此一二優波離復五分不得何等為五無恥愚癡不清淨遠行者病者此不得一三尊師具幾分之比丘不得與共語耶優波離具五分之比丘不得與共語何等為五不具無學戒蘊不具無學定蘊慧蘊解脫蘊不具足解脫智見蘊此優波離具五分之比丘得與共語何等為五具無學戒蘊此一四優波離復具五分之比丘不得與共語何等為五不得義無礙解不得法無礙解不得辭無礙解不得辯無礙解不觀察心如解脫此優波離具五分之比丘得與共語何等為五得義無礙解觀察心如解脫優波離具此五分之比丘得與共語八比丘尼教誡品攝頌依比丘尼等行同其他二對於比丘尼三種之羯磨不得遮止之二種之雙說不得行教誡二說於會話二種之雙說九一尊師具幾分之比丘不得選定為斷事人耶優波離具五分之比丘不得選定為斷事人何等為五不善辨義不善辨法不善辨言辭不善辨文不善辨前事後事優波離具此五分之比丘不得選定為斷事人優波離具五分之比丘得選定為斷事人何等為五善辨義優波離具此五分之比丘得選定為斷事人二優波離復不得選定為何等為五有忿為忿所勝有覆為覆所勝有惱為惱所勝有嫉為嫉所勝妄取現世執固自見難棄捨此優波離五分得選定為何等為五無忿不為忿所勝無嫉不為嫉所勝不妄取現世不固執自見善棄捨此三優波離復不得選定為何等為五激烈乖張抗拒起擾動不堪忍不謹受教誡此優波離五分得選定為何等為五不激烈不乖張不抗拒不起擾動堪忍謹受教誡此四優波離復不得選定為何等為五勿視而欺呵責者被呵責者之語不憶念不得聽許而說依法律從罪而不呵責依法律從罪而不處分從見而不說此優波離五分得選定為何等為五令憶念而不暴露得聽許而說依法從見而說此五優波離又不得選定為何等為五行愛不應行行瞋不應行行癡不應行行怖不應行無恥此優波離五分得選定為何等為五不行愛不應行有恥此六優波離復不得選定為何等為五行愛不應行行瞋不應行行癡不應行行怖不應行不善辨律此優波離五分得選定為何等為五不行愛不應行善辨律此得選定為七尊師具幾分之比丘實可言為愚癡者耶優波離具五分之比丘實可言為愚癡者何等為五不知經不知隨經不知律不知隨律不善辨處非處此優波離具五分之比丘實可稱為有智者何等為五知經善辨處非處此八優波離復實可稱為愚癡者何等為五不知法不知隨法律不善辨前事後事此優波離五分實可稱為有智者何等為五知法知前事後事此九優波離復實可稱為愚癡者不知事不知因緣不知所制不知句之誦出法不知適用之語法此優波離五分實可稱為有智者何等為五知事此一優波離復實可稱為愚癡者何等為五不知罪不知罪之等起不知罪之前行不知罪之止息不善辨罪之決斷此優波離五分實可稱為有智者何等為五知罪善辨罪之決斷此一一優波離復實可稱為愚癡者何等為五不知諍事不知諍事之等起不知諍事之前行不知諍事之止息不善辨諍事之決斷此優波離五分實可稱為有智者何等為五知諍事善辨諍事之決斷此實可稱為有智者九斷事人品終攝頌不善辨義忿激者及露者此愛不應行皆同與不善經法乃至事罪以及諍事皆各有對說汝等分黑白一一尊師具幾分之比丘不適滅諍事耶優波離具五分之比丘不適滅諍事何等為五不知罪參照九一此優波離五分適滅諍事何等為五知罪此二優波離復不適滅諍事何等為五不知諍事參照九一一此優波離五分適滅諍事何等為五知諍事此三優波離復不適滅諍事何等為五行愛不應行無恥此優波離五分適滅諍事何等為五不行愛不應行有恥此四優波離復不適滅諍事何等為五行愛不應行少聞此優波離五分適滅諍事何等為五不行愛不應行多聞此五優波離復不適滅諍事何等為五不知事不知因緣所制句之誦出法不知適用之語法此優波離五分適滅諍事何等為五知事此六優波離復不適滅諍事何等為五行愛不應行不善辨律此優波離五分適滅諍事何等為五不行愛不應行善辨律此七優波離復不適滅諍事何等為五行愛不應行不尊重人不尊重僧此優波離五分適滅諍事何等為五不行愛不應行尊重僧伽不尊重人此八優波離復不適滅諍事何等為五行愛不應行尊重利養而不尊重正法此優波離五分適滅諍事何等為五不行愛不應行尊重正法而不尊重利養此適滅諍事九尊師依幾種行相而僧伽分裂耶優波離依五相而僧伽分裂何等為五依羯磨依波羅提木叉誦出行決斷依非法唱說依取籌優波離依此五相而僧伽分裂一尊師言僧諍僧諍者尊師云何僧諍而非僧破耶又云何僧諍而又為僧破耶優波離我為客來比丘制此客來之儀法優波離如是我善制於學處不行客來比丘之儀法如是優波離僧諍而非僧破優波離我為舊住比丘制此舊住之儀法優波離如是我善制於學處舊住比丘不行舊住之儀法如是優波離我為諸比丘制立於食堂應從長幼從老弱從適否而取最初之座最初之水最初之食之食堂儀法優波離我如是善制於學處新參比丘奪長老比丘之座如是優波離我為諸比丘制立坐臥處應從長幼從老弱從適否而行之坐臥處儀法優波離我如是善制於學處新參比丘奪長老比丘之坐臥處優波離如是為僧諍而非僧破優波離我為諸比丘制立界內同一布薩同一自恣同一僧伽羯磨同一羯磨非羯磨優波離我如是善制於學處界內行別異之存在結別眾而行別異布薩行別異自恣行別異僧伽羯磨行別異羯磨非羯磨優波離如是為僧諍而亦為僧破十滅諍品終攝頌罪諍事愛及少聞事不善人及利養分裂僧諍同僧破一一一尊師具幾分之破僧者墮惡趣地獄而住一劫不得救耶優波離五分不得救何等為五優波離於此有比丘非法說為法法說為非法非律說為律律說為非律異自己之見而依羯磨優波離此五分不得救也二優波離復不得救何等為五優波離於此有比丘非法說為法異見而依誦出此三優波離復不得救何等為五優波離於此有比丘非法說為法異見而決斷此四優波離復不得救何等為五優波離於此有比丘非法說為法異見而依唱說此五優波離復不得救何等為五優波離於此有比丘非法說為法異見而依取籌此六優波離復不得救何等為五優波離於此有比丘非法說為異忍而依羯磨乃至異忍而依誦出異忍而決斷異忍而唱言異忍而取籌此七優波離復不得救何等為五優波離於此有比丘非法法異樂而依羯磨乃至異樂而依誦出異樂而決斷異樂而依唱言異樂而依取籌此八優波離復不得救何等為五優波離於此有比丘非法說為法異想而依羯磨乃至異想而依誦出異想決斷異想而依唱言異想而依取籌優波離具五分之破僧者墮惡趣地獄住一劫之間而不得救十一破僧者品終攝頌異見而依羯磨依誦出依決斷依唱言及依籌此五種之見依忍樂想之此三亦為五重法也一二一尊師具幾分之破僧者不墮惡趣地獄不住一劫之間而非不得救者耶優波離五分非不得救者何等為五優波離於此有比丘非法說為法法說為非法非律說為律律說為非律不異見而依羯磨此二八優波離復非不得救者何等為五優波離於此有比丘非法說為法不異見而依誦出不異想而依取籌優波離具此五分之破僧者不墮惡趣地獄不住一劫之間非不得救者十二第二破僧者品終攝頌不異見依羯磨依誦出依決斷依唱言依取壽此五種之見依忍樂想之此三亦為五重法也如前之於黑分同為有二十法當知如是白分亦同為有二十一三一尊師具幾分之舊住比丘持來如置確實迅速墮地獄耶優波離具五分之舊住比丘持來如放置即墮地獄何等為五行愛不應行行瞋不應行行癡不應行行怖不應行以僧伽物為個人使用之受用物而受用優波離此優波離具五分之舊住比丘持來如置即生天上何等為五不行愛不應行以僧伽物為個人受用物而不受用此即生天上二尊師有幾種非法律之解說耶優波離此等五種非法律之解說也何等為五優波離於此有比丘非法說為法法說為非法非律說為律律說為非律制非制廢所制優波離此五種非法律之解說也優波離此等為五種如法律之解說何等為五優波離於此有比丘非法說為非法律說為律不制非制不廢所制優波離此五種如法律之解說三尊師具幾分之差遣請食人持來如置即墮地獄耶優波離具五分之差遣請食人持來如置即墮地獄何等為五行愛不應行不知差遣非差遣優波離此優波離具五分之差遣請食人持來如置即生天上何等為五不行愛不應行知差遣非差遣優波離此即生天上四一五尊師具幾分之分坐臥處人乃至守庫人納衣人分衣人分粥人分果人分嚼食人捨雜細物人受浴衣人分鉢人管淨人監沙彌人持來如置即墮地獄耶優波離具五分監沙彌人參照三差遣非差遣改為使與不使墮地獄即生天上十三舊住比丘品終攝頌舊住與解說差遣於請食坐臥處器物納衣人及衣配分者粥果嚼食及雜細並受浴衣人鉢與淨人事沙彌使用人一四一尊師受迦絺那衣有幾種功德耶優波離此等為受持迦絺那衣之五種功德何等為五食前食後不囑他比丘而入聚落離衣宿別眾食受須限之衣得衣者所持優波離此為受迦絺那衣之五種功德二尊師失念亂意睡眠有幾種過耶優波離此等五種過也何等為五不快眠不快覺見惡夢諸天不守護泄不淨優波離此失念之五過也優波離此等為存念正意睡眠之五種功德何等為五安樂眠安樂覺不見惡夢諸天守護不泄不淨優波離此等存念之五種功德也三尊師幾種人為不得受禮之人耶優波離此等為五種不得受禮之人何等為五入家中者不得受禮以車行者不得受禮於闇中者不得受禮從他事不注意者不得受禮睡眠者不得受禮優波離此等五種不得受禮者也四優波離復有五種不得受禮之人何等為五喝粥者不得受禮於食堂中不得受禮趣向敵方者不得受禮想餘事者不得受禮裸形者不得受禮優波離此等五優波離復有五種不得受禮者何等為五嚼食者不得受禮噉食者大便者小便者被舉罪者不得受禮優波離此等六優波離復有五種不得受禮之人何等為五後受具者不得受前受具者之禮未受具者不得受禮異住之年長者說非法者不得受禮女人黃門不得受禮優波離此等七優波離復有五種不得受禮之人何等為五別住者不得受禮相應本日治者相應摩那埵者行摩那埵者相應出罪者不得受禮優波離此等為五種不應受禮者八尊師幾種人可受禮者耶優波離此等為五種可受禮之人何等為五前受具者可受後受具者之禮異住年長者如法說者阿闍梨和尚以及包括天界魔界梵天界於此世界於沙門婆羅門天人眾如來應供等正覺者可受禮優波離此等為五種可受禮者九尊師年少比丘禮長老比丘之足時於內具幾種法而可禮足耶優波離年少比丘五法可禮足何等為五優波離年少比丘禮時覆一肩而著外衣合掌以兩手之掌摩足應具愛與敬而禮足優波離年少比丘禮時內具此五種法而可禮足十四迦絺那衣受持品終攝頌迦絺那衣持睡眠家中粥嚼食之前乃至別住受禮者敬禮法優波離問五法終諸品攝頌無依止羯磨決斷及提示呵責頭陀分妄語比丘尼斷事人諍事前五之破僧舊住迦絺那十四品善說
