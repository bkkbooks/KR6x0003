body:
  text: 第十六等起一有罪無心而犯有心而出有罪有心而犯無心而出有罪無心而犯無心而出有罪有心而犯有心而出有罪善心而犯善心而出有罪善心而犯不善心而出有罪善心而犯無記心而出有罪不善心而犯善心而出有罪不善心而犯不善心而出有罪不善心而犯無記心而出有罪無記心而犯善心而出有罪無記心而犯不善心而出有罪無記心而犯無記心而出二一第一波羅夷依幾種等起而生起耶第一波羅夷依一種等起而生起由身意生起不由語生起第二波羅夷依幾種依三種等起而生起有由身意生起而不由語有由語意生起而不由身有由身語意生起第三波羅夷依幾種三種有由身意生起而不由語有由語意生起而不由身有由身語意生起第四波羅夷依幾種依三種等起而生起有由身意生起而不由語有由語意生起而不由身有由身語意生起四波羅夷終二行泄不淨之僧殘依幾種依一種等起而生起由身意生起而不由語與女人身相觸之僧殘一種由身意生起而不由語對女人以粗惡語之僧殘依幾種三種有由身意生起而不由語有由語意生起而不由身有由身語意生起於女人之前讚歎供養自己淫欲之僧殘依幾種三種乃至為媒人之僧殘依幾種六種有由身生起而不由語意有由語生起而不由身意有由身語生起而不由意有由身意生起而不由語有由語意生起而不由身有由身語意生起自乞造房屋之僧殘依幾種依六種等起而生起乃至令造大精舍之僧殘依幾種六種乃至以無根波羅夷法而誹謗比丘之僧殘依幾種三種乃至於異事中唯取任一類似點以波羅夷法而誹謗比丘之僧殘依幾種三種之乃至破僧比丘被諫告至三次而不捨之僧殘依幾種依一種等起而生起由身語意生起助破僧比丘等被諫告至三次而不捨之僧殘依幾種依一種等起而生起由身語意生起惡口比丘被諫告至三次而不捨之僧殘依一種等起而生起由身語意生起污俗家比丘被諫告至三次而不捨之僧殘依幾種依一種等起而生起由身語意生起十三僧殘終三乃至不恭敬故於水上大便或小便或唾痰之突吉羅依幾種等起而生起耶不恭敬故之突吉羅依一種等起而生起由身意生起而不由語眾學終四四波羅夷依幾種等起而生起耶四波羅夷依三種等起而生起謂有由身意生起而不由語有由語意生起而不由身有由身語意生起五十三僧殘依幾種依六種等起而生起有由身生起而不由語意參照二有由身語意生起六二不定依幾種依三種等起而生起有由身意生起而不由語有由語意生起而不由身有由身語意生起七三十尼薩耆波逸提依幾種依六種等起而生起有由身生起而不由語意有由身語意生起八九十二波逸提依幾種依六種等起而生起有由身生起而不由語意有由身語意生起九四悔過依幾種依四種等起而生起有由身生起而不由語意有由身語生起而不由意有由身意生起而不由語有由身語意生起一七十五眾學依幾種依三種等起而生起有由身意生起而不由語有由語意生起而不由身有由身語意生起等起法終攝頌無心以及善一切等起法應以如法式了解等起法
