body:
  text: 第十七第二伽陀集幾種罪是身罪幾種是語罪覆藏者有幾種罪幾種緣相觸耶六種罪是身罪六種為語罪覆藏者有三種罪五種是緣相觸於日出有幾種罪耶幾種至三次成罪耶於此幾種為八事罪耶依幾種而被一切學處攝聚耶於日出有三種罪二種至三次成罪於此一種為八事罪依一種而被一切攝聚有幾種律之根依佛陀所說耶幾種律被尊重說耶有幾種粗罪之覆藏耶有二種律之根依佛陀所說二種重律被尊重說有二種粗罪之覆藏於村中有幾種罪耶幾種緣渡河耶幾種肉為偷蘭遮幾種肉為突吉羅於村中有四種罪四種緣渡河一種肉是偷蘭遮九種肉是突吉羅幾種語罪為夜中犯幾種語罪為日中犯授與者有幾種罪受取者有幾種罪耶二種語罪為夜中二種語罪為日中授與者有三種罪受取者有四種罪幾種是教誡罪幾種是有懺罪於此處幾種依日種佛陀所說之無懺罪耶五種是教誡罪六種為有懺罪於此一種依日種佛陀所說之無懺罪幾種重律說耶又依身與語之罪有幾種有幾種非時之穀味幾種依白四羯磨之聽許耶二種重律說一切為依身語之罪有一種非時之穀味有依一種白四之聽許幾種為波羅夷之身罪有幾種共住地對幾種人有夜斷幾種二指是所制耶波羅夷之身罪二種也有二種共住地於二種人有夜斷二種二指是所制有幾種打自己耶依幾種而僧伽分裂耶於此幾種由最初為罪者耶白之行作是幾種耶有二種打自己依二種而僧伽分裂於此二種由最初為罪者白之行作有二種殺生有幾種罪耶語之波羅夷為幾種耶幾種是說所語之罪依為媒介有幾種罪耶殺生有三種罪語之波羅夷有三種所語之罪說三種依媒介有三種罪幾種人不得令受具有幾種羯磨之攝聚耶被擯者說幾種有幾種一說法耶三種人不得令受具有三種羯磨之攝聚說三種被擯者有三種一說法不與取有幾種罪耶幾種緣不淨行切斷者有幾種罪幾種緣放棄不與取有三種罪四種緣不淨行切斷者有三種罪五種緣放棄於比丘尼教誡品與波逸提共為突吉羅於此說幾種新參者耶因幾種人因衣為罪耶於波逸提中比丘尼教誡品之十戒與波逸提共為突吉羅於此說四種新參者二種人因衣而有罪為比丘尼所說之悔過為幾種食用生穀時與波逸提共為幾種突吉羅耶為比丘尼所說之悔過為八種食用生穀時與波逸提共為一突吉羅行者有幾種罪耶立者有幾種耶坐者有幾種罪耶臥者有幾種耶行者有四種罪立者亦同坐者有四種罪臥者亦同幾種波逸提為一切別異犯罪事之罪無前後於一時犯耶五種波逸提為一切犯幾種波逸提為一切別異事之罪無前後於一時犯耶九種波逸提為一切犯幾種波逸提為一切別異事之罪依幾種語而懺悔是日種佛所說耶五種波逸提為一切別異事之罪依一種語而懺悔是日種所說幾種波逸提為一切別異事之罪依幾種語而懺悔是日種所說耶九種波逸提依一種語而懺悔幾種波逸提為一切別異事之罪說何等而懺悔是日種所說耶五種波逸提為一切說事而懺悔是日種幾種波逸提為一切說何等而示九種波逸提說事而懺悔被諫告至三次者有幾種罪耶幾種緣決斷耶嚼食有幾何罪耶幾種緣噉食耶至三次者有三種罪六種緣決斷嚼食有三種罪五種緣噉食一切至三次者幾種行處耶幾種人有罪幾種人依諍事耶一切至三次者五種行處五種人有罪五種人有諍事幾種人有決斷幾種人有諍事之息滅耶又幾種人不犯依幾種處因而輝耀耶五種人有決斷五種人有息滅五種人不犯依三種處而輝耀幾種身罪夜中犯幾種身罪為日中思惟女人之生支者有幾種罪耶幾種罪緣鉢食耶二種身罪夜中也二種身罪日中也思惟者有一種罪一種罪緣鉢食思惟幾種功德以信懺悔他罪耶說幾種被擯者耶有幾種正行事耶思惟八種功德以信他人而懺悔己罪說三種被擯者有四十三種正行事於幾種處有妄語耶幾種是最上說有幾種悔過耶有幾種人懺悔耶於五處有妄語十四種是最上說有十二種悔過有四種人懺悔妄語有幾種支分耶有幾種布薩支分耶有幾種使者支分耶有幾種外道行事耶由八分有妄語有八布薩支分有八使者支分有八外道行事有幾種唱說受具耶對幾種人而應起耶於幾種人應與座耶依幾種分而為比丘尼之教誡人耶有八種唱說受具對八種人而應起對八種人應與座依八分而為比丘尼之教誡人幾種人有斷頭罪耶幾種人有偷蘭遮耶幾種人為不犯耶而此等一切人為同一事耶一人有斷頭罪四人有偷蘭遮四人不犯而此等一切人為同一事有幾種瞋怒事耶依幾種而僧伽破耶於此幾種為最初之罪耶為白之行作幾種耶有九種瞋怒事依九種而僧伽破於此有九種為最初之罪白之行作九種也幾種人依如法行合掌不應敬禮耶幾種人有突吉羅耶有幾種持衣耶十種人依如法行合掌不應敬禮十種人有突吉羅有十日持衣長衣幾種完雨安居人於此應與衣幾種於此可與代理者又幾種不可與者耶五種完雨安居人於此應與衣七種應與某人十六種人不應與以幾百罪覆藏百夜而住幾夜後別住者可免耶以千罪覆藏百夜住十夜後別住者可免幾種羯磨不成是依日種佛陀於瞻波律事中所說耶幾種皆非法耶十二種羯磨不成就是所說皆非法幾種羯磨成就是依日種佛陀於瞻波律事中所說耶幾種皆如法耶四種羯磨成就是所說皆如法幾種羯磨是依日種佛陀於瞻波律事中所說幾種如法非法耶六種羯磨所說其中一種如法五種非法是依日種佛陀所說幾種羯磨是依日種佛陀於瞻波律事中所說幾種如法非法耶四種羯磨所說其中一種如法三種非法是依日種佛陀所說彼無限之勝者依見厭離者所說示之罪聚其中幾種無滅法而止靜耶我問師請說毘崩伽師彼無限之罪聚其中一種無滅法而止靜師為我說毘崩伽師幾種惡趣者是依日種佛陀所說耶了解律之師我等聞其境一百四十四惡趣者是依日種佛陀所說破僧者墮惡趣地獄住一劫了解律之我汝應聞境幾種不惡趣者是依日種佛陀所說了解律之師我等聞其境十八種不惡趣者是依日種佛陀所說了解律者之我汝應聞境幾種八部法是依日種佛陀所說耶解律者之師聞十八種八部法解律者之我應聞幾種羯磨是依日種佛陀所說耶解律者之師聞十六種羯磨解律者之我應聞幾種羯磨不成就是依日種佛陀所說耶解律者之師聞十二種羯磨不成就解律者之我應聞幾種羯磨成就是依日種佛陀所說耶解律者之師聞四種羯磨成就解律者之我應聞幾種羯磨是依日種佛陀所說耶解律者之師聞六種羯磨解律者之我應聞幾種羯磨是依日種佛陀所說耶解律者之師聞四種羯磨解律者之我應聞幾種波羅夷是依日種佛陀所說耶解律者之師聞八種波羅夷解律者之我應聞幾種僧殘二十三種僧殘幾種不定二種不定幾種尼薩耆四十二尼薩耆幾種波逸提一百八十八波逸提幾種提舍尼十二提舍尼幾種學法是依日種佛陀所說耶了解律之師我等欲聞其境七十五種學是依日種佛陀所說了解律之我汝應聞唯依師而善問唯依我而善答於問與答無不契於何等之經者第二伽陀集終
