body:
  text: 第十九五品一一有四種羯磨求聽羯磨單白羯磨白二羯磨白四羯磨此四種羯磨依幾種行相而不成就耶此四種羯磨依五相而不成就謂或依事或依白或依唱說或依界或依眾也二云何依事而羯磨不成就謂應現前之羯磨不現前此事不成而非法羯磨應對問之羯磨不對問而行事不成而非法羯磨應依自言之羯磨不依自言而行相當於憶念毘尼者與不癡毘尼相當於不癡毘尼者行覓罪相羯磨相當於覓罪相羯磨者行呵責羯磨相當於呵責羯磨者行依止羯磨相當於依止羯磨者行驅出羯磨相當於驅出羯磨者行下意羯磨相當於下意羯磨者行舉罪羯磨相當於舉罪羯磨者與別住相當於別住者行本日治相當於本日治者與摩那埵相當於摩那埵者令出罪相當於出罪者令受具非布薩日行布薩非自恣時行自恣此事不成而非法羯磨如是依事而羯磨不成就三云何依白而羯磨不成就依五相依白而羯磨不成就不說事不說僧伽不說人不說白或以後置白依此五相依白羯磨不成就四云何依唱說而羯磨不成就依五相依唱說而羯磨不成就不說事不說僧伽不說人略唱說或於非時唱依此五相依唱說羯磨不成就五云何依界而羯磨不成就依十相依界而羯磨不成就過少定界過大定界定無連絡標相界定以陰影為標相界定無標相界於界外者定界於河中定界於海中定界於湖中定界以界雜先界以界覆界依此十一相依界羯磨不成就六云何依眾而羯磨不成就依十二相依眾而羯磨不成就應四人眾之羯磨羯磨所須之比丘未來相應與欲者未與欲現前者非議應四人眾之羯磨羯磨所須之比丘已來相應欲者未與欲現前者非議應四人眾之羯磨所須之比丘已來相應欲者已與欲現前者非議應五人眾之羯磨乃至應十人眾之羯磨乃至應二十人眾之羯磨羯磨所須之比丘未來相應與欲者未與欲現前者非議應二十人眾之羯磨羯磨所須之比丘已來相應與欲者未與欲現前者非議應二十人眾之羯磨羯磨所須之比丘已來相應與欲者已與欲現前者非議依此十二相依眾羯磨不成就七應四人眾之羯磨四人善比丘羯磨所須也餘之善比丘相應與欲僧伽為彼作羯磨其人非羯磨所須之人又非相應與欲者而為相應羯磨者五人眾羯磨五人比丘十人眾羯磨十人比丘二十人眾羯磨二十人比丘八有四種羯磨求聽羯磨單白羯磨白二羯磨白四羯磨此四種羯磨依幾種行相而不成就耶此四種羯磨依五相而不成就或依事或依白或依唱說或依眾也九云何依事而羯磨不成就耶令黃門受具此事不成就而非法羯磨令賊住者受具事不成就而非法羯磨也令歸入外道者畜生殺母者殺父者殺阿羅漢者污染比丘尼者破僧者出佛身血者二根者二十歲未滿人受具此事不成就而非法羯磨如是依事而羯磨不成就一云何依白同三六依此十二相依眾羯磨不成就一一求聽羯磨行於幾種處耶單白羯磨白二羯磨白四羯磨行於幾種處耶求聽羯磨行於五處單白羯磨行於九處白二羯磨行於七處白四羯磨行於七處一二求聽羯磨行於何等五處耶謂對沙彌解罪對沙彌擯出剃髮梵壇第五為羯磨標相求聽羯磨行於此五處單白羯磨行於何等九處耶謂為受具解罪為滅諍擯出布薩自恣教授問障道等之認許捨墮衣之受與懺罪之受容自恣之棄捨第九羯磨標相單白羯磨行於此九處白二羯磨行於何等七處耶謂解擯出認許授與捨迦絺那衣教誡第七羯磨標相白二羯磨行於此七處白四羯磨行於何等七處耶謂解擯出認許授與折伏諫告第七羯磨標相也白四羯磨行於此七處一三應四人眾之羯磨四比丘同七應五人眾之羯磨應十人眾之羯磨應二十人眾之羯磨而相當於羯磨者一羯磨品終二依二種義利如來為聲聞制學處謂為攝僧為僧眾安樂依此二種義利如來為聲聞制學處依二種義利為調伏惡人為善比丘安樂住依此二種義利如來為聲聞制學處依二種義利為制現世漏為滅來世漏為制現世怨為滅來世怨為制現世罪為滅來世罪為制現世怖為滅來世怖為制現世不善法為滅來世不善法為哀愍在家者為破惡欲者之黨友為令未信者生信為令已信者信增長為正法久住為愛重律依此二種義利如來為聲聞制學處二義利品終三依二種義利如來為聲聞制波羅提木叉乃至制波羅提木叉之讀誦制波羅提木叉之禁止制自恣制自恣之禁止制呵責羯磨制依止羯磨驅出羯磨下意羯磨舉罪羯磨與別住本日治與摩那埵出罪解罪擯出受具求聽羯磨單白羯磨白二羯磨白四羯磨三制戒品終四為攝眾僧為眾僧安樂未制者制之已制者隨制現前毘尼已制憶念毘尼已制不癡毘尼已制自言治已制多人語已制覓罪相已制如草覆地已制此依二種義利如來為聲聞制如草覆地依二種義利如來為聲聞制如草覆地惡人參照二為正法久住為愛重律依此二種義利如來為聲聞制如草覆地四所制品終五一有九種聚會事聚失壞聚罪聚因緣聚人聚蘊聚等起法聚諍事聚滅法聚二生諍事時若對敵兩者來者應告兩者之事令告兩者之事又應聞兩者之自白聞兩者之自白而應言兩者我等於此諍事鎮靜應俱滿足若言俱滿足者僧伽應舉起其諍事若眾多無慚者斷事人應滅之若眾多愚癡者則應求持律者依法律師教而滅止其諍事應滅其諍事三應知事知姓知名知罪不淨法者是事同時是姓波羅夷者是名同時是罪不與取者是事同時是姓波羅夷者是名同時是罪人體者上人法者是事同時是姓波羅夷者是名同時是罪出不淨者是事同時是姓僧殘者是名同時是罪身觸者是事同時是姓僧殘者是名又是罪粗語者為自己之淫欲供養者媒介者自乞造房屋者令造大精舍以無根波羅夷法誹謗他比丘者唯取異事中何等類似點以波羅夷法而誹謗他比丘者破僧比丘被諫告至三次而不捨者助破僧比丘被諫告至三次而不捨者惡口比丘被諫告至三次而不捨者污俗家比丘被諫告至三次而不捨者是事又是姓僧殘者是名又是罪乃至不恭敬故於水上大便或小便或唾痰者是事又是姓突吉羅者是名又是罪五九聚會品終攝頌求聽及單白白二與白四事白唱界眾現前及對問自言毘尼當事僧人白後事僧眾人唱乃至依非時過少及過大無連絡陰影以至無標相外河海湖雜覆界四五眾十二十人眾不持來持來羯磨所須者與欲相應者羯磨相應者人求聽五處及單白九處白二有七處白四亦七處攝與安樂惡與善比丘眾漏怨罪不善為之在家者乃至惡欲者為之未信者信者法久住為律之愛重波羅提木叉讀誦與禁止波羅提木叉自恣與禁止呵責及依止驅出與下意以及舉別住根本摩那埵出罪乃至解擯出同受具求聽與單白白二及白四未制及隨制現前毘尼念不癡與自言多人及罪相以如草覆地事壞罪緣人蘊及等起法諍事與滅聚以至同名罪附隨終有大智慧博聞而聰明之提婆大德各處問古師之道而讀誦依道之中庸思惟廣略齎諸弟子之樂而筆寫稱巴利瓦拉具一切事相於正法依義於施設依法圍繞義法即宛如圍繞海之閻浮提圍繞聖教故也不知巴利瓦拉如何有法決斷失壞事制隨制人一部眾制兩部眾制及由世間施設罪之制於此等生疑者依巴利瓦拉而斷於大軍中如轉輪王於獸類中如獅子如散光中之太陽如群星中之明月如梵眾中之梵天王如群眾中之導師正法律如是依巴利瓦拉而輝耀
