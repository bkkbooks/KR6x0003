自言覓罪草覆也口論諍事非難諍事義務諍事幾種五種滅依現前多人憶念不癡覓罪也兩種不滅依自言草覆也非難諍事罪過諍事義務諍事幾種六種滅依現前憶念不癡自言覓罪草覆也一種不滅依多人語也口論諍事非難諍事罪過諍事義務諍事幾種七種滅依現前憶念不癡自言覓罪草覆也十九滅不滅章終二滅法依滅法而滅之耶滅法依諍事而滅之耶諍事依滅法而滅之耶諍事依諍事而滅之耶滅法有依滅法而滅之滅法有依滅法而不滅滅法有依諍事而滅之滅法有依諍事而不滅諍事有依滅法而滅之諍事有依滅法而不滅諍事有依諍事而滅之諍事有依諍事而不滅云何之滅法有依滅法而滅耶云何之滅法有依滅法而不滅耶多人語乃依現前毘尼而滅依憶念毘尼而不滅依不癡毘尼而不滅依自言治覓罪相如草覆地而不滅憶念毘尼乃依現前毘尼而滅之不癡毘尼參考第四一如草覆地乃依現前毘尼而滅之依多人語而不滅依憶念毘尼依不癡毘尼依自言治依覓罪相而不滅如是有滅法依滅法而滅如是有滅法依滅法而不滅云何之滅法有依諍事而滅耶云何之滅法有依諍事而不滅耶現前毘尼乃依口論諍事而滅之依非難諍事而不滅依罪過諍事而不滅依義務諍事而滅多人語乃依口論諍事而滅之依非難而不滅依罪過而不滅依義務而不滅憶念毘尼依口論諍事而不滅依非難而不滅依罪過而不滅依義務而不滅不癡毘尼依口論諍事而不滅依非難而不滅依罪過而不滅依義務而不滅自言治依口論諍事而不滅依非難而不滅乃依罪過而滅依義務而不滅覓罪相依口論諍事而不滅依非難而不滅依罪過而不滅依義務而不滅如草覆地依口論諍事而不滅依非難而不滅依罪過而不滅依義務而不滅如是有滅法依諍事而滅之如是有滅法依諍事而不滅云何之諍事依滅法而滅云何之諍事依滅法而不滅口論諍事乃依現前毘尼多人語而滅之依憶念毘尼不癡自言覓罪草覆而不滅非難諍事乃依現前憶念不癡覓罪而滅之依多人自言草覆而不滅罪過諍事乃依現前自言草覆而滅之依多人憶念不癡覓罪而不滅義務諍事乃依現前而滅之依多人憶念不癡自言覓罪草覆而不滅如是有諍事依滅法而滅之如是有諍事依滅法而不滅云何之諍事有依諍事而滅耶云何之諍事有依諍事而不滅耶口論諍事依口論諍事而不滅依非難諍事而不滅依罪過而不滅依義務諍事而滅也非難諍事罪過諍事義務諍事依口論諍事而不滅依非難而不滅依罪過而不滅依義務諍事而滅也如是有諍事依諍事而滅如是有諍事依諍事而不滅六種滅法與四種諍事乃依現前毘尼而滅之現前毘尼是依何而滅二十滅諍章終二一口論諍事於四種諍事中令何種諍事生起耶口論諍事於四種諍事中不令任何諍事生起而以口論諍事為緣而生四種諍事此事如何於此有諸比丘此是法非法是律非律而爭小品四一四二以此為口論諍事於口論諍事僧眾爭論為口論諍事口論時非難為非難諍事非難時犯罪為罪過諍事對此罪行僧伽羯磨為義務諍事如是以口論諍事為緣而生四種諍事非難諍事於四種諍事中同前以非難諍事為緣而生四種諍事此事如何於此有諸比丘非難比丘小品四一四二以此為非難諍事於非難諍事僧眾口論為口論諍事口論時同前如是以非難諍事為緣而生四種諍事罪過諍事於四種諍事中以罪過諍事為緣而生四種諍事此事如何五種罪聚小品四一四二以此為罪過諍事於罪過諍事僧眾口論為口論諍事口論時如是以罪過諍事為緣而生四種諍事義務諍事於四種諍事中以義務諍事而生四種諍事此事如何僧伽應行之義務小品四一四二以此為義務諍事於義務諍事僧眾口論為口論諍事口論時如是以義務諍事為因而生四種諍事二十一等起章終二二口論諍事於四種諍事中隨何種諍事依何種屬何種攝何種諍事耶非難諍事罪過諍事義務諍事於四種諍事中隨何種諍事攝何種諍事耶口論諍事於四種諍事中隨口論諍事依口論諍事屬口論諍事攝口論諍事非難諍事於四種諍事中隨非難諍事罪過諍事義務諍事攝義務諍事口論諍事於七種滅法中隨幾種滅法依幾種滅法屬幾種滅法攝幾種滅法依幾種滅法而滅之耶非難諍事罪過諍事義務諍事於七種滅法中隨幾種滅法依幾種滅法而滅之耶口論諍事於七種滅法中隨兩種滅法依兩種滅法屬兩種滅法攝兩種滅法依兩種滅法而滅之乃依現前毘尼多人語也非難諍事於七種滅法中隨四種滅法依四種滅法而滅之乃依現前毘尼憶念毘尼不癡毘尼覓罪相也罪過諍事於七種滅法中隨三種滅法依三種滅法而滅之乃依現前毘尼自言治如草覆地也義務諍事於七種滅法中隨一種滅法依一種滅法而滅之乃依現前毘尼也二十二隨伴章終滅法分解終攝頌完收之諍事結合者同分滅法與滅法結合者同分滅法與現前毘尼及善品處時並親近有滅有不滅滅諍與生起乃至於隨伴
