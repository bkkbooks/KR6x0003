body:
  text: 第四一無間省略一一有幾種罪有幾種罪聚幾種修習事幾種不恭敬幾種恭敬幾種修習事幾種失壞幾種犯罪等起幾種口論根幾種非難根幾種和敬法幾種破僧事幾種論諍幾種滅法耶有五種罪有五種罪聚五種修習事七種罪七種罪聚七種修習事六種不恭敬六種恭敬六種修習事四種失壞六種犯罪等起六種口論根六種非難根六種和敬法十八種破僧事四種諍事七種滅法二此中何等為五種罪波羅夷罪僧殘罪波逸提罪提舍尼罪惡作罪此五種罪也三此中何等為五種罪聚波羅夷罪聚突吉羅罪聚此五種罪聚也四此中何等為五種修習事離五種罪聚遠離捨離迴避不行不為不墮制不犯拆趣罪橋樑此為五種修習五此中何等為七種罪波羅夷罪僧殘罪偷蘭遮罪波逸提罪提舍尼罪惡作罪惡說罪此七種罪也六此中何等為七種罪聚波羅夷罪聚惡說罪聚此七種罪聚也七此中何等為七種修習事離七種罪聚拆趣罪橋樑此七種修習事也八此中何等為六種不敬不敬佛不敬法不敬僧不敬戒不敬不放逸不敬和順此六種不敬也九此中何等為六種敬敬佛敬和順此六種敬也一此中何等為六種修習事離六不恭拆趣罪橋樑此六種修習事也一一此中何等為四種失壞戒壞行壞見壞命壞此四種失壞也一二此中何等為六種犯罪等起一有罪由身生起而不由語意二有罪由語生起而不由身意三有罪由身語生起而不由意四有罪由身意生起而不由語五有罪由語意生起而不由身六有罪由身語意生起此六種犯罪等起也一三此中何等為六種口論諍事之根於此有比丘有瞋恨心有瞋恨心之彼比丘對大師不恭敬隨順意而住同小品四一四三直至終於此諸比丘之語常被省略如是此不善口論之根未來更不生起此六種口論根也一四此中何等為六種非難諍事之根於此有比丘有瞋恨同前節將口論改為非難此六種非難根也一五此中何等為六種可念法一於此有比丘於同修梵行者中或顯或隱起慈身業是亦可念法能齎愛齎尊重能攝受無諍和合導於一趣者也二復次有比丘於同修梵行者中慈語行三復次慈意行導也四復次有比丘凡如法所得法利得乃至下鉢中所受之所得無不與具戒同修梵行者共相受用是亦可念法導也五復次有比丘彼一切無缺無隙無雜無穢自在智者所讚無執能發三摩地之戒於如是諸戒與同修梵行者或顯或隱等戒性而住是亦可念法導也六復次有比丘彼聖而令出離起彼者而正見到苦之盡於如是見與同修梵行者或顯或隱等見性而住是亦可念法導也此六種可念法也一六此中何等為十八種破僧事於此有比丘非法說為法同大品十五四非粗罪說為粗罪此十八破僧事也一七此中何等為四種諍事口論諍事非難諍事罪過諍事義務諍事此四種諍事也一八此中何等為七種滅諍現前毘尼憶念毘尼不癡毘尼自言治多人語覓罪相如草覆地此七種滅也一問數章終攝頌罪過與罪聚修習再七重修習並不敬恭敬以及根再修習失壞等起及口論非難與和敬乃至破諍事說七種滅此十七句也二一依第一犯罪等起法犯波羅夷實非僅言犯僧殘有言犯偷蘭遮有言犯提舍尼惡作有言犯惡說非僅言二依第二犯罪等起同一犯波逸提有言犯提舍尼實非僅言犯惡作有言犯惡說實非僅言三依第三犯罪等起同一四依第四犯罪等起犯波羅夷有言犯僧殘同一五依第五犯罪等起同四犯提舍尼實非僅言犯惡作有言犯惡說有言六依第六犯罪等起同四二六種犯罪等起章終三一依第一犯罪等起犯幾種罪耶依第一犯罪等起犯五種罪過比丘諍想而自乞造房舍不指示作處過量有難處無行處前行者突吉羅最後一泥團未塗者偷蘭遮其泥團塗時僧殘比丘淨想而取非時食者波逸提比丘淨想而入市井從非親里比丘尼之手以自手受硬食或軟食而食者提舍尼依第一犯罪等起犯此五種罪彼諸罪於四種失壞中隨伴幾種失壞耶於七種罪聚中攝幾種罪聚耶於六種犯罪等起中依幾種等起而生起耶於四種諍事中為何諍事耶於七種滅法中依幾種滅法而滅之耶彼諸罪於四種失壞中隨伴有戒壞行壞於七種罪聚中攝五種罪聚有僧殘罪聚偷蘭遮罪聚波逸提罪聚提舍尼罪聚惡作罪聚於六種犯罪等起中依一種等起而生起由身生起而不由語意於四種諍事中為罪過諍事於七種滅法中依三種滅法而滅之有依現前毘尼與自言治依前毘尼與如草覆地二依第二犯罪等起犯幾種罪耶依第二犯罪等起犯四種罪比丘淨想而命汝等造我房舍造彼房舍而不指示作處過量有難處無行處前行者惡作一泥團未塗者偷蘭遮其泥團塗時僧殘比丘淨想令未受具戒者逐句誦法波逸提依第二犯罪等起犯此四種罪彼諸罪於四種失壞中幾種參照一依幾種滅法而滅之耶彼諸罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝四種罪聚有僧殘罪聚偷蘭遮罪聚波逸提罪聚惡作罪聚於六種犯罪等起中依一種等起而生起由語生起而不由身意於四種諍事中為罪過諍事於七種滅法中依三種滅法而滅之參照一有依如草覆地三依第三犯罪等起幾種犯五種罪比丘淨想而指定造房舍不指定作處過量有難處無行處前行者突吉羅一泥團未塗者偷蘭遮其泥團塗時僧殘比丘淨想而為己乞美味之食而食者波逸提比丘淨想而不拒比丘尼之指圖而食者提舍尼依第三犯罪等起犯此五種罪彼罪於四種失壞中幾種滅法而滅之耶彼罪於四種失壞中兩種失壞於七種罪聚中攝五種罪聚有僧殘罪聚偷蘭遮罪聚波逸提罪聚提舍尼罪聚惡作罪聚於六種犯罪等起中依一種等起而生起由身語生起而不由意於四種諍事中有依如草覆地四依第四犯罪等起幾種犯六種罪比丘行不淨法者波羅夷比丘不淨想而自乞造房舍不指示作處過量有難處無行處前行者惡作一泥團未塗時偷蘭遮其泥團塗時僧殘比丘不淨想而取非時食者波逸提比丘不淨想而入市井從非親里比丘尼之手以己之手受硬食或軟食而食者提舍尼依第四犯罪等起犯此六種罪彼諸罪於四種失壞中幾種滅之耶彼諸罪於四種失壞中兩種失壞於七種罪聚中攝六種罪聚有波羅夷罪聚僧殘罪聚偷蘭遮罪聚波逸提罪聚提舍尼罪聚惡作罪聚於六種犯罪等起中依一種等起而生起由身意生起而不由語於四種諍事中有依如草覆地五依第五犯罪等起幾種犯六種罪過比丘持不善望貪欲性主張空無之上人法者波羅夷比丘不淨想而命汝等造我房舍彼造房舍不指示作處過量有難處無行處前行者突吉羅一泥團未塗時偷蘭遮其泥團塗時僧殘比丘不淨想令未受具戒者逐句誦法者波逸提無惡口輕蔑之意無令困惑之意為戲而以卑語言卑賤者惡說依第五犯罪等起犯此六種罪彼諸罪滅之耶彼諸罪於四種失壞中兩種失壞於七種罪聚中攝六種罪聚有波羅夷罪聚僧殘罪聚波逸提罪聚偷蘭遮罪聚惡作罪聚惡說罪聚於六種犯罪等起中依一種等起而生起由語意生起而不由身於四種諍事中有依如草覆地六依第六犯罪等起幾種犯六種罪過比丘指定而盜去物者波羅夷比丘不淨想而指定造房舍不指示作處過量有難處無行處前行者惡作一泥團未塗時偷蘭遮其泥團塗時僧殘比丘不淨想而為己乞美味之食而食者波逸提比丘不淨想而不拒比丘尼之指圖而食者提舍尼依第六犯罪等起犯此六種罪彼諸罪滅之耶彼諸罪於四種失壞中兩種失壞於七種罪聚中六種罪聚參照四有惡作罪聚於六種犯罪等起中依一種等起而生起由身語意生起於四種諍事中有依如草覆地三六種犯罪等起罪數章終四身業等起法依見無限者救世者見遠離者之所說由此生起之罪有幾種我問此請說示毘崩伽師身業等起法依見無限者救世者見遠離者之所說由此生起之罪過五種也我為汝說斯毘崩伽師語業等起法見無限者請說示毘崩伽師語業等起法見無限者生起之罪過三種也我為汝說斯毘崩伽師身語業等起法見無限者生起之罪過五種也身意業等起法六種也語意業等起法六種也身語意業等起法依見無限者救世者見遠離者之所說由此生起幾種罪我問此請說示毘崩伽師身語意業等起法依見無限者救世者見遠離者之所說由此生起之罪過六種也我為汝說斯毘崩伽師四犯罪等起論終五一緣戒壞犯幾種罪耶依戒壞犯四種罪比丘尼知他比丘尼犯波羅夷法而覆藏者波羅夷有疑念而覆藏者偷蘭遮比丘犯僧殘而覆藏者波逸提覆藏自己之粗罪者惡作依戒壞犯此四種罪彼諸罪於四種失壞中幾種滅之耶彼諸罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝四種罪聚有波羅夷罪聚偷蘭遮罪聚波逸提罪聚惡作罪聚於六種犯罪等起法中依一種等起法而生起由身語意生起也於四種諍事中有依如草覆地二緣行壞幾種犯一種罪覆藏行壞者惡作緣行壞犯此一種罪彼罪於四種失壞中隨伴乃至於七種滅法中依幾種滅法而滅之耶彼罪於四種失壞中隨伴一種失壞行壞於七種罪聚中攝一種罪聚惡作罪聚於六種犯罪等起法中依一種等起法而生起由身語意生起於四種諍事中為罪過諍事於七種滅法中依三種滅法而滅之有依如草覆地三緣見壞幾種犯兩種罪為惡見被諫告至三次而不捨者依白惡作羯磨語竟波逸提緣見壞犯此兩種罪彼罪於四種失壞中幾種滅之耶彼罪於四種失壞中隨伴一種失壞行壞於七種罪聚中攝兩種罪聚有波逸提罪聚惡作罪聚於六種犯罪等起法中依一種等起法而生起由身語意生起於四種諍事中有依如草覆地四緣命壞幾種犯六種罪依活命因活命計持不善望貪欲性主張空無之上人法者波羅夷依活命因活命計而行媒介者僧殘依活命因活命計言住汝精舍之比丘是阿羅漢對方知解者偷蘭遮依活命因活命計比丘為己乞美味之食而食者波逸提依活命因活命計比丘尼為己乞美味之食而食者提舍尼依活命因活命計無病為己乞羹或飯而食者惡作緣命壞犯此六種罪彼諸罪於四種失壞中滅之耶彼諸罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中六種參照三四有惡作罪聚於六種犯罪等起法中依六種等起法而生起有由身生起而不由語意有由語生起而不由身意有由身語生起而不由意有由身意生起而不由語有由語意生起而不由身有由身語意生起於四種諍事中有依如草覆地五失壞緣章終六一緣口論諍事犯幾種罪過耶依口論諍事犯兩種罪罵詈受具戒者波逸提罵詈未受具戒者突吉羅依口論諍事犯此兩種罪過彼諸罪於四種失壞中幾種滅之耶彼諸罪於四種失壞中隨伴一種失壞行壞於七種罪聚中攝兩種罪聚有波逸提罪聚惡作罪聚於六種犯罪等起法中依三種等起法而生起有由身意生起而不由語有由語意生起而不由身有由身語意生起於四種諍事中有依如草覆地二緣非難諍事犯幾種犯三種罪過以無根波羅夷法誹謗比丘者僧殘以無根僧殘誹謗比丘者波逸提以無根行壞誹謗比丘者突吉羅緣非難諍事犯此三種罪過彼諸罪於四種失壞中幾種滅之耶彼諸罪於四種失壞中隨伴兩種失壞有戒壞行壞於七種罪聚中攝三種罪聚有僧殘罪聚波逸提罪聚惡作罪聚於六種犯罪等起法中依三種等起法生起有由身意生起而不由語有由語意生起而不由身有由身語意生起於