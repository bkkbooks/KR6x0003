body:
  text: 第六增一法一法一應知生罪法六種犯罪等起法應知生無罪法七種滅法應知有罪應知無罪應知輕罪應知重罪知有殘罪知無殘罪波羅夷知粗罪波羅夷僧殘知非粗罪有懺除罪無懺除罪教誡罪非教誡罪障罪故意犯不障罪有罪制世間罪無罪制制罪作業所起罪不作業所起罪作業不作業所起罪前罪後罪前罪之中間罪後罪之中間罪達到懺悔之數量罪未達到懺悔之數量罪制隨制不隨犯制遍通制限定制共通制不共通制一部眾制兩部眾制粗罪非粗罪有關居士之罪不關居士之罪決定罪不決定罪初作之人非初作之人偶然犯罪人常習犯罪人呵責人被呵責人非法呵責被非法呵責如法呵責人被如法呵責人決定人不決定人不適能罪人佛緣覺適能罪人聲聞被舉人順被舉人擯滅人不擯滅人共住人不共住人應知禁止一法終攝頌造作並罪輕有殘以及粗懺及教誡障犯以至作業作業不作業前中間到數制不隨犯制全共通一部重居士不定初偶然呵責非法如法定不適被擯滅共住及禁止此為一法頌二法二有罪想解脫有意犯有罪不想解脫有得等至者之罪波逸提八有非得等至者之非罪波羅夷四有罪關正法者波逸提四有罪無關正法者僧殘三有罪關自己之資具有罪關他人之資具有罪關自己之身有罪關他人之身有語真實而墮重罪語虛妄而為輕罪有語虛妄而墮重罪語真實為輕罪有罪於地而犯非在虛空有罪於虛空而犯非於地有罪出去時犯而非入來時有罪入來時犯而非出去時有罪引入而犯尼波逸提五有罪非引入而犯捨墮一五有罪自己行而犯有罪非自己行而犯有罪作業而非作業而犯有罪與而不與而犯有罪受取而不受取而犯有罪受用而不受用而犯有罪夜犯而非晝有罪晝犯而非夜有罪夜明非夜明而犯有罪切斷不切斷而犯有罪覆藏而不覆藏而犯有罪著用而不著用而犯有兩種布薩十四日布薩及十五日布薩也有兩種羯磨求聽羯磨單白羯磨也復有兩種羯磨白二羯磨及白四羯磨也有兩種羯磨事求聽羯磨事單白羯磨事也復有兩種羯磨事白二羯磨事白四羯磨事也有兩種羯磨不成求聽羯磨不成單白羯磨不成也復有兩種羯磨不成白二羯磨不成白四羯磨不成也有兩種羯磨成就求聽羯磨成就單白羯磨成就也復有兩種羯磨成就白二羯磨成就白四羯磨成就也有兩種異住處者地以自身為異住處者和合僧不認彼罪不懺悔或依不捨而舉彼也有兩種同住處者地以自身為同住處者和合僧為彼解不見不懺不捨之舉罪有兩種波羅夷比丘與比丘尼者也有兩種僧殘有兩種偷蘭遮有兩種波逸提有兩種提舍尼有兩種惡作有兩種惡說比丘與比丘尼者也有七種罪與七種罪聚依兩種行相而僧伽分裂依羯磨依行籌兩種人不得受具年時賤劣支分賤劣也復兩種人不得受具事失壞者行惡者復兩種人不得受具鉢衣不具足者具足而不乞求者兩種人不得依止而住無慚者與無恥者也兩種人不得與依止無慚者與慚愧而不乞求者也兩種人不得與依止無恥者與恥而不乞求者兩種無犯罪佛與辟支佛也有兩種人犯罪比丘與比丘尼也兩種人不故意犯罪於聖位之比丘及比丘尼有兩種人故意犯罪凡夫之比丘及比丘尼兩種人不故意行違犯事於聖位之比丘及比丘尼有兩種人故意行違犯事凡夫之比丘及比丘尼有兩種呵責依身而呵責或依語而呵責有兩種失去有未得失去之人僧伽令彼失去時一類為善失去一類為惡失去有兩種解罪有未得解罪之人僧伽令彼解罪時有一類為善解罪一類為惡解罪有兩種自言由身而自言或由語而自言有兩種領受依身而領受依著身之物而領受有兩種制拒依身而制拒依語而制拒有兩種違害戒違害與受用物違害有兩種譏嫌依身而譏嫌或依語而譏嫌有兩種迦絺那衣之執持住處執持與衣執持有兩種迦絺那衣之不執持住處不執持與衣不執持有兩種衣受領衣與糞掃衣有兩種鉢鐵鉢與泥鉢有兩種壇錫製物鉛製物也有兩種鉢之受持由身而受持或由語而受持有兩種衣之受持依身而受持或依語而受持有兩種淨施對面淨施與展轉淨施有兩種律比丘律與比丘尼律有兩種調伏制與制之隨順有兩種律之制欲於不淨破橋而不行於淨應量而行依兩種行相而犯罪依身而犯或依語而犯依兩種行相而出罪依身而出或依語而出有兩種別住覆藏別住非覆藏別住復有兩種別住清淨邊別住合一別住有兩種摩那埵覆藏摩那埵不覆藏摩那埵復有兩種摩那埵半月摩那埵與合一摩那埵有兩種人夜斷別住者之夜斷與行摩那埵人之夜斷有兩種不恭敬人不恭敬與法不恭敬有兩種鹽自然鹽製造鹽復有兩種鹽海鹽黑鹽復有兩種鹽岩鹽廚房鹽復有兩種鹽羅馬伽鹽跋伽羅伽鹽有兩種受用內受外受有兩種惡罵卑罵與貴罵有依兩相之離間語為得愛好或為令離間依兩相為別眾食依招待或依乞食有兩種入安居前安居後安居也有兩種非法遮波羅提木叉有兩種如法遮波羅提木叉有兩種愚癡人作未來之義務者不作已來之義務者有兩種有智人不作未來之義務作已來之義務復有兩種愚癡人於不淨作淨想於淨作不淨想有兩種有智人於不淨作不淨想於淨作淨想復有兩種愚癡人於無罪作罪想於罪作無罪想有兩種有智人於罪作罪想於無罪作無罪想復有兩種愚癡人於非法作法想於法作非法想有兩種有智人於非法作非法想於法作法想復有兩種愚癡人於非律於律有兩種有智人於非律兩種人之漏增長畏慎不應畏慎者不畏慎應畏慎者兩種人之漏不增長不畏慎不應畏慎者畏慎應畏慎者復兩種人之漏增長於不淨作淨想者於淨作不淨想者兩種人之漏不增長於不淨作不淨想者於淨作淨想者復兩種人之漏增長無罪作罪想者兩種人之漏不增長於無罪作無罪想者復兩種人增長於非法作法想者兩種人不增長於非法作非法想者復兩種人增長於非律兩種人之漏不增長於非律作非律想者於律作律想者二法終攝頌想得並正法資具人真實地出取去持作業與受取受用夜夜明切斷及覆藏著被與布薩自恣並羯磨復事復不成復二種成就別異及和合波羅夷僧殘蘭遮波逸提提舍尼惡作惡說七罪聚分裂及受具復二不可住不可與不能能故意違犯呵責並失去解罪與同意領受及制拒違害並譏嫌迦絺那衣二衣鉢乃至壇二種之受持淨施律調伏制欲犯生起別住復二種二種摩那埵復夜斷不敬二種鹽三復受用並惡罵離間與別眾雨安居遮止重荷淨無罪非法法律漏三法三有罪於世尊在世犯入滅後不犯有罪於世尊入滅後犯在世不犯有罪世尊在世入滅後皆犯有罪於時中犯非時不犯有罪於非時犯時中不犯有罪於時非時皆犯有罪於夜中犯日中不犯有日中犯夜中不犯有夜中日中皆犯有罪十夏而犯十夏未滿未犯有十夏未滿犯十夏未犯有十夏滿十夏未滿皆犯有罪五夏而犯五夏未滿未犯有罪善心而犯有罪不善心而犯有罪無記心而犯有罪具樂受而犯有罪具苦受而犯有罪具不苦不樂受而犯有三種呵責事由見聞疑有三種集籌法秘密公開耳語有三種制拒多欲不知足煩惱不損減有三種容許少欲知足損減復有三種制拒多欲不知足不知量有三種容許少欲知足知量復有三種制制隨制不隨犯制復有三種制遍通制限定制共通制復有三種制不共通制一部眾制兩部眾制有罪愚癡者犯有智者不犯有罪智者犯愚癡者不犯有罪愚癡者智者皆犯有罪黑月中犯白月中不犯有白月中犯黑月中不犯有黑月中白月中皆犯有於黑月中淨白月中不淨有於白月中淨黑月中不淨有於黑月中白月中皆淨有罪於寒季犯熱季不犯雨季不犯有熱季犯寒季不犯雨季不犯有雨季犯寒季不犯熱季不犯有罪僧伽犯別眾不犯個人不犯有別眾犯僧伽不犯個人不犯有個人犯僧伽不犯別眾不犯有於僧伽淨別眾不淨個人不淨有於別眾淨僧伽不淨個人不淨有於個人淨僧伽不淨別眾不淨有三種覆藏覆藏事而不覆藏罪覆藏罪而不覆藏事覆藏事亦覆藏罪有三種被覆物浴處被覆物水中被覆物衣服被覆物有三種隱蔽有功用而不顯露女人有被隱蔽有功用而不顯露波羅門之咒語有被隱蔽有功用而不顯露邪見有被隱蔽有功用而不顯露有三種顯露而輝耀隱蔽而不輝耀月輪顯露而輝耀隱蔽而不輝耀日輪顯露世尊所說之法及律顯露而輝耀隱蔽而不輝耀有三種坐臥處之分配前分配後分配中間分配也有罪病者犯無病者不犯有罪無病者犯病者不犯有罪病者犯無病者亦犯有三種非法遮波羅提木叉有三種如法遮波羅提木叉有三種別住覆藏別住不覆藏別住清淨邊別住有三種摩那埵覆藏摩那埵不覆藏摩那埵半月摩那埵有三種別住比丘之夜斷共住獨住不告示也有罪於內犯於外不犯波逸提一六有罪於外犯於內不犯波逸提一四有罪內外皆犯有罪於界內犯於界外不犯有罪於界外犯界內不犯有罪於界內界外皆犯依三相而犯罪由身而犯由語而犯由身語而犯復依三相而犯罪於僧伽中犯於別眾中犯於個人之前犯依三相而於罪中生起由身生起由語生起由身語生起復依三相於罪中生起於僧中別眾中人前也有三種非法不癡毘尼之授與有三種如法不癡毘尼之授與對具三分之比丘欲者僧伽應行呵責羯磨一於僧中起鬥諍起紛亂起口論起辯論起諍事者二愚癡不聰明罪多而不受諫告者三與親近在家人不隨順在家者交往而住對具三分之比丘欲者僧伽應行依止羯磨於僧中在家者交往而住對具三分之比丘欲者僧伽應行驅出羯磨一於僧中起鬥諍乃至起諍事者二愚癡不聰明罪多而不受諫告者三污俗家有惡行而且被見被聞惡行者三分應行下意羯磨於僧中起鬥諍不受諫告者惡口譏嫌在家者三分不認罪時應行舉罪羯磨於僧中不受諫告者犯罪而不欲認罪三分不懺悔罪時應行舉罪羯磨於僧中不受諫告者犯罪而不欲懺悔罪者三分惡見者不捨時應行舉罪羯磨於僧中不受諫告者不欲捨惡見者對具三分之比丘欲者僧伽應行堅強思惟於僧中不受諫告者與親近在家人不隨順之在家者交往而住對具三分之比丘應行羯磨無慚愚癡而有惡行復對具三分之比丘應行羯磨於增上戒有戒失壞於增上行有行失壞於勝見有見失壞復三分耽於身樂耽於語樂耽於身語樂復有身之非行語之身語之非行也復身之違害復身之邪命復對具三分之比丘應行羯磨犯罪而一面行羯磨一面授具與依止蓄沙彌復對其罪依僧伽而行羯磨犯其他罪或犯其他相等者或犯比其更惡者復誹謗佛誹謗法誹謗僧伽對具三分之比丘於僧中遮布薩時僧伽抑止比丘勿鬥諍勿紛亂勿喧噪勿口論而應行布薩無慚愚癡而有惡行也對具三分之比丘於僧中遮自恣時僧伽止比丘應行自恣無慚有惡行也對具三分之比丘任何僧伽不得與選定無慚有惡行也具三分之比丘於僧伽中不得行罪之決斷無慚有惡行也具三分之比丘於任何處不得遮無慚有惡行也具三分之比丘不得依止而住無慚有惡行也具三分之比丘不得與依止無慚有惡行也具三分之比丘令行聽許羯磨時不可行聽許羯磨無慚有惡行也對具三分之比丘不得與共語無慚有惡行也對具三分之比丘不得問律無慚有惡行也具三分之比丘不得問律無慚有惡行也對具三分之比丘不得答律無慚