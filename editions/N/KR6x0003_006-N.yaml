之有情由諸漏盡無漏之具足而住有七種不正法不信無慚無愧少聞懈怠多忘無慧有七種正法有信有慚有愧多聞精勤念現前具慧七法終攝頌罪過及罪聚習修如法行非法及如法無罪之七日功德與最上夜明並滅法羯磨並生穀內廣別眾食最高為七日持及同受持無有及至有非法及如法四種持律者在於光耀輝四種之比丘七種不正法說七種正法八法八因思惟八種功德而依比丘不認罪不得舉因思惟八種功德而相信他人彼之罪應懺悔有八種至三次之戒曾殘一等依八種行相而污俗家衣之事故有八事捨迦絺那衣有八事有八種飲料八種非法所制著於心之提婆達多墮惡趣地獄當留一劫間不得救有八種世間法有比丘尼之八種敬重法有八種提舍尼有八支分之妄語有八種布薩之支分有八種使之支分有八種外道之行於大海有八種希有未曾有之法於此法律有八種希有未曾有之法有八種不殘食有八種殘食於第八日夜明時為捨墮有八種波羅夷成第八事時應擯滅成第八事時行懺悔亦不成懺悔有依八種聲受具對八種人應從坐而立對八種人應與座優婆夷乞求八種恩許應選定具八分比丘為比丘尼之教誡人持律者有八種功德有八種最上受覓罪相羯磨之比丘應於八種法以正身行有八種非法遮波羅提木叉有八種如法遮波羅提木叉八法終攝頌不舉彼比丘他者至三次污家事制飲捨迦絺那衣世法敬重法提舍尼妄語布薩使支分以及外道海希有不殘食殘食並捨墮根本波羅夷以及第八事懺不成受具起禮座恩許教誡與功德最正行八法非法與如法善說於八法九法九有九種嫌恨事有九種嫌恨之制禦有九種習修事有九種最初罪之戒依九種僧伽破有九種美味之食有依九種肉之惡作有九種波羅提木叉讀誦法有九種最上有九種欲根法有九種慢九種衣應受持九種衣不應淨施長依佛手尺為九手尺有九種非法施與有九種如法取受有九種非法受用有三種如法施與有三種如法取受有三種如法受用有九種非法解有九種如法解非法羯磨有兩種九法如法羯磨有兩種九法有九種非法遮波羅提木叉有九種如法遮波羅提木叉九法終攝頌嫌恨事制修習於最初破美味肉誦出及最上欲慢受持淨施佛手尺與取用復三重如法行有非法如法解二之二種九法有非法與如法遮波羅提木叉十法一有十種嫌恨事有十種嫌恨制禦有十種修習事有十種事之邪見有十種事之正見有十種邊執見有十種邪惡有十種正善有十種不善羯磨之道有十種正羯磨之道有十種非法集籌法有十種如法集籌法沙彌有十種學處具十分之沙彌應被擯滅具十分之持律者實被稱為愚智不知自身語之制限不知他人語之制限令不知自身語之制限不知他人語制限依非法不令行自白者不知罪不知罪根不知罪之集起不知罪之斷滅不知罪至滅之道具十分持律者實稱為賢者知自身語之制限知他人語之制限令自知他知依如法令行自白者知罪知罪至滅之道復具十分持律者實稱為愚癡者不知諍事不知諍事之根不知諍事之集起不知諍事之滅不知諍事至滅之道不知事不知因緣不知制不知隨制不知不隨犯制不知適用之語法具十分持律者實稱為有智者知諍事知適用之語法復具十分持律者實稱為愚智者不知白不知行白之事先應言之事不正善後應言之事不正善不知時可不知罪與無罪不知罪之輕重不知罪之有殘無殘不知罪粗非粗不善受取師之傳承不善思惟不善知具十分持律者實稱為智者知白知時可善受取師之傳持善思惟善知復具十分持律者實稱為愚癡者不知有罪無罪不知罪之輕重不知罪之有殘無殘不知罪粗非粗廣暗誦兩部波羅提木叉不決擇不知有罪無罪不知罪之輕重不知罪之有殘無殘不知罪粗非粗於諍事決斷不善正具十分持律者實稱為有智者知有罪無罪於諍事決斷善正具十分之比丘應選定為斷事人依十利世尊為諸聲聞制學處入王後宮者有十種過失有十種施與事有十種寶物有十人眾之比丘僧伽十人僧眾可授具足戒有十種糞掃衣有十種持衣可蓄餘衣最久十日間有十種白法有十種女人有十種妻於毘舍離說十事十種人不可禮拜有十種之呵罵事依十種行相為媒介有十種坐臥處乞求十種恩許有十種非法遮波羅提木叉有十種如法遮波羅提木叉粥有十利十種肉是不淨物有十種最上聰明堪能之十夏比丘應使他出家令受具與依止可蓄沙彌聰明堪能之十夏比丘尼應使之出家可蓄沙彌聰明堪能之十夏比丘尼可受授具之許可十歲曾嫁女可與學戒十法終攝頌嫌恨制事邪邪惡與正善不善善正邊籌非法如法擯滅之沙彌語諍事白輕此等之輕重應該知黑白以及斷事人學及後宮事寶物十人眾同可與授具又持糞掃衣十日白法女妻十事不禮呵罵及媒介座恩許非法法粥肉最上比丘比丘尼授具曾嫁女善說示十法十一法一一十一種人未受具者不得令受具既受具者應擯滅之十一種履不淨十一種鉢不淨十一種衣不淨有十一種至三次之戒比丘尼應問十一種障礙法十一種衣應受持十一種衣不應淨施於十一日夜明時為捨墮十一種結紐是淨物十一種扣子是淨物十一種地是不淨十一種地是淨有十一種依止之解十一種人不可禮拜有十一種最上乞求十一種恩許有十一種界不成於罵詈惡口之人應知有十一種過失於慈愛者心解脫者習行者修習者多作者習練者習熟者確習者積習者善精勤者應知有十一種功德睡眠安樂醒覺安樂不見惡夢諸人愛敬諸非人愛敬諸天守護火或毒或刀不能害心速等持顏色美麗無昏迷之死不通達上位亦至梵天界於慈愛者心解脫者習行者修習者善精勤者應知有此十一種功德十一法終攝頌應擯滅履鉢衣三次應問以受持淨施夜明及結紐扣子淨不淨依止及不禮最上與恩許界不成罵詈慈愍十一說一法與二法增一法終攝頌三法四五法六法七八法九法十十一為一切眾生之利益依彼知法者大雄以慈悲說示淨潔增一法
