body:
  text: 第七一布薩初中後解答章一何為布薩羯磨之初何為中何為終何為自恣羯磨之初何為中何為終何為呵責羯磨之依止羯磨之何為驅出羯磨下意羯磨舉羯磨與別住今日治與摩那埵解罪授具羯磨之初何為中何為終何為呵責羯磨解之初何為依止羯磨解之驅出羯磨解之下意羯磨解之舉羯磨解之憶念毘尼之不癡毘尼之覓罪相之如草覆地之教誡比丘尼人選定之不離衣宿認可之臥具認可之捨金銀人選定之沐浴衣受納者選定之鉢受納者選定之持杖許可之紐許可之杖紐許可之初中終何為布薩羯磨之初何為中何為終和合集為布薩羯磨之初執行為中完了為終何為自恣羯磨之初和合集為自恣羯磨之初執行為中完了為終何為呵責羯磨之初事與人為呵責羯磨之初白為中羯磨語為終依止羯磨之乃至何為驅出羯磨下意羯磨舉羯磨舉別住本日治與摩那埵解罪之初事與人為解罪之初白為中最後羯磨語為終何為受具羯磨之初人為受具羯磨之初白為中羯磨語為終何為呵責羯磨解之初正所行為呵責解之初白為中羯磨語為終何為依止羯磨乃至驅出羯磨下意羯磨舉羯磨解之初正所行為舉羯磨之初白為中羯磨語為終何為憶念毘尼事與人為憶念毘尼之初白為中羯磨語為終何為不癡毘尼覓罪相如草覆地教誡比丘尼人選定何為杖紐許可之初何為中何為終事與人為杖與紐許可之初白為中羯磨語為終二制戒義利論二十種義利故世尊為諸聲聞制立學處為僧攝為眾僧安樂為調伏惡人為善比丘安樂住為斷現世之漏為滅來世之漏為令未信者生信為已信者令增長為正法久住為愛重律攝僧即眾僧安樂僧眾安樂即為惡人之調伏也為惡人之調伏即為善比丘安樂住為正法久住即為愛重律攝僧即眾僧安樂眾僧安樂即為惡人之調伏攝僧即為愛重律僧眾安樂即惡人之調伏僧眾安樂即為愛重律僧眾安樂即攝僧為愛重律即攝僧也為愛重律即為正法久住也百義百法有二百詞於義利論中有四百智義利論終大品終攝頌最初問於八因緣亦復八此等於比丘以計為十六至於比丘尼為數亦十六省略中分解以及增一法自恣義利章大品之合集
