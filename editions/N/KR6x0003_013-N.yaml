body:
  text: 第十三大諍一於僧伽習決斷鬥諍裁判之比丘應知事應知失壞應知犯罪應知因緣應知行相應知前事後事應知作不作應知羯磨應知諍事應知滅諍不可行愛不應行不可行瞋不應行不可行癡不應行不可行怖不應行應令悟之事應令悟應令解之事應令解應令觀之事應令觀應令靜之事應令靜言我得黨友而不可輕侮他黨言我多聞而不可輕侮少聞者我是上座長老而不可輕侮下座不應說不來不應依法律除已來者滅諍事應依法律師教而滅其諍事二應知事者是應知八波羅夷之事二十三僧殘之事二不定四十二尼薩耆百八十八波逸提十二提舍尼惡作惡說之事應知失壞者是應知戒壞行壞見壞應知命壞應知犯罪者是應知波羅夷犯僧殘犯偷蘭遮犯波逸提犯提舍尼犯惡作犯應知惡說犯應知因緣者是應知八波羅夷之因緣應知二十三僧殘之因緣應知惡說之因緣應知行相者應依行相而知僧伽依行相而知眾人依行相而人呵責人應依行相而知被呵責人應依行相知僧伽者此僧伽能否依法律師教而得滅此諍事如是依行相可知僧伽眾人依行相而可知者此人能否得如是依行相可知人應依行相知呵責人者此具壽能否立五種法而呵責他如是依行相可知呵責人應依行相知被呵責人者此具壽能否立二種法能即實與不瞋如是依行相可知被呵責人應知前事後事者此具壽能否從事至事或從失壞至失壞或從犯罪至犯罪或於前否定而後肯定或肯定否定異語而遁逃之應如是知前事後事應知作不作者是應知不淨法應知不淨法之隨順應知不淨法之前分應知不淨法者應知唯有二人成就法應知不淨法之隨順者將他比丘之生支入比丘己之口應知不淨法之前分者好惡色身觸粗語為自己供養淫欲財物之贈答也三應知羯磨者應知十六種羯磨四種求聽羯磨四種白羯磨四種白二羯磨應知四種白四羯磨應知諍事者應知四種諍事應知口論諍事應知義務諍事應知滅者應知七種滅應知現前毘尼應知如草覆地四不應行愛不應行者行愛不應行之時如何行愛不應行耶於此有一人此是我和尚或是阿闍梨弟子門弟同和尚者同阿闍梨者面識者親友親戚同情彼守護彼非法說為如法如法說為非法參照大品一五四非粗罪說為粗罪依此十八事行愛不應行之時為多人之無益多人之無樂多人之不利為天及人之苦無益依此十八事而行愛不應行之時為保持損害己身又有罪為智者所呵責又多生非福行愛不應行之時如是為行愛不應行不應行瞋不應行者行瞋不應行之時如何是行瞋不應行耶於此有一人彼於我不利益而抱瞋怒彼於我不利益而抱瞋怒彼於我為不利益而抱瞋怒我對愛樂者不利益為不利益應為不利益而抱瞋怒於我不愛樂者為利益為利益應為利益而抱瞋怒依此九種之瞋怒事而瞋怒嫌恨為忿怒所制非法說為如法非粗罪說為粗罪以此十八事而行瞋不應行之時如是為行瞋不應行不應行癡不應行者行癡不應行之時如何行癡不應行耶染者隨愛欲而行污者隨瞋而行癡者隨愚癡而行執者依執見而行癡者疑者為愚癡所制非法說為法非粗罪說為粗罪以此十八事行癡不應行之時如是為行癡不應行不應行怖不應行者行怖不應行之時如何行怖不應行耶於此有一人彼依危險或依邪見之叢林或依強力暴惡命難或為梵行難對彼恐怖戰慄非法說為如法非粗罪說為粗罪以此十八事行怖不應行之時如是為行怖不應行依愛瞋怖癡而破法彼名稱減如黑分月不行愛不應行者如何非法說為非法而不行愛不應行法說為法而不行愛不應行非粗罪說為非粗罪而不行愛不應行如是為不行愛不應行不行瞋不應行者如何癡不應行不行怖不應行者如何非法說為非法而不行怖不應行非粗罪說為非粗罪而不行怖不應行如是為不行怖不應行依愛瞋怖癡而不破法彼名稱增長如白分月五應令悟之事令悟者如何非法說為非法應令悟之事令悟也非粗罪說為非粗罪應令悟之事令悟如是應令悟之事令悟也應令解之事令解者如何非法說為非法應令解之事令解如是令解之事令解也應令觀之事令觀者如何非法說為非法應令靜之事令靜如是應令靜之事令靜也六如何我得黨友而輕侮他黨者於此有一人得黨友得隨徒為有黨者有親里者彼不得黨友不得隨徒非有黨者有親里者對彼因輕侮非法說為法非粗罪說為粗罪如是為我得黨友而輕侮他黨如何我是多聞而輕侮少聞者於此有一人多聞而憶持所聞積集所聞者也彼為少聞而少智少憶念對彼因輕侮非法說為法非粗罪說為粗罪如是為我是多聞而輕侮少聞者也如何我是上座長老而輕侮下座於此有一人出家而歲久經驗豐富之長老也此是新參者而乏經驗少知恩者也彼語無效而輕侮彼語非法說為法非粗罪說為粗罪如是我是上座長老而輕侮下座也七不應說不來者不應令入來於還未入來之事務不應依法律而除已來者不應依法律而除僧眾之集會目的依法者是依實有之事也依律者是呵責而令憶念依師教者依白之成就依唱說之成就也滅其諍事應依法律師教而滅其諍事者檢問者應問呵責者友汝禁此比丘自恣大品四一六一一五依外道之弟子聞而疑之耶見與見一致見與見合致因見而不疑其人不清淨其人依自白應與彼共自恣聞與聞一致參照第十一二覺與覺行自恣八何為汝所見者為何者之問汝如何見為何者之問汝何時見何汝於何處見為何者之問何為汝所見者問事問失壞問犯罪問不淨行也問事者問八波羅夷事問十三僧殘事問二不定事問四十二尼薩耆波逸提事問百八十八波逸提事問十二波羅提提舍尼事問惡作事問惡說事問失壞者問戒壞問行壞問見壞問命壞問犯罪者問波羅夷犯問僧殘犯問偷蘭遮犯問惡說犯問不淨行者問唯有二人成就法汝如何見者問標相問威儀問形相問變異也問標相者問或長短或黑白也問威儀者問行或住或坐或臥問形相者問居士之標相或外道之標相或出家標相問變異者問或行或住或坐或臥也汝何時見者問時問日時問時分問季節問時者問晨早時日中時日暮時也問日時者問於晨早之日時於日中之日時於夕刻之日時問時分者問食前或食後或夜中或日中或於黑月或於白月也問季節者問於寒季於熱季於雨季也汝於何處見者問處問地問場問界也問處者是問於土地於地於地所於大地問地者問於地於山於岩上於樓上也問場者問東方之場西方之場北方之場南方之場也問界者問東方之界南方之界也大諍終攝頌事因緣與行相前後事作不作羯磨乃至諍事滅諍愛不應行瞋癡及怖悟解觀靜有黨及友以及聞上座老未至及已至者依法律依師教此大諍之說示
