body:
  text: 第十八發汗偈比丘及比丘不共住者於此不得共食而彼不獨住而不犯為如何之時耶此依善巧者之思惟而質問五種不可捨物不可分物依大仙所說無捨受用者不犯此質問我不言十種人十一種人被捨敬禮年長者有罪此質問非被擯者又非別住者非破僧者又非歸外道於同住處地而立者如何有不共通於學者耶此質問遍問而至善巧有義理之法彼非生非死非涅槃此人諸佛如何說耶此質問由頸骨以上我不語由臍以下捨於其他處緣不淨法如何有波羅夷耶此質問比丘自乞造房屋不指示作處過量有難處無行處而不犯此質問比丘自乞造房屋指示作處應量無難處有行處而犯此質問何等身業不前行又依語而不語他而犯重罪之斷頭事此質問亦非身業亦非語業又何等有意而不為惡而彼被擯如何是善擯耶此質問即對誰亦不以語招呼又不對他人發一言而犯語罪而非身罪此質問依尊佛陀所讚之學處有四種僧殘依一種行而皆犯此質問兩人共受具由兩人手受衣有各別之罪此質問四人要望取重物三人波羅夷而一人非波羅夷此質問女人在內比丘在外其家無孔隙緣不淨法如何而得波羅夷耶此質問自取油蜜砂糖及酥而蓄之不過七日有因緣而食用亦有罪此質問依捨墮罪與單波逸提共犯者如何場合此質問有比丘等二十人合同和合想而行羯磨有一比丘離十二由旬以別眾之理由而對其羯磨唱不平此質問依語足步量之間語皆以同時犯六十四重大有殘罪此質問著安陀會衣著二重僧伽梨衣此皆有捨墮此質問非白又非羯磨語又勝者不言來比丘亦不歸依彼而確定彼受具此質問愚人殺女人不殺母殺男子不殺父殺非聖者因此彼觸無間業此質問殺女人之母殺男子之父殺父母因此彼不觸無間業此質問無呵責不令憶念對非現前者行羯磨所作羯磨善成有行羯磨者及僧伽不犯此質問呵責令憶念於現前者行羯磨所作羯磨不成行者及僧伽有犯此質問切斷者有犯切斷者無犯覆藏者有犯覆藏者無犯此質問語真實而有重罪語虛妄而有輕罪語虛妄而有重罪語真實而有輕罪此質問為受持染色受用染淨者犯此質問於日沒比丘食肉非顛狂者非喪心者彼又非痛惱者彼無犯此法依善逝所說示此質問非染心又非盜心彼亦不思他死而彼與籌而有斷頭罪受取者偷蘭遮此質問非伴住有危險之阿蘭若者又非由僧伽與認可又彼不受持迦絺那衣其時以衣寄託民家而行半由旬及日出彼不犯此質問身業而非語業種種事之罪無前後皆一時犯此質問語業而非身業種種事之罪無前後皆一時犯此質問近三女人三男子或者三人兩根之非聖者三人之黃門而彼不行不淨行又於隨相不行不淨而緣不淨法有斷頭罪此質問向母乞衣非轉入僧伽之物如何而彼有罪於親戚而不犯耶此質問有怒適意者有怒嫌呵者然而怒之讚法實何耶此質問有充滿喜悅適意者有充滿喜悅被嫌呵者然而充滿喜悅被嫌呵之法是何耶此質問同時犯僧殘偷蘭遮波逸提提舍尼突吉羅此質問兩人滿二十歲兩人共為同一和尚同一阿闍梨同一羯磨語而一受具一受具不成此質問不點淨著不染淨衣而至所欲彼無犯此法是善逝說此質問不與不受取因彼不知受取而緣受用犯其重罪非輕罪此質問不與不受取因彼不知受取緣受用犯彼輕罪非重罪此質問犯重罪之有殘罪不恭敬故覆藏非比丘尼而觸罪此由善巧者所思惟而質問發汗偈終攝頌不共不捨物十種不被擯法到頸骨上以至自乞二非自業重罪非身業語業於不招呼學兩人與四人女人油捨墮比丘與足步著衣及非白非以殺父母非呵責呵責切斷者真實持日沒無欲非阿蘭若住乃至身語業三人女人母怒為適意者充悅僧殘人不點淨不與不與犯重罪此依智者說發汗偈質問
